          - textbox [ref=e1505]: "=== META === Season: Unknown | Episode: 1 | Phase: pre-merge | Players Remaining: 17 === CAST (ALL) === STARTING CAST (18): Bowie Chase Ripper Scary Girl Nichelle Axel Zee Brightly Hicks Emmah Millie Caleb Wayne Raj Julia Priya MK Damien === TRIBES (ACTIVE) === Yellow Tribe (6): Bowie, Chase, Ripper, Scary Girl, Nichelle, Axel Red Tribe (6): Zee, Brightly, Hicks, Emmah, Millie, Caleb Blue Tribe (6): Wayne, Raj, Julia, Priya, MK, Damien === ELIMINATED (PERMANENT) === Julia === THE ARRIVAL === [Chris] \"Chase just arrived, and somehow half the dock already likes him.\" [Chase] \"Not bad. I can work with this.\" [Chris] \"Nichelle! I give it five minutes before she knows everyone's name.\" [Nichelle] \"I want to know everyone's name by dinner.\" [Chris] \"MK is here. She already looks like she's planning something.\" [MK] \"The alliances start now. In my head, at least.\" [Chris] \"Bowie just arrived. He's already three moves ahead.\" [Bowie] \"The game started the moment I stepped off that boat.\" [Chris] \"Welcome, Caleb. I see some heads turning already.\" [Caleb] \"Well, hello everyone.\" [Chris] \"Everyone smile at Julia. She's definitely smiling at you.\" [Julia] \"This camp has potential. Just needs the right person pulling the strings.\" [Chris] \"Hicks is here. He's already reading everyone.\" [Hicks] \"Camp's fine. The real game is the people. And they're fascinating.\" [Chris] \"Millie is here. Don't count her out.\" [Millie] \"Hi everyone. Remember my face — you're going to see a lot of it.\" [Chris] \"Scary Girl just stepped off the boat looking like she could flip it over.\" [Scary Girl] \"I don't really have a plan. Plans are boring.\" Bowie can't quite figure Scary Girl out. That almost never happens. [Chris] \"Give it up for Wayne!\" [Wayne] \"Whatever this place throws at us, we handle it together.\" [Chris] \"Raj! Good to have you here.\" [Raj] \"Just point me to my team and I'm ready to work.\" [Chris] \"Welcome, Ripper. I'm already nervous.\" [Ripper] \"So when do things start getting weird? Because I'm ready.\" \"Oh no,\" Hicks says quietly. He can already tell. [Chris] \"Brightly is here. I give it ten minutes before they have a plan.\" [Brightly] \"Let's not pretend this isn't a chess match. I'm ready.\" [Chris] \"Everyone's new best friend just arrived. Welcome, Zee.\" [Zee] \"This camp is giving me summer camp vibes and I am HERE for it.\" [Chris] \"Welcome, Emmah. Deep breaths, we just started.\" [Emmah] \"This place better have food because I'm already in a mood.\" Chase glances at Emmah and decides to stand somewhere else. [Chris] \"Priya just stepped off the boat looking like she could flip it over.\" [Priya] \"Camp looks rough, but that's half the fun, right?\" [Chris] \"Damien just docked. The smartest person on this island might have just arrived.\" [Damien] \"Nobody expects me to win. Good.\" \"Hey, glad you're here,\" Wayne says to Damien. And means it. [Chris] \"Axel is here, and she already looks annoyed.\" [Axel] \"I'm not here to make friends. I'm here to win.\" Nichelle takes a small step back. Just instinct. === CAMP — PRE-CHALLENGE — YELLOW === ADVANTAGES: - The Yellow Hidden Immunity Idol is currently hidden. === CAMP — PRE-CHALLENGE — RED === ADVANTAGES: - The Red Hidden Immunity Idol is currently hidden. === CAMP — PRE-CHALLENGE — BLUE === ADVANTAGES: - The Blue Hidden Immunity Idol is currently hidden. CAMP EVENTS: YELLOW CAMP: - Ripper moves through camp without reading the subtext. The subtext is about him. - Axel moves differently today — not toward the obvious play. The tribe tries to read it. - Chase to the confessional: \"I just like people! I can't help it.\" He genuinely means it. That's either the best or worst quality you can have in this game. - Nichelle spends the afternoon patching holes in the shelter roof. It's thankless work. She does it anyway. RED CAMP: - Emmah moves through camp like wallpaper. People talk freely around her because they forget she is there. That's the whole strategy. - Millie says something that catches the whole tribe off guard. The laughter is genuine. Real. A reminder that these are actual people. - Emmah in the confessional: \"I cannot stand it here. I cannot stand half these people. I am going to win this game and it is going to feel incredible.\" - Even Zee, who rarely reacts, finally says something to Caleb. That's how you know it's bad. BLUE CAMP: - Nobody's including Wayne or Raj in their plans. So they made their own. The Elimination Insurance forms at the bottom — two players with nothing to lose and everything to fight for. - MK gets wind that her name was thrown out. She brushes it off in public — but quietly starts paying closer attention. - Raj is checking in with everyone — more than usual. Priya gets a longer conversation than expected. - Wayne spends the afternoon patching holes in the shelter roof. It's thankless work. He does it anyway. - Raj walks around camp with the energy of someone who's already won today. The tribe reads it as arrogance. RELATIONSHIPS — YELLOW: - Chase and Axel feel mutual dislike toward one another. - Bowie and Axel feel mutual dislike toward one another. - Bowie and Ripper feel a mutual very slight bond toward one another. - Bowie and Scary Girl feel a mutual very slight bond toward one another. - Bowie and Nichelle feel a mutual very slight bond toward one another. - Chase and Nichelle feel mutual slight dislike toward one another. - Scary Girl and Nichelle feel a mutual very slight bond toward one another. - Nichelle and Axel feel a mutual very slight bond toward one another. - Bowie and Chase feel mutual slight dislike toward one another. - Chase and Ripper feel mutual slight dislike toward one another. - Ripper and Nichelle feel a mutual very slight bond toward one another. - Ripper and Scary Girl have a neutral relationship with each other. - Scary Girl and Axel have a neutral relationship with each other. - Chase and Scary Girl have a neutral relationship with each other. - Ripper and Axel have a neutral relationship with each other. RELATIONSHIPS — RED: - Hicks and Caleb feel a mutual slight bond toward one another. - Emmah and Millie feel mutual dislike toward one another. - Brightly and Hicks feel a mutual very slight bond toward one another. - Zee and Millie feel a mutual very slight bond toward one another. - Millie and Caleb feel a mutual very slight bond toward one another. - Zee and Emmah feel mutual slight dislike toward one another. - Zee and Hicks feel a mutual very slight bond toward one another. - Zee and Brightly feel a mutual very slight bond toward one another. - Brightly and Caleb feel a mutual very slight bond toward one another. - Brightly and Millie feel mutual slight dislike toward one another. - Hicks and Emmah feel mutual slight dislike toward one another. - Brightly and Emmah have a neutral relationship with each other. - Emmah and Caleb have a neutral relationship with each other. - Zee and Caleb have a neutral relationship with each other. - Hicks and Millie have a neutral relationship with each other. RELATIONSHIPS — BLUE: - Wayne and MK feel a mutual slight bond toward one another. - Wayne and Raj feel a mutual slight bond toward one another. - Wayne and Priya feel a mutual slight bond toward one another. - Raj and Priya feel a mutual slight bond toward one another. - Wayne and Damien feel a mutual slight bond toward one another. - Priya and MK feel a mutual slight bond toward one another. - MK and Damien feel a mutual slight bond toward one another. - Priya and Damien feel a mutual slight bond toward one another. - MK and Julia feel mutual slight dislike toward one another. - Raj and Julia feel mutual slight dislike toward one another. - Raj and Damien feel a mutual very slight bond toward one another. - Raj and MK have a neutral relationship with each other. - Wayne and Julia have a neutral relationship with each other. - Damien and Julia have a neutral relationship with each other. - Priya and Julia have a neutral relationship with each other. ALLIANCES: The Elimination Insurance (formed ep.1) — FORMED THIS EPISODE: Wayne, Raj The Inner Circle (formed ep.1) — FORMED THIS EPISODE: MK, Wayne, Damien === IMMUNITY CHALLENGE === TRIBE IMMUNITY (Under Pressure challenge — puzzle) One player is lowered underwater to retrieve submerged pieces while their partner guides them using a map and headset. 1. Red — WIN, immune Standings: Brightly (standout) > Zee > Hicks > Millie > Emmah > Caleb (weak link) 2. Yellow — safe Standings: Bowie (standout) > Chase > Nichelle > Axel > Scary Girl > Ripper (weak link) 3. Blue — LAST, goes to tribal Standings: Priya (standout) > Wayne > Julia > Damien > MK > Raj (weak link) RESULT: Blue go to tribal council. NOTE: Red dominated from start to finish — the other tribes were never close. NOTE: Blue's loss came down to Raj's showing. The rest of the tribe couldn't compensate. === CAMP — POST-CHALLENGE === YELLOW CAMP: - Chase walks around camp with the energy of someone who's already won today. The tribe reads it as arrogance. - Nichelle notices Axel is struggling before anyone else does. By the time the tribe catches up, the bond is already there. - Nichelle offers to help Chase with camp duties in a tone that implies Chase can't handle it alone. Chase declines. The damage is done. - Bowie floats the conversation casually but walks away with everything they needed. Chase barely noticed. - Bowie stirs something between Chase and Ripper with one offhand comment. Whether it was intentional is the question. - Ripper finishes eating and immediately asks if there's more. There isn't. The tribe just looks at Ripper. - Chase says the quiet part loud. Nobody responds. They just remember. - Bowie absorbs Chase's outburst with a stillness that means more than anything he could have said out loud. - Axel picks a fight over nothing and wins the argument and loses the game. The tribe saw exactly who she is today. - Bowie don't overreact. He just makes a mental note. Axel did the work for him today. RED CAMP: - Zee does a dead-on impression of the host. Caleb loses it completely. The whole camp is laughing. - Hicks clearly thinks he is fine. He might be. But assuming it out loud is how people get voted out. - Brightly in the confessional: \"I came here to play the game.\" Beat. \"I just didn't think it would feel like this.\" - Millie gives an instruction. Brightly countermands it immediately. Neither backs down. - Caleb and Millie are both running on empty. They don't say much — but they don't leave each other's side either. Something about surviving this together changes things. - Emmah doesn't fit the profile of someone who makes it far. She is still here, still contributing, still invisible on the threat board. - Millie laughs a lot today — the kind that only happens when someone feels completely safe. The tribe watches. - Zee gravitates toward Caleb effortlessly. By the end of the day it doesn't feel strategic — it feels real. - Emmah gives an instruction. Millie countermands it immediately. Neither backs down. - Hicks does a dead-on impression of the host. Brightly loses it completely. The whole camp is laughing. - Emmah makes a joke that isn't a joke. A few people laugh. The rest quietly reconsider her. - Zee hears what Emmah said and quietly starts doing the math on how many others felt the same way. BLUE CAMP: - Priya walks around camp with the energy of someone who's already won today. The tribe reads it as arrogance. - Damien naps in the middle of the afternoon while everyone else strategizes. Either he has nothing to fear — or he has no idea what's coming. - Wayne hasn't been told the full The Elimination Insurance plan in two days. The exclusion is quiet but deliberate. - Priya stops asking questions, stops checking in. She acts like the vote is settled. That energy makes people nervous. - MK doesn't tell Wayne what to do — she asks questions until Wayne figures it out. It's more effective than any alliance pitch. - Julia rounds the corner and catches MK in a conversation they weren't supposed to hear. She doesn't hide that she heard it. - Julia brings up something Damien said three days ago — casually, in front of everyone. The context makes Damien look bad. Julia acts surprised that it landed that way. - Raj was nearby when MK said something he wasn't meant to. He nods, smiles, and keep moving. This will matter later. - Raj brings Wayne food when nobody's looking. Small gesture. Huge in this game. - MK collapses briefly after a long day in the sun. The tribe rallies — but questions start. - Wayne tells someone he isn't worried about tonight. Word travels. Now other people are worried about Wayne. - Raj is still going when everyone else has stopped. The tribe files it away: challenge threat. Real one. - MK maps it out for Wayne and Damien. The logic is clean. Everyone nods. The Inner Circle. === VOTING PLANS — BLUE === ALLIANCE PLANS: The Inner Circle (3 members, 3 can vote) TARGET: Julia REASONING: Julia is running the game from behind — too smart to keep MEMBERS: Damien, MK, Wayne SPEARHEADER: MK The Elimination Insurance (2 members, 2 can vote) TARGET: Julia REASONING: trust is everything out here — following The Inner Circle MEMBERS: Wayne, Raj SPEARHEADER: Wayne INDEPENDENT VOTES: Julia → Raj — dead weight in challenges — Raj has been costing the tribe Priya → Julia — The Inner Circle agreed on this name — going along with it GOING INTO TRIBAL: Primary Target: Julia (5 votes) KEY CONFESSIONALS: MK [Spearheader]: \"Julia is running the game from behind — too smart to keep\" Wayne [Spearheader]: \"trust is everything out here — following The Inner Circle\" === TRIBAL COUNCIL === Attendees: Wayne, Raj, Julia, Priya, MK, Damien WORD AT CAMP: #1 TARGET: Julia — Strategic threat — hard to beat at FTC. (Heavy heat going in) #2 TARGET: Raj — Challenge dominance. (Floated as a possibility) AT TRIBAL COUNCIL: Chris studies the group, then settles on Julia. \"You've been in the middle of every conversation this week. Does that help you or hurt you tonight?\" Julia: \"I feel exactly where I need to be. I've played clean, kept my commitments, and I'm ready for whatever comes.\" -> Julia gives nothing away. The composure either reassures allies or sets off alarm bells in everyone who didn't plan with them. Chris looks at Damien. \"You've been one of the more vocal voices about the direction of this game. Is tonight going the way you planned?\" Damien: \"I feel good about where I stand. I've had honest conversations and I'm trusting that.\" -> Careful and unmemorable. But everyone in this tribe knows who's aligned with who. Chris checks in with MK. \"How has this week changed your read on this tribe?\" MK: \"It's strategy. If it feels personal to someone, that's on them.\" -> MK plays it clean. A little too clean — somebody here doesn't buy it. Chris studies the group for a long moment. \"Julia, Damien — there's tension there. Are you two actually okay?\" Julia: \"Look, I'll be direct — Damien has been running this vote. I'm not going to pretend otherwise.\" Damien: \"I don't have anything to say to that. Tonight will speak for itself.\" -> The confrontation is out. The tribe absorbs it — some shifting, some very still. The air has changed. \"The votes have been cast.\" === THE VOTES === Wayne voted for Julia — trust is everything out here — following The Inner Circle Raj voted for Julia — loyal to The Elimination Insurance — not breaking ranks Julia voted for Raj — dead weight in challenges — Raj has been costing the tribe Priya voted for Julia — The Inner Circle agreed on this name — going along with it MK voted for Julia — Julia is running the game from behind — too smart to keep Damien voted for Julia — Julia is running the game from behind — too smart to keep === WHY THIS VOTE HAPPENED === Julia was voted out because: - The name had already come up before — the consensus vote became inevitable - Name written down 5 times before - Unpredictable and hard to control - Voted out by: Wayne, Raj, Priya, MK, Damien TRIBAL BLOWUP — Julia: \"Let me tell you something before I leave — Damien has been calling every vote in this game. Everyone here has been playing Damien's game and half of you don't even realize it.\" -> Damien exposed as the strategic center. Bond hits with all tribemates. Julia (Schemer) — the tribe has spoken. VOTED OUT THIS EPISODE: Julia === CAMP OVERVIEW === YELLOW (6): Bowie, Chase, Ripper, Scary Girl, Nichelle, Axel RED (6): Zee, Brightly, Hicks, Emmah, Millie, Caleb BLUE (5): Wayne, Raj, Priya, MK, Damien Permanently out: Julia === WRITER CONTEXT === COLD OPEN HOOK: Priya starts humming something while gathering wood. By mid-morning half the tribe is humming the same thing without realizing it. NEXT EPISODE QUESTIONS: - Damien is calling the shots. The question isn't if someone tries to stop it — it's who goes first. - Bowie and Chase are both on the outside. Do they find each other?"
