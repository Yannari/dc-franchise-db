      const entry = manifest[uuid];

            const reader = ds.readable.getReader();

            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

F;\n}\n/* latin */\n@font-face {\n  font-family: 'Libre Franklin';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"7734aafe-d8e3-4f0f-8ca4-2fe2951a31af\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Special Elite';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5a62cd6b-e4f9-49b1-bed4-eba81675d95e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Special Elite';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"7b45b23d-c086-4a83-b763-0b18bbc703b9\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Staatliches';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"511c0273-a775-452e-b841-96dc978a9f4e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Staatliches';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"01c48ce9-12d8-4841-98a8-816e75b604a5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ═══════════════════════════════════════════════════════\n   SUNDOWN SAFARI — Feral Five Simulator\n   Prefix: ss-\n   ═══════════════════════════════════════════════════════ */\n:root{\n  --ss-night:#0d0805;\n  --ss-ember-deep:#1f0f08;\n  --ss-ember:#2d1810;\n  --ss-clay:#3d2418;\n  --ss-rust:#7a3018;\n  --ss-terra:#c44a1c;\n  --ss-flame:#e36218;\n  --ss-gold:#f4a72a;\n  --ss-sun:#fbd24a;\n  --ss-dust:#e6c489;\n  --ss-bone:#f0e0c2;\n  --ss-acacia:#0a0604;\n  --ss-tranq:#5ac4d4;\n  --ss-tranq-deep:#1d6878;\n  --ss-blood:#a02828;\n  --ss-poison:#7ed957;\n  --ss-bruise:#6a4080;\n  --ss-vex:#c44a1c;     /* contestant accents */\n  --ss-marc:#7ed957;\n  --ss-sig:#d94a8c;\n  --ss-codex:#5ac4d4;\n  --ss-razor:#9a6dff;\n  --ss-ghoul:#e6c489;\n}\n*{margin:0;padding:0;box-sizing:border-box;}\nhtml,body{overflow-x:hidden;}\nbody{\n  background:var(--ss-night);color:var(--ss-bone);\n  font-family:'Libre Franklin',sans-serif;font-size:14px;line-height:1.5;\n  min-height:100vh;\n}\n\n/* ═══ SKY GRADIENT ═══ */\n.ss-sky{position:fixed;inset:0;z-index:0;pointer-events:none;\n  background:\n    radial-gradient(ellipse 90% 70% at 70% 95%, rgba(244,167,42,.22) 0%, transparent 55%),\n    radial-gradient(ellipse 80% 60% at 30% 100%, rgba(196,74,28,.28) 0%, transparent 60%),\n    linear-gradient(180deg, #0a0408 0%, #1a0a0e 25%, #3d1a18 55%, #7a3018 80%, #c44a1c 100%);\n}\n.ss-sun{position:fixed;left:65%;bottom:8vh;width:280px;height:280px;border-radius:50%;\n  background:radial-gradient(circle, var(--ss-sun) 0%, var(--ss-gold) 30%, rgba(244,167,42,.3) 55%, transparent 75%);\n  z-index:0;pointer-events:none;filter:blur(2px);opacity:.7;}\n\n/* Acacia tree silhouettes — built with CSS, no SVG */\n.ss-horizon{position:fixed;left:0;right:0;bottom:0;height:24vh;z-index:1;pointer-events:none;}\n.ss-tree{position:absolute;bottom:0;}\n.ss-tree .trunk{width:6px;height:120px;background:var(--ss-acacia);margin:0 auto;}\n.ss-tree .canopy{width:140px;height:28px;background:var(--ss-acacia);border-radius:50%;\n  position:relative;top:6px;left:50%;transform:translateX(-50%);}\n.ss-tree .canopy::before{content:'';position:absolute;top:-12px;left:15%;width:70%;height:22px;\n  background:var(--ss-acacia);border-radius:50%;}\n.ss-tree.t1{left:3%;transform:scale(.7);}\n.ss-tree.t2{left:18%;transform:scale(1);}\n.ss-tree.t3{left:40%;transform:scale(.55);opacity:.85;}\n.ss-tree.t4{left:82%;transform:scale(.9);}\n.ss-tree.t5{left:92%;transform:scale(.65);}\n.ss-grass{position:fixed;left:0;right:0;bottom:0;height:10vh;z-index:1;pointer-events:none;\n  background:linear-gradient(180deg,transparent 0%,var(--ss-acacia) 70%);\n  -webkit-mask:linear-gradient(180deg,transparent 0%,#000 80%);\n          mask:linear-gradient(180deg,transparent 0%,#000 80%);}\n\n/* Dust motes */\n.ss-dust-layer{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden;}\n.ss-mote{position:absolute;width:3px;height:3px;border-radius:50%;\n  background:var(--ss-dust);box-shadow:0 0 4px rgba(230,196,137,.6);opacity:0;\n  animation:ss-drift linear infinite;}\n@keyframes ss-drift{\n  0%{transform:translate(0,0);opacity:0;}\n  10%{opacity:.7;}\n  90%{opacity:.5;}\n  100%{transform:translate(120vw,-30vh);opacity:0;}\n}\n\n/* Heat shimmer */\n.ss-heat{position:fixed;left:0;right:0;bottom:0;height:30vh;z-index:2;pointer-events:none;\n  background:repeating-linear-gradient(0deg,transparent 0px,rgba(244,167,42,.04) 1px,transparent 3px);\n  animation:ss-shimmer 4s ease-in-out infinite;}\n@keyframes ss-shimmer{0%,100%{transform:translateY(0) scaleY(1);}50%{transform:translateY(2px) scaleY(1.02);}}\n\n/* ═══ BROADCAST CHROME ═══ */\n.ss-bar{position:fixed;top:0;left:0;right:0;height:40px;z-index:50;\n  background:linear-gradient(90deg,rgba(13,8,5,.96),rgba(45,24,16,.96));\n  border-bottom:2px solid var(--ss-terra);\n  display:flex;align-items:center;justify-content:space-between;padding:0 18px;\n  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;\n  backdrop-filter:blur(8px);}\n.ss-live{display:flex;align-items:center;gap:8px;color:var(--ss-blood);font-weight:700;}\n.ss-live-dot{width:9px;height:9px;background:var(--ss-blood);border-radius:50%;\n  box-shadow:0 0 12px var(--ss-blood);animation:ss-blink 1.2s ease infinite;}\n@keyframes ss-blink{0%,100%{opacity:1;}50%{opacity:.15;}}\n.ss-ticker{flex:1;overflow:hidden;margin:0 24px;position:relative;height:20px;}\n.ss-ticker-inner{position:absolute;white-space:nowrap;color:var(--ss-gold);\n  animation:ss-scroll 38s linear infinite;}\n.ss-ticker-inner b{color:var(--ss-terra);}\n@keyframes ss-scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}\n.ss-channel{color:var(--ss-sun);font-weight:700;letter-spacing:3px;}\n.ss-temp{color:var(--ss-flame);font-weight:700;}\n\n/* ═══ PHASE TABS ═══ */\n.ss-tabs{position:fixed;top:40px;left:0;right:0;z-index:49;\n  background:rgba(13,8,5,.93);border-bottom:1px solid rgba(244,167,42,.18);\n  display:flex;justify-content:center;gap:0;padding:0 16px;backdrop-filter:blur(8px);}\n.ss-tab{padding:10px 18px;cursor:pointer;border:none;background:transparent;\n  font-family:'Staatliches',sans-serif;font-size:14px;letter-spacing:2.5px;\n  color:rgba(240,224,194,.42);text-transform:uppercase;\n  border-bottom:2px solid transparent;transition:all .25s;position:relative;}\n.ss-tab:hover{color:var(--ss-bone);}\n.ss-tab.active{color:var(--ss-sun);border-bottom-color:var(--ss-terra);}\n.ss-tab .ss-tab-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ss-rust);\n  margin-right:6px;letter-spacing:1px;}\n.ss-tab.active .ss-tab-num{color:var(--ss-terra);}\n\n/* ═══ SHELL ═══ */\n.ss-shell{position:relative;z-index:10;max-width:1240px;margin:90px auto 40px;\n  display:grid;grid-template-columns:1fr 340px;gap:18px;padding:0 18px;}\n.ss-main{min-width:0;}\n.ss-phase{display:none;animation:ss-fade .4s ease;}\n.ss-phase.active{display:block;}\n@keyframes ss-fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}\n\n/* ═══ TITLE HERO ═══ */\n.ss-hero{position:relative;padding:40px 28px 36px;margin-bottom:18px;\n  border:1px solid rgba(244,167,42,.18);border-radius:6px;overflow:hidden;\n  background:linear-gradient(135deg,rgba(45,24,16,.55),rgba(13,8,5,.4));}\n.ss-hero::before{content:'';position:absolute;inset:0;\n  background:repeating-linear-gradient(0deg,transparent 0px,transparent 3px,rgba(244,167,42,.02) 3px,rgba(244,167,42,.02) 4px);\n  pointer-events:none;}\n.ss-hero-corner{position:absolute;width:20px;height:20px;border:2px solid var(--ss-terra);}\n.ss-hero-corner.tl{top:8px;left:8px;border-right:none;border-bottom:none;}\n.ss-hero-corner.tr{top:8px;right:8px;border-left:none;border-bottom:none;}\n.ss-hero-corner.bl{bottom:8px;left:8px;border-right:none;border-top:none;}\n.ss-hero-corner.br{bottom:8px;right:8px;border-left:none;border-top:none;}\n.ss-hero-ep{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:4px;\n  color:var(--ss-gold);margin-bottom:14px;}\n.ss-hero-ep .dot{display:inline-block;width:5px;height:5px;background:var(--ss-blood);\n  border-radius:50%;margin:0 8px 2px;vertical-align:middle;}\n.ss-hero-title{font-family:'Anton',sans-serif;font-size:84px;line-height:.92;\n  color:var(--ss-bone);letter-spacing:2px;text-transform:uppercase;\n  text-shadow:4px 4px 0 var(--ss-rust),8px 8px 0 rgba(13,8,5,.4);}\n.ss-hero-title .ember{color:var(--ss-flame);}\n.ss-hero-sub{font-family:'Staatliches',sans-serif;font-size:16px;letter-spacing:6px;\n  color:var(--ss-dust);margin-top:10px;text-transform:uppercase;}\n.ss-hero-tagline{margin-top:22px;font-family:'Special Elite',cursive;font-style:italic;\n  font-size:13px;color:rgba(230,196,137,.7);max-width:560px;line-height:1.6;}\n.ss-hero-stats{display:flex;gap:18px;margin-top:22px;flex-wrap:wrap;}\n.ss-hero-stat{padding:8px 14px;border:1px solid rgba(244,167,42,.22);border-radius:3px;\n  background:rgba(13,8,5,.4);}\n.ss-hero-stat .lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;\n  color:rgba(230,196,137,.55);text-transform:uppercase;}\n.ss-hero-stat .val{font-family:'Anton',sans-serif;font-size:22px;color:var(--ss-gold);\n  letter-spacing:1px;margin-top:2px;}\n\n/* Roster strip in hero */\n.ss-roster-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:24px;}\n.ss-rs-card{padding:10px;border:1px solid rgba(244,167,42,.15);background:rgba(13,8,5,.5);\n  border-radius:4px;text-align:center;position:relative;border-top:3px solid var(--ss-clr,var(--ss-terra));}\n.ss-rs-card .av{width:48px;height:48px;border-radius:50%;margin:0 auto 6px;\n  background:var(--ss-clr,var(--ss-terra));display:flex;align-items:center;justify-content:center;\n  font-family:'Anton',sans-serif;font-size:20px;color:var(--ss-night);border:2px solid rgba(13,8,5,.6);}\n.ss-rs-card .nm{font-family:'Staatliches',sans-serif;font-size:13px;letter-spacing:1.5px;\n  color:var(--ss-bone);}\n.ss-rs-card .arch{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;\n  color:rgba(230,196,137,.55);text-transform:uppercase;margin-top:2px;}\n\n/* ═══ EVENT CARDS ═══ */\n.ss-card{position:relative;margin:14px 0;padding:18px 20px;border-radius:5px;\n  border:1px solid rgba(244,167,42,.12);\n  background:linear-gradient(135deg,rgba(45,24,16,.45),rgba(13,8,5,.3));\n  animation:ss-card-in .55s cubic-bezier(.16,1,.3,1) forwards;}\n@keyframes ss-card-in{from{opacity:0;transform:translateX(-14px);filter:blur(2px);}to{opacity:1;transform:none;filter:none;}}\n.ss-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ss-clr,var(--ss-terra));}\n.ss-card[data-type=\"host\"]{background:linear-gradient(135deg,rgba(244,167,42,.08),rgba(13,8,5,.3));}\n.ss-card[data-type=\"host\"]::before{background:var(--ss-gold);}\n.ss-card[data-type=\"hazard\"]::before{background:var(--ss-blood);}\n.ss-card[data-type=\"alliance\"]::before{background:var(--ss-bruise);background-image:repeating-linear-gradient(0deg,var(--ss-bruise) 0,var(--ss-bruise) 6px,transparent 6px,transparent 10px);}\n.ss-card[data-type=\"betray\"]::before{background:var(--ss-blood);background-image:repeating-linear-gradient(0deg,var(--ss-blood) 0,var(--ss-blood) 4px,var(--ss-night) 4px,var(--ss-night) 7px);}\n.ss-card[data-type=\"ghoul\"]::before{background:var(--ss-poison);}\n.ss-card[data-type=\"win\"]::before{background:var(--ss-gold);}\n.ss-card[data-type=\"ko\"]::before{background:var(--ss-blood);}\n\n.ss-card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}\n.ss-card-title{font-family:'Staatliches',sans-serif;font-size:16px;letter-spacing:2px;\n  color:var(--ss-bone);text-transform:uppercase;}\n.ss-card-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ss-rust);\n  letter-spacing:1px;}\n.ss-badge{margin-left:auto;padding:3px 9px;border-radius:2px;font-family:'JetBrains Mono',monospace;\n  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid;}\n.ss-b-host{color:var(--ss-gold);border-color:rgba(244,167,42,.4);background:rgba(244,167,42,.06);}\n.ss-b-gather{color:var(--ss-flame);border-color:rgba(227,98,24,.4);background:rgba(227,98,24,.06);}\n.ss-b-smash{color:var(--ss-sun);border-color:rgba(251,210,74,.4);background:rgba(251,210,74,.06);}\n.ss-b-hunt{color:var(--ss-tranq);border-color:rgba(90,196,212,.4);background:rgba(90,196,212,.06);}\n.ss-b-hazard{color:var(--ss-blood);border-color:rgba(160,40,40,.4);background:rgba(160,40,40,.06);}\n.ss-b-alliance{color:var(--ss-bruise);border-color:rgba(106,64,128,.5);background:rgba(106,64,128,.08);}\n.ss-b-betray{color:var(--ss-blood);border-color:rgba(160,40,40,.5);background:rgba(160,40,40,.1);}\n.ss-b-ghoul{color:var(--ss-poison);border-color:rgba(126,217,87,.4);background:rgba(126,217,87,.06);}\n.ss-b-vote{color:var(--ss-dust);border-color:rgba(230,196,137,.4);background:rgba(230,196,137,.06);}\n.ss-card-body{font-size:13.5px;line-height:1.65;color:rgba(240,224,194,.82);}\n.ss-card-body em{color:var(--ss-gold);font-style:normal;font-weight:600;}\n.ss-card-body strong{color:var(--ss-bone);font-weight:700;}\n.ss-card-meta{margin-top:10px;padding-top:8px;border-top:1px dashed rgba(244,167,42,.12);\n  display:flex;gap:14px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:10px;\n  color:rgba(230,196,137,.55);}\n.ss-card-meta .pos{color:var(--ss-poison);}\n.ss-card-meta .neg{color:var(--ss-blood);}\n.ss-card-meta .neu{color:var(--ss-tranq);}\n\n/* Avatars in cards */\n.ss-av{width:30px;height:30px;border-radius:50%;background:var(--ss-clr,var(--ss-terra));\n  display:inline-flex;align-items:center;justify-content:center;\n  font-family:'Anton',sans-serif;font-size:13px;color:var(--ss-night);\n  border:2px solid rgba(13,8,5,.6);flex-shrink:0;letter-spacing:.5px;}\n.ss-av.sm{width:22px;height:22px;font-size:10px;border-width:1.5px;}\n.ss-av.lg{width:44px;height:44px;font-size:18px;}\n.ss-av.injured{filter:hue-rotate(-15deg) saturate(.6);box-shadow:0 0 0 2px rgba(160,40,40,.4);}\n.ss-av.ko{filter:grayscale(1) brightness(.45);opacity:.6;}\n\n/* Host quote bar */\n.ss-host-quote{display:flex;gap:14px;align-items:flex-start;}\n.ss-host-quote .qmark{font-family:'Anton',sans-serif;font-size:42px;color:var(--ss-gold);\n  line-height:.7;margin-top:-4px;}\n.ss-host-quote .text{font-family:'Special Elite',cursive;font-size:14px;\n  color:var(--ss-sun);line-height:1.55;font-style:italic;}\n.ss-host-quote .who{display:block;margin-top:6px;font-family:'JetBrains Mono',monospace;\n  font-size:9px;color:rgba(244,167,42,.6);letter-spacing:2px;font-style:normal;}\n\n/* Confessional */\n.ss-conf{margin:14px 0;padding:14px 16px 14px 22px;background:rgba(13,8,5,.55);\n  border-left:3px solid var(--ss-clr,var(--ss-terra));border-radius:3px;position:relative;}\n.ss-conf::before{content:'CONFESSIONAL';position:absolute;top:-7px;left:14px;background:var(--ss-night);\n  padding:0 8px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;\n  color:var(--ss-rust);}\n.ss-conf-hdr{display:flex;align-items:center;gap:10px;margin-bottom:6px;}\n.ss-conf-name{font-family:'Staatliches',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--ss-clr,var(--ss-terra));}\n.ss-conf-body{font-family:'Special Elite',cursive;font-size:13px;line-height:1.55;\n  color:rgba(240,224,194,.78);font-style:italic;}\n\n/* Trajectory / projectile viz */\n.ss-trajectory{position:relative;height:80px;margin:12px 0;background:rgba(13,8,5,.4);\n  border:1px solid rgba(244,167,42,.1);border-radius:3px;overflow:hidden;}\n.ss-trajectory::before{content:'';position:absolute;inset:0;\n  background-image:linear-gradient(90deg,rgba(244,167,42,.04) 1px,transparent 1px),\n                    linear-gradient(0deg,rgba(244,167,42,.04) 1px,transparent 1px);\n  background-size:20px 20px;}\n.ss-arc{position:absolute;height:2px;background:linear-gradient(90deg,transparent,var(--ss-flame) 30%,var(--ss-sun));\n  border-radius:1px;transform-origin:left center;}\n.ss-target{position:absolute;width:14px;height:14px;border:2px solid var(--ss-blood);border-radius:50%;\n  display:flex;align-items:center;justify-content:center;}\n.ss-target::after{content:'';width:4px;height:4px;background:var(--ss-blood);border-radius:50%;}\n.ss-traj-label{position:absolute;font-family:'JetBrains Mono',monospace;font-size:9px;\n  color:rgba(230,196,137,.6);letter-spacing:1px;}\n\n/* Ammo strip */\n.ss-ammo-strip{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}\n.ss-ammo{width:12px;height:18px;background:var(--ss-tranq);border-radius:6px;\n  border:1px solid var(--ss-tranq-deep);box-shadow:inset 0 -3px 0 rgba(0,0,0,.2);\n  position:relative;}\n.ss-ammo.spent{background:transparent;border-style:dashed;opacity:.4;}\n.ss-ammo::after{content:'';position:absolute;top:2px;left:2px;right:2px;height:3px;\n  background:rgba(255,255,255,.25);border-radius:2px;}\n\n/* HP / Stat bars */\n.ss-bar-row{display:flex;align-items:center;gap:8px;margin:5px 0;}\n.ss-bar-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;\n  color:rgba(230,196,137,.5);min-width:32px;}\n.ss-bar-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}\n.ss-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}\n.ss-bar-fill.hp{background:linear-gradient(90deg,var(--ss-blood),var(--ss-flame));}\n.ss-bar-fill.hp.low{background:linear-gradient(90deg,var(--ss-blood),var(--ss-blood));animation:ss-pulse 1.2s infinite;}\n.ss-bar-fill.stam{background:linear-gradient(90deg,var(--ss-tranq-deep),var(--ss-tranq));}\n.ss-bar-fill.heat{background:linear-gradient(90deg,var(--ss-gold),var(--ss-flame),var(--ss-blood));}\n@keyframes ss-pulse{0%,100%{opacity:1;}50%{opacity:.55;}}\n.ss-bar-val{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;min-width:28px;\n  text-align:right;color:var(--ss-bone);}\n\n/* ═══ SIDEBAR ═══ */\n.ss-side{position:sticky;top:92px;align-self:start;display:flex;flex-direction:column;gap:14px;\n  max-height:calc(100vh - 110px);overflow-y:auto;scrollbar-width:thin;\n  scrollbar-color:rgba(244,167,42,.2) transparent;padding-right:2px;}\n.ss-side::-webkit-scrollbar{width:5px;}\n.ss-side::-webkit-scrollbar-thumb{background:rgba(244,167,42,.2);border-radius:3px;}\n.ss-sbox{padding:12px 14px;border:1px solid rgba(244,167,42,.15);border-radius:5px;\n  background:linear-gradient(135deg,rgba(45,24,16,.6),rgba(13,8,5,.5));backdrop-filter:blur(4px);}\n.ss-sbox-hdr{display:flex;align-items:center;justify-content:space-between;\n  margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(244,167,42,.12);}\n.ss-sbox-title{font-family:'Staatliches',sans-serif;font-size:12px;letter-spacing:2.5px;\n  color:var(--ss-gold);text-transform:uppercase;}\n.ss-sbox-meta{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;\n  color:rgba(230,196,137,.5);}\n\n/* ── MAP ── */\n.ss-map{position:relative;height:240px;border-radius:4px;overflow:hidden;\n  background:\n    radial-gradient(ellipse at 30% 40%, rgba(94,156,80,.18) 0%, transparent 35%),\n    radial-gradient(ellipse at 70% 60%, rgba(244,167,42,.12) 0%, transparent 40%),\n    linear-gradient(135deg,#3a2418 0%,#5a3520 50%,#3d2018 100%);\n  border:1px solid rgba(244,167,42,.18);}\n.ss-map::before{content:'';position:absolute;inset:0;\n  background-image:linear-gradient(90deg,rgba(244,167,42,.05) 1px,transparent 1px),\n                    linear-gradient(0deg,rgba(244,167,42,.05) 1px,transparent 1px);\n  background-size:24px 24px;}\n.ss-map-zone{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;\n  font-family:'JetBrains Mono',monospace;font-size:7px;color:rgba(13,8,5,.7);letter-spacing:1px;\n  text-transform:uppercase;font-weight:700;}\n.ss-map-zone.water{background:radial-gradient(circle,rgba(90,196,212,.45),rgba(90,196,212,.1));\n  width:54px;height:42px;top:14%;left:8%;border:1px dashed rgba(90,196,212,.5);color:var(--ss-tranq);}\n.ss-map-zone.quicksand{background:radial-gradient(circle,rgba(230,196,137,.55),rgba(230,196,137,.2));\n  width:46px;height:46px;top:55%;left:48%;border:1px dashed rgba(230,196,137,.5);color:#4a3520;}\n.ss-map-zone.brush{background:radial-gradient(circle,rgba(126,217,87,.25),rgba(126,217,87,.05));\n  width:80px;height:60px;top:8%;right:8%;border:1px dashed rgba(126,217,87,.4);color:var(--ss-poison);}\n.ss-map-zone.rocks{width:36px;height:36px;background:radial-gradient(circle,rgba(122,48,24,.55),rgba(122,48,24,.15));\n  top:62%;right:14%;border:1px dashed rgba(196,74,28,.5);color:var(--ss-terra);}\n.ss-map-dot{position:absolute;width:12px;height:12px;border-radius:50%;background:var(--ss-clr,var(--ss-terra));\n  border:2px solid rgba(13,8,5,.7);box-shadow:0 0 8px var(--ss-clr,var(--ss-terra));\n  transform:translate(-50%,-50%);z-index:3;}\n.ss-map-dot::after{content:attr(data-tag);position:absolute;top:-14px;left:50%;transform:translateX(-50%);\n  font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--ss-clr,var(--ss-terra));\n  font-weight:700;letter-spacing:1px;text-shadow:0 1px 2px rgba(0,0,0,.7);}\n.ss-map-ghoul{width:14px;height:14px;border:2px dashed var(--ss-poison);background:transparent;\n  animation:ss-ghoul-pulse 1.5s ease infinite;}\n.ss-map-ghoul::before{content:'';position:absolute;inset:-8px;border:1px dashed rgba(126,217,87,.4);\n  border-radius:50%;animation:ss-ping 2s ease-out infinite;}\n@keyframes ss-ghoul-pulse{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.3);}}\n@keyframes ss-ping{0%{transform:scale(.4);opacity:1;}100%{transform:scale(2.5);opacity:0;}}\n.ss-map-trail{position:absolute;width:5px;height:5px;border-radius:50%;background:rgba(126,217,87,.4);\n  transform:translate(-50%,-50%);}\n.ss-map-legend{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px;font-size:9px;}\n.ss-map-leg-item{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;\n  color:rgba(230,196,137,.55);font-size:8.5px;letter-spacing:.5px;}\n.ss-map-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}\n\n/* ── ROSTER ── */\n.ss-roster-row{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;\n  padding:7px 0;border-bottom:1px solid rgba(244,167,42,.06);}\n.ss-roster-row:last-child{border-bottom:none;}\n.ss-roster-name{font-family:'Staatliches',sans-serif;font-size:13px;letter-spacing:1.2px;\n  color:var(--ss-bone);line-height:1.1;}\n.ss-roster-arch{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.8px;\n  color:rgba(230,196,137,.5);text-transform:uppercase;}\n.ss-roster-bars{margin-top:3px;}\n.ss-roster-status{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}\n.ss-status-tag{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.8px;\n  padding:2px 6px;border-radius:2px;border:1px solid;text-transform:uppercase;font-weight:700;}\n.ss-st-active{color:var(--ss-poison);border-color:rgba(126, ss-prog-step:last-child{border-right:none;}\n.ss-prog-step.done{background:rgba(126,217,87,.12);color:var(--ss-poison);}\n.ss-prog-step.now{background:rgba(244,167,42,.18);color:var(--ss-sun);font-weight:700;\n  box-shadow:inset 0 -2px 0 var(--ss-flame);}\n.ss-prog-step .n{display:block;font-family:'Anton',sans-serif;font-size:14px;letter-spacing:0;\n  color:inherit;margin-bottom:2px;}\n\n/* ── CTA / WINNER / VOTE ── */\n.ss-winner{margin:18px 0;padding:30px 20px;text-align:center;border-radius:6px;position:relative;\n  background:linear-gradient(135deg,rgba(244,167,42,.18),rgba(122,48,24,.12));\n  border:2px solid var(--ss-gold);overflow:hidden;}\n.ss-winner::before{content:'';position:absolute;inset:-50%;\n  background:conic-gradient(from 0deg,transparent 0deg,rgba(244,167,42,.08) 30deg,transparent 60deg,transparent 180deg,rgba(244,167,42,.08) 210deg,transparent 240deg);\n  animation:ss-rotate 8s linear infinite;}\n@keyframes ss-rotate{to{transform:rotate(360deg);}}\n.ss-winner > *{position:relative;z-index:1;}\n.ss-winner .tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:4px;\n  color:var(--ss-sun);margin-bottom:8px;}\n.ss-winner .nm{font-family:'Anton',sans-serif;font-size:54px;color:var(--ss-bone);letter-spacing:2px;\n  text-shadow:3px 3px 0 var(--ss-rust);}\n.ss-winner .sub{font-family:'Special Elite',cursive;font-style:italic;color:var(--ss-dust);margin-top:6px;}\n\n.ss-vote-box{margin:16px 0;padding:18px;border:1px solid var(--ss-blood);border-radius:5px;\n  background:linear-gradient(135deg,rgba(160,40,40,.12),rgba(13,8,5,.6));}\n.ss-vote-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px;}\n.ss-vote-col{text-align:center;}\n.ss-vote-col .who{font-family:'Staatliches',sans-serif;font-size:13px;letter-spacing:1px;color:var(--ss-bone);margin-top:6px;}\n.ss-vote-tally{margin-top:8px;font-family:'Anton',sans-serif;font-size:24px;letter-spacing:1px;color:var(--ss-clr,var(--ss-blood));}\n.ss-vote-bars{margin-top:6px;display:flex;gap:2px;justify-content:center;}\n.ss-vote-bars span{display:block;width:6px;height:14px;background:var(--ss-clr,var(--ss-blood));border-radius:1px;}\n.ss-vote-immune{margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--ss-gold);letter-spacing:1px;}\n\n/* ═══ RESPONSIVE ═══ */\n@media(max-width:980px){\n  .ss-shell{grid-template-columns:1fr;}\n  .ss-side{position:static;max-height:none;}\n  .ss-hero-title{font-size:56px;}\n}\n@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important;}}\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- BACKGROUND LAYERS -->\n<div class=\"ss-sky\"><\u002Fdiv>\n<div class=\"ss-sun\"><\u002Fdiv>\n<div class=\"ss-dust-layer\" id=\"dustLayer\"><\u002Fdiv>\n<div class=\"ss-heat\"><\u002Fdiv>\n<div class=\"ss-horizon\">\n  <div class=\"ss-tree t1\"><div class=\"trunk\"><\u002Fdiv><div class=\"canopy\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"ss-tree t2\"><div class=\"trunk\"><\u002Fdiv><div class=\"canopy\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"ss-tree t3\"><div class=\"trunk\"><\u002Fdiv><div class=\"canopy\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"ss-tree t4\"><div class=\"trunk\"><\u002Fdiv><div class=\"canopy\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"ss-tree t5\"><div class=\"trunk\"><\u002Fdiv><div class=\"canopy\"><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"ss-grass\"><\u002Fdiv>\n\n<!-- BROADCAST CHROME -->\n<div class=\"ss-bar\">\n  <div class=\"ss-live\"><span class=\"ss-live-dot\"><\u002Fspan>LIVE · CH-07<\u002Fdiv>\n  <div class=\"ss-ticker\"><div class=\"ss-ticker-inner\">\n    SUNDOWN SAFARI &nbsp;//&nbsp; FERAL FIVE REMAIN &nbsp;//&nbsp; <b>TARGET LAST SEEN:<\u002Fb> WATERING HOLE δ &nbsp;//&nbsp; AMMO RESERVES LOW &nbsp;//&nbsp; HEAT WARNING IN EFFECT &nbsp;//&nbsp; ALLIANCE WATCH: VEX ⟷ MARCELLUS (FAKE) &nbsp;//&nbsp; RHINO AGITATION LEVEL: 7 &nbsp;//&nbsp; BAROMETER FALLING — \n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"ss-temp\">42°C / DUSK<\u002Fdiv>\n  <div class=\"ss-channel\">SAFARI-TV<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- TABS -->\n<div class=\"ss-tabs\" id=\"tabs\">\n  <button class=\"ss-tab active\" data-phase=\"intro\"><span class=\"ss-tab-num\">00<\u002Fspan>Intro<\u002Fbutton>\n  <button class=\"ss-tab\" data-phase=\"gather\"><span class=\"ss-tab-num\">01<\u002Fspan>Gather<\u002Fbutton>\n  <button class=\"ss-tab\" data-phase=\"smash\"><span class=\"ss-tab-num\">02<\u002Fspan>Gourd Smash<\u002Fbutton>\n  <button class=\"ss-tab\" data-phase=\"hunt\"><span class=\"ss-tab-num\">03<\u002Fspan>The Hunt<\u002Fbutton>\n  <button class=\"ss-tab\" data-phase=\"capture\"><span class=\"ss-tab-num\">04<\u002Fspan>Capture<\u002Fbutton>\n  <button class=\"ss-tab\" data-phase=\"tribunal\"><span class=\"ss-tab-num\">05<\u002Fspan>Tribunal<\u002Fbutton>\n<\u002Fdiv>\n\n<!-- SHELL -->\n<div class=\"ss-shell\">\n\n<!-- ═══════════════════ MAIN COLUMN ═══════════════════ -->\n<div class=\"ss-main\">\n\n<!-- ─── INTRO ─── -->\n<div class=\"ss-phase active\" id=\"phase-intro\">\n  <div class=\"ss-hero\">\n    <span class=\"ss-hero-corner tl\"><\u002Fspan><span class=\"ss-hero-corner tr\"><\u002Fspan>\n    <span class=\"ss-hero-corner bl\"><\u002Fspan><span class=\"ss-hero-corner br\"><\u002Fspan>\n    <div class=\"ss-hero-ep\">SEASON 04 <span class=\"dot\"><\u002Fspan> EPISODE 21 <span class=\"dot\"><\u002Fspan> TANZANIA <span class=\"dot\"><\u002Fspan> ORIG. AIR · 24·02<\u002Fdiv>\n    <div class=\"ss-hero-title\">SUNDOWN<br><span class=\"ember\">SAFARI<\u002Fspan><\u002Fdiv>\n    <div class=\"ss-hero-sub\">Feral Five · Tranq · Track · Survive<\u002Fdiv>\n    <div class=\"ss-hero-tagline\">Five contestants. One feral ex-player loose on the savanna. Three hours of daylight. And exactly enough tranq darts to ruin a friendship.<\u002Fdiv>\n    <div class=\"ss-hero-stats\">\n      <div class=\"ss-hero-stat\"><div class=\"lbl\">Remaining<\u002Fdiv><div class=\"val\">5 / 22<\u002Fdiv><\u002Fdiv>\n      <div class=\"ss-hero-stat\"><div class=\"lbl\">Target<\u002Fdiv><div class=\"val\">GHOUL-Z<\u002Fdiv><\u002Fdiv>\n      <div class=\"ss-hero-stat\"><div class=\"lbl\">Map size<\u002Fdiv><div class=\"val\">14.2 km²<\u002Fdiv><\u002Fdiv>\n      <div class=\"ss-hero-stat\"><div class=\"lbl\">Eliminated tonight<\u002Fdiv><div class=\"val\">×1<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ss-roster-strip\">\n      <div class=\"ss-rs-card\" style=\"--ss-clr:var(--ss-vex)\"><div class=\"av\">VX<\u002Fdiv><div class=\"nm\">VEX<\u002Fdiv><div class=\"arch\">The Silver Tongue<\u002Fdiv><\u002Fdiv>\n      <div class=\"ss-rs-card\" style=\"--ss-clr:var(--ss-marc)\"><div class=\"av\">MC<\u002Fdiv><div class=\"nm\">MARCELLUS<\u002Fdiv><div class=\"arch\">The Crown<\u002Fdiv><\u002Fdiv>\n      <div class=\"ss-rs-card\" style=\"--ss-clr:var(--ss-sig)\"><div class=\"av\">SG<\u002Fdiv><div class=\"nm\">SIGRID<\u002Fdiv><div class=\"arch\">The Obsessive<\u002Fdiv><\u002Fdiv>\n      <div class=\"ss-rs-card\" style=\"--ss-clr:var(--ss-codex)\"><div class=\"av\">CX<\u002Fdiv><div class=\"nm\">CODEX<\u002Fdiv><div class=\"arch\">Sedated · Asset<\u002Fdiv><\u002Fdiv>\n      <div class=\"ss-rs-card\" style=\"--ss-clr:var(--ss-razor)\"><div class=\"av\">RZ<\u002Fdiv><div class=\"nm\">RAZOR<\u002Fdiv><div class=\"arch\">The Carver<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"host\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av lg\" style=\"--ss-clr:var(--ss-gold)\">HX<\u002Fdiv>\n      <div>\n        <div class=\"ss-card-title\">Host Briefing — Drop Zone<\u002Fdiv>\n        <div class=\"ss-card-time\">⏱  17:42:08 · TANZANIA · SERENGETI PLAIN δ<\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"ss-badge ss-b-host\">Open<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-host-quote\">\n      <span class=\"qmark\">\"<\u002Fspan>\n      <div class=\"text\">Welcome to the most miserable real-estate tour in television history. There is one former contestant somewhere out there, and he is — and I quote our medic — <em>\"barefoot, partially talon'd, and ethically incapable of being charged rent.\"<\u002Fem> Tranq him, tag him, drag him back. Last plane out leaves in three hours. <em>Try to keep up.<\u002Fem>\n      <span class=\"who\">— HOST · INTRO MONOLOGUE<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"ghoul\">\n    <div class=\"ss-card-hdr\">\n      <span class=\"ss-card-title\">Target Dossier — GHOUL-Z<\u002Fspan>\n      <span class=\"ss-card-time\">FILE 0-Z · CARGO HOLD ESCAPEE<\u002Fspan>\n      <span class=\"ss-badge ss-b-ghoul\">FERAL<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Status: <em>fully feral.<\u002Fem> Hair: gone, save four heroic strands. Diet: <em>unknown / disturbing.<\u002Fem> Footwear: <em>none — but the feet themselves have evolved past needing any.<\u002Fem> Threat profile: <strong>medium-low<\u002Fstrong> in open terrain, <strong>biblical<\u002Fstrong> if he gets the high ground. Will charge anyone wearing red. Will flee anyone wearing the same hat he used to own. Has been observed forming sentences twice this week.\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>MAX SPEED <strong style=\"color:var(--ss-bone)\">38 km/h<\u002Fstrong><\u002Fspan>\n      <span>BITE FORCE <span class=\"neg\">REDACTED<\u002Fspan><\u002Fspan>\n      <span>LAST SEEN <span class=\"neu\">WATERING HOLE δ<\u002Fspan><\u002Fspan>\n      <span>BOUNTY <span class=\"pos\">INVINCIBILITY + 1st CLASS<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── PHASE 1: GATHER ─── -->\n<div class=\"ss-phase\" id=\"phase-gather\">\n  <div class=\"ss-card\" data-type=\"host\">\n    <div class=\"ss-card-hdr\">\n      <span class=\"ss-card-title\">Sock-It Toss · The Plum Run<\u002Fspan>\n      <span class=\"ss-badge ss-b-host\">CHALLENGE START<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-host-quote\">\n      <span class=\"qmark\">\"<\u002Fspan>\n      <div class=\"text\">Sprint to the plum pile. Bring back as many as you can carry. <em>Try to ignore the soccer balls.<\u002Fem> Each one I kick at your head is, legally, a love letter.\n      <span class=\"who\">— HOST · CHALLENGE 01<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"gather\" style=\"--ss-clr:var(--ss-sig)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av\" style=\"--ss-clr:var(--ss-sig)\">SG<\u002Fdiv>\n      <span class=\"ss-card-title\">Sigrid Goes First — Cody as Shield<\u002Fspan>\n      <span class=\"ss-card-time\">⏱  +00:42<\u002Fspan>\n      <span class=\"ss-badge ss-b-gather\">Phase 01 · Gather<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Sigrid sprints with <strong>Codex<\u002Fstrong> bouncing on her back like a sedated cabbage. Three soccer balls fly at her — all three rebound off <em>Codex's face<\u002Fem>. She returns with 11 plums and zero remorse. Codex returns with a new dent above his left eyebrow.\n    <\u002Fdiv>\n    <div class=\"ss-trajectory\">\n      <div class=\"ss-arc\" style=\"left:6%;top:62%;width:38%;transform:rotate(-22deg);\"><\u002Fdiv>\n      <div class=\"ss-arc\" style=\"left:42%;top:54%;width:30%;transform:rotate(-8deg);\"><\u002Fdiv>\n      <div class=\"ss-target\" style=\"right:6%;top:46%;\"><\u002Fdiv>\n      <div class=\"ss-traj-label\" style=\"left:6%;top:8%;\">PROJECTILE TRACE · 3 SHOTS LOGGED<\u002Fdiv>\n      <div class=\"ss-traj-label\" style=\"right:6%;bottom:8%;color:var(--ss-blood);\">→ IMPACT: CODEX (face) ×3<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>PLUMS <span class=\"pos\">+11<\u002Fspan><\u002Fspan>\n      <span>DAMAGE <span class=\"neg\">CODEX −18 HP<\u002Fspan><\u002Fspan>\n      <span>SIGRID <span class=\"pos\">untouched<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"gather\" style=\"--ss-clr:var(--ss-razor)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av\" style=\"--ss-clr:var(--ss-razor)\">RZ<\u002Fdiv>\n      <span class=\"ss-card-title\">Razor's Run — Two-Way Crossfire<\u002Fspan>\n      <span class=\"ss-card-time\">⏱  +01:28<\u002Fspan>\n      <span class=\"ss-badge ss-b-hazard\">DOUBLE HIT<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Razor boots the incoming ball back at the kicker. Successfully. <em>Twice.<\u002Fem> Then both <strong>Vex<\u002Fstrong> and <strong>Marcellus<\u002Fstrong> kick at the same instant. The balls cross-meet at the precise centre of Razor's forehead. He returns with 6 plums and the words <em>\"adidas\"<\u002Fem> bruised in reverse across his face.\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>PLUMS <span class=\"pos\">+6<\u002Fspan><\u002Fspan>\n      <span>HP <span class=\"neg\">−24<\u002Fspan><\u002Fspan>\n      <span>NEW GRUDGE <span class=\"neu\">Razor → Vex · Marcellus<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-conf\" style=\"--ss-clr:var(--ss-vex)\">\n    <div class=\"ss-conf-hdr\"><div class=\"ss-av sm\" style=\"--ss-clr:var(--ss-vex)\">VX<\u002Fdiv><span class=\"ss-conf-name\">VEX<\u002Fspan><\u002Fdiv>\n    <div class=\"ss-conf-body\">My brother plays professional football. I know exactly which angle ruins a friendship. Tonight is just <em>field practice<\u002Fem>, hermano.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"alliance\" style=\"--ss-clr:var(--ss-vex)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av sm\" style=\"--ss-clr:var(--ss-vex)\">VX<\u002Fdiv>\n      <div class=\"ss-av sm\" style=\"--ss-clr:var(--ss-marc)\">MC<\u002Fdiv>\n      <span class=\"ss-card-title\">The \"Misaimed\" Strike — Vex → Marcellus<\u002Fspan>\n      <span class=\"ss-badge ss-b-alliance\">SUBTLE<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Vex lines up a \"missed\" shot. Marcellus believes him. The ball arcs in a polite spiral, ricochets off three different rocks, and returns to slap the back of <strong>Marcellus's<\u002Fstrong> skull from behind. <em>\"He wouldn't kick a ball at his crush,\"<\u002Fem> she had said. The ball begs to differ.\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>TRUST <span class=\"neg\">Marcellus → Vex −2<\u002Fspan><\u002Fspan>\n      <span>DENIAL <span class=\"neu\">\"It curved on its own\"<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"win\" style=\"--ss-clr:var(--ss-vex)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av\" style=\"--ss-clr:var(--ss-vex)\">VX<\u002Fdiv>\n      <span class=\"ss-card-title\">Vex Untouched · Tactical Sweep<\u002Fspan>\n      <span class=\"ss-badge ss-b-gather\">CLEAN RUN<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      All four opponents kicked. All four balls returned to sender. Vex reaches the pile in 14 strides, fills his arms, and on the way back puts <strong>Sigrid<\u002Fstrong> — sorry, <em>Codex<\u002Fem> — into a small tree.\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>PLUMS <span class=\"pos\">+13 (max)<\u002Fspan><\u002Fspan>\n      <span>RETURNS <span class=\"pos\">×4 successful<\u002Fspan><\u002Fspan>\n      <span>STATUS <span class=\"pos\">UNTOUCHED<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── PHASE 2: GOURD SMASH ─── -->\n<div class=\"ss-phase\" id=\"phase-smash\">\n  <div class=\"ss-card\" data-type=\"host\">\n    <div class=\"ss-card-hdr\">\n      <span class=\"ss-card-title\">Gourd Smash · Tranq Ration Round<\u002Fspan>\n      <span class=\"ss-badge ss-b-host\">CHALLENGE 02<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-host-quote\">\n      <span class=\"qmark\">\"<\u002Fspan>\n      <div class=\"text\">Hit the gourd with a plum. <em>Whoever cracks first eats best.<\u002Fem> Six tranq darts to first place. One dart and a prayer to last.\n      <span class=\"who\">— HOST<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"smash\" style=\"--ss-clr:var(--ss-marc)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av\" style=\"--ss-clr:var(--ss-marc)\">MC<\u002Fdiv>\n      <span class=\"ss-card-title\">Marcellus Cracks First — 6 Darts<\u002Fspan>\n      <span class=\"ss-badge ss-b-smash\">1st<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Host calls Marcellus <em>\"Vex's girlfriend.\"<\u002Fem> Marcellus's eye twitches. The plum leaves her hand at velocity normally reserved for war crimes. <strong>The gourd explodes.<\u002Fstrong> Vex, standing nearby, takes the rebound directly to the throat.\n    <\u002Fdiv>\n    <div class=\"ss-ammo-strip\">\n      <span class=\"ss-ammo\"><\u002Fspan><span class=\"ss-ammo\"><\u002Fspan><span class=\"ss-ammo\"><\u002Fspan>\n      <span class=\"ss-ammo\"><\u002Fspan><span class=\"ss-ammo\"><\u002Fspan><span class=\"ss-ammo\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>DARTS <span class=\"pos\">×6<\u002Fspan><\u002Fspan>\n      <span>SLINGSHOT <span class=\"pos\">issued<\u002Fspan><\u002Fspan>\n      <span>COLLATERAL <span class=\"neg\">Vex −6 HP, dignity<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"smash\" style=\"--ss-clr:var(--ss-vex)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av\" style=\"--ss-clr:var(--ss-vex)\">VX<\u002Fdiv>\n      <span class=\"ss-card-title\">Vex — Clean Second<\u002Fspan>\n      <span class=\"ss-badge ss-b-smash\">2nd<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">Cracks the gourd on the second toss. Pretends he was aiming for first. Receives <strong>3 darts<\u002Fstrong> and a slingshot. Smiles at Marcellus. Marcellus does not smile back.<\u002Fdiv>\n    <div class=\"ss-ammo-strip\">\n      <span class=\"ss-ammo\"><\u002Fspan><span class=\"ss-ammo\"><\u002Fspan><span class=\"ss-ammo\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"smash\" style=\"--ss-clr:var(--ss-razor)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av\" style=\"--ss-clr:var(--ss-razor)\">RZ<\u002Fdiv>\n      <span class=\"ss-card-title\">Razor — Skips the Plum, Throws the Bat<\u002Fspan>\n      <span class=\"ss-badge ss-b-smash\">3rd<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">Refuses to use the plum. <em>\"Plums are for losers.\"<\u002Fem> Throws the cricket bat at the gourd helicopter-style. Bat lands. Gourd shatters. Host rules it valid. Razor gets <strong>2 darts<\u002Fstrong>. Razor protests. Razor gets <strong>2 darts<\u002Fstrong>.<\u002Fdiv>\n    <div class=\"ss-ammo-strip\">\n      <span class=\"ss-ammo\"><\u002Fspan><span class=\"ss-ammo\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"smash\" style=\"--ss-clr:var(--ss-sig)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av\" style=\"--ss-clr:var(--ss-sig)\">SG<\u002Fdiv>\n      <div class=\"ss-av sm injured\" style=\"--ss-clr:var(--ss-codex)\">CX<\u002Fdiv>\n      <span class=\"ss-card-title\">Sigrid &amp; Codex — No Slingshot Issued<\u002Fspan>\n      <span class=\"ss-badge ss-b-hazard\">DNF<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Plum overshoots the gourd and strikes the host's <strong>groin<\u002Fstrong> at terminal velocity. Crew stops filming. Crew resumes filming. Codex remains comatose. Sigrid builds her own slingshot from a fallen branch and Codex's spare underpants. <em>\"This is the most intimate thing we've ever shared.\"<\u002Fem>\n    <\u002Fdiv>\n    <div class=\"ss-ammo-strip\">\n      <span class=\"ss-ammo\"><\u002Fspan><span class=\"ss-ammo\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>DARTS <span class=\"neu\">×1 +×1 (improvised)<\u002Fspan><\u002Fspan>\n      <span>SLINGSHOT <span class=\"neg\">none issued · DIY<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-conf\" style=\"--ss-clr:var(--ss-sig)\">\n    <div class=\"ss-conf-hdr\"><div class=\"ss-av sm\" style=\"--ss-clr:var(--ss-sig)\">SG<\u002Fdiv><span class=\"ss-conf-name\">SIGRID<\u002Fspan><\u002Fdiv>\n    <div class=\"ss-conf-body\">Codex and I are functionally married. The state of Tanzania has simply not <em>caught up<\u002Fem>.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── PHASE 3: HUNT ─── -->\n<div class=\"ss-phase\" id=\"phase-hunt\">\n  <div class=\"ss-card\" data-type=\"host\">\n    <div class=\"ss-card-hdr\">\n      <span class=\"ss-card-title\">The Hunt Begins · 60-Minute Clock<\u002Fspan>\n      <span class=\"ss-badge ss-b-host\">PHASE 03 · OPEN MAP<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-host-quote\">\n      <span class=\"qmark\">\"<\u002Fspan>\n      <div class=\"text\">One target. Five tranqs spread across five hands. Sixty minutes. Last plane out is real. <em>I cannot stress this enough — the plane will leave you here.<\u002Fem>\n      <span class=\"who\">— HOST · HUNT GO<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"alliance\" style=\"--ss-clr:var(--ss-razor)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av sm\" style=\"--ss-clr:var(--ss-razor)\">RZ<\u002Fdiv>\n      <div class=\"ss-av sm\" style=\"--ss-clr:var(--ss-vex)\">VX<\u002Fdiv>\n      <div class=\"ss-av sm\" style=\"--ss-clr:var(--ss-marc)\">MC<\u002Fdiv>\n      <span class=\"ss-card-title\">Razor Pitches Three-Way · Marcellus Walks<\u002Fspan>\n      <span class=\"ss-badge ss-b-alliance\">REJECTED<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">Razor proposes a triangle. Marcellus refuses on principle. Heads west alone. <em>Crucial mistake:<\u002Fem> she joins the huddle for ten seconds first. By the time she leaves, <strong>Vex has pickpocketed all six of her darts.<\u002Fstrong><\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>AMMO TRANSFER <span class=\"neg\">Marc 6 → 0<\u002Fspan><\u002Fspan>\n      <span>VEX NOW <span class=\"pos\">+6 (=9 total)<\u002Fspan><\u002Fspan>\n      <span>MARC <span class=\"neg\">DEFENSELESS<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"hazard\" style=\"--ss-clr:var(--ss-marc)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av injured\" style=\"--ss-clr:var(--ss-marc)\">MC<\u002Fdiv>\n      <span class=\"ss-card-title\">Lion Encounter · No Ammo · 12m<\u002Fspan>\n      <span class=\"ss-card-time\">⏱  +03:14<\u002Fspan>\n      <span class=\"ss-badge ss-b-hazard\">PREDATOR<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Marcellus reaches for her dart pouch. Pouch empty. Pouch <em>has been empty<\u002Fem>. Twelve meters away, a lion is reaching for <strong>her<\u002Fstrong>. She does the only sensible thing — drops to all fours, makes herself <strong>more lion than the lion<\u002Fstrong>. The lion blinks. The lion leaves. Tanzania has rules about dignity it does not enforce.\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>HP <span class=\"neg\">−12 (sprint sprain)<\u002Fspan><\u002Fspan>\n      <span>AMMO <span class=\"neg\">0<\u002Fspan><\u002Fspan>\n      <span>SANITY <span class=\"neu\">questionable<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"hazard\" style=\"--ss-clr:var(--ss-vex)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av injured\" style=\"--ss-clr:var(--ss-vex)\">VX<\u002Fdiv>\n      <div class=\"ss-av injured sm\" style=\"--ss-clr:var(--ss-razor)\">RZ<\u002Fdiv>\n      <span class=\"ss-card-title\">Quicksand · Vex &amp; Razor<\u002Fspan>\n      <span class=\"ss-card-time\">⏱  +08:51<\u002Fspan>\n      <span class=\"ss-badge ss-b-hazard\">TERRAIN<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Both step onto the same wet patch like idiots in stereo. They sink to the waist. Vex extends a stick toward a passing shape in the brush — and the shape <em>grabs back<\u002Fem>. Ghoul-Z hauls both of them out and bolts before either can raise a slingshot. <strong>Closest sighting yet. Closest miss yet.<\u002Fstrong>\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>SIGHTING <span class=\"pos\">GHOUL-Z confirmed · sector γ<\u002Fspan><\u002Fspan>\n      <span>SHOTS <span class=\"neg\">0 fired<\u002Fspan><\u002Fspan>\n      <span>DEBT <span class=\"neu\">owed to the target<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"hazard\" style=\"--ss-clr:var(--ss-sig)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av\" style=\"--ss-clr:var(--ss-sig)\">SG<\u002Fdiv>\n      <span class=\"ss-card-title\">Rhino — Sigrid Throws Stone, Hits Rhino<\u002Fspan>\n      <span class=\"ss-badge ss-b-hazard\">PREDATOR<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Trying to flush Ghoul-Z out of the rocks, Sigrid pings a stone off a rhino's horn. The rhino has <em>thoughts<\u002Fem>. She flees. Codex catapults skyward, lands in an acacia, gets immediately abducted by a baboon. <strong>Sigrid declares war on the entire primate order.<\u002Fstrong>\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>HP <span class=\"neg\">−15 (rhino brush)<\u002Fspan><\u002Fspan>\n      <span>CODEX <span class=\"neg\">missing · airborne · baboon<\u002Fspan><\u002Fspan>\n      <span>FERAL RAGE METER <span class=\"neg\">+34<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"hazard\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av sm injured\" style=\"--ss-clr:var(--ss-vex)\">VX<\u002Fdiv>\n      <div class=\"ss-av sm injured\" style=\"--ss-clr:var(--ss-marc)\">MC<\u002Fdiv>\n      <div class=\"ss-av sm injured\" style=\"--ss-clr:var(--ss-razor)\">RZ<\u002Fdiv>\n      <div class=\"ss-av sm injured\" style=\"--ss-clr:var(--ss-sig)\">SG<\u002Fdiv>\n      <span class=\"ss-card-title\">Crossfire · Four-Way Mutual Tranq<\u002Fspan>\n      <span class=\"ss-badge ss-b-hazard\">FRIENDLY FIRE<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Two parties converge. Each mistakes the other for the target. Four tranq darts leave four slingshots at <em>the exact same second.<\u002Fem> Four hits. Four contestants drop to the dust simultaneously, twitching politely. The host arrives and, finding them sedated but conscious, makes them <strong>sing.<\u002Fstrong>\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>AMMO BURN <span class=\"neg\">−4 darts (1 each)<\u002Fspan><\u002Fspan>\n      <span>STATUS <span class=\"neu\">all sedated · all singing<\u002Fspan><\u002Fspan>\n      <span>HOST RATING <span class=\"pos\">★★★★★<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── PHASE 4: CAPTURE ─── -->\n<div class=\"ss-phase\" id=\"phase-capture\">\n  <div class=\"ss-card\" data-type=\"betray\" style=\"--ss-clr:var(--ss-vex)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av sm\" style=\"--ss-clr:var(--ss-vex)\">VX<\u002Fdiv>\n      <div class=\"ss-av sm\" style=\"--ss-clr:var(--ss-marc)\">MC<\u002Fdiv>\n      <div class=\"ss-av sm injured\" style=\"--ss-clr:var(--ss-razor)\">RZ<\u002Fdiv>\n      <span class=\"ss-card-title\">The Pact · Vex + Marcellus vs. Razor<\u002Fspan>\n      <span class=\"ss-badge ss-b-betray\">FAKE COVER<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Vex whispers: <em>\"Act like we hate each other. Then knock the rest out together.\"<\u002Fem> Marcellus says <em>\"even I'm not that ruthless,\"<\u002Fem> then immediately ruthless. She lures Razor with a fake question about his ex. Razor distracted. Vex trips him into a patch of <strong>Serengeti Blood Berries.<\u002Fstrong>\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>PACT <span class=\"pos\">SEALED · whisper-bond<\u002Fspan><\u002Fspan>\n      <span>RAZOR <span class=\"neg\">tripped · stained · soaked<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"ghoul\" style=\"--ss-clr:var(--ss-vex)\">\n    <div class=\"ss-card-hdr\">\n      <span class=\"ss-card-title\">Ghoul-Z Strikes — From the Watering Hole<\u002Fspan>\n      <span class=\"ss-card-time\">⏱  +47:08 · WATERING HOLE δ<\u002Fspan>\n      <span class=\"ss-badge ss-b-ghoul\">AMBUSH<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Razor wades into the hole to rinse the berries off. <strong>Ghoul-Z erupts from beneath the surface<\u002Fstrong> like a fanged hyena baptism and starts beating him with what appears to be his own boot. Vex, fully loaded and within range, has a clear shot at both of them.\n    <\u002Fdiv>\n    <div class=\"ss-trajectory\">\n      <div class=\"ss-arc\" style=\"left:8%;top:54%;width:36%;transform:rotate(-12deg);\"><\u002Fdiv>\n      <div class=\"ss-arc\" style=\"left:42%;top:48%;width:30%;transform:rotate(-4deg);\"><\u002Fdiv>\n      <div class=\"ss-target\" style=\"left:42%;top:42%;border-color:var(--ss-poison);\"><\u002Fdiv>\n      <div class=\"ss-target\" style=\"right:8%;top:38%;border-color:var(--ss-blood);\"><\u002Fdiv>\n      <div class=\"ss-traj-label\" style=\"left:8%;top:8%;\">VEX · DUAL TRANQ · 2 DART BURST<\u002Fdiv>\n      <div class=\"ss-traj-label\" style=\"right:8%;bottom:8%;color:var(--ss-poison);\">→ GHOUL-Z + RAZOR · DOWN<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>SHOTS <span class=\"pos\">2/9 fired<\u002Fspan><\u002Fspan>\n      <span>HITS <span class=\"pos\">2/2<\u002Fspan><\u002Fspan>\n      <span>TAGS <span class=\"pos\">GHOUL-Z + RAZOR<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-winner\">\n    <div class=\"tag\">CAPTURE CONFIRMED · CHALLENGE WIN<\u002Fdiv>\n    <div class=\"nm\">VEX<\u002Fdiv>\n    <div class=\"sub\">Invincibility + 1st-class compartment · choice of plus-one<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"host\">\n    <div class=\"ss-card-hdr\">\n      <span class=\"ss-card-title\">Boarding — Ghoul-Z Recovered (mostly)<\u002Fspan>\n      <span class=\"ss-badge ss-b-host\">JUMBO JET<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      The host attempts to leave Ghoul-Z on the runway. Ghoul-Z, displaying a level of self-advocacy he previously lacked, peels a sheet of metal from the fuselage and returns to economy class anyway. The pilot is informed only after takeoff.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── PHASE 5: TRIBUNAL ─── -->\n<div class=\"ss-phase\" id=\"phase-tribunal\">\n  <div class=\"ss-card\" data-type=\"host\">\n    <div class=\"ss-card-hdr\">\n      <span class=\"ss-card-title\">Tribunal · Barf-Bag Ceremony<\u002Fspan>\n      <span class=\"ss-badge ss-b-host\">VOTE OPEN<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-host-quote\">\n      <span class=\"qmark\">\"<\u002Fspan>\n      <div class=\"text\">Four of you vote. One of you walks. <em>One of you walks twice.<\u002Fem>\n      <span class=\"who\">— HOST · VOTE BRIEF<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-vote-box\">\n    <div class=\"ss-card-hdr\" style=\"margin-bottom:0;\">\n      <span class=\"ss-card-title\" style=\"color:var(--ss-blood)\">Vote Tally · 4 Ballots<\u002Fspan>\n      <span class=\"ss-badge ss-b-vote\">PLURALITY<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-vote-grid\">\n      <div class=\"ss-vote-col\">\n        <div class=\"ss-av lg\" style=\"--ss-clr:var(--ss-vex)\">VX<\u002Fdiv>\n        <div class=\"who\">VEX<\u002Fdiv>\n        <div class=\"ss-vote-tally\" style=\"--ss-clr:var(--ss-blood)\">×1<\u002Fdiv>\n        <div class=\"ss-vote-bars\"><span style=\"--ss-clr:var(--ss-blood)\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ss-vote-immune\">★ IMMUNE<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ss-vote-col\">\n        <div class=\"ss-av lg\" style=\"--ss-clr:var(--ss-marc)\">MC<\u002Fdiv>\n        <div class=\"who\">MARCELLUS<\u002Fdiv>\n        <div class=\"ss-vote-tally\" style=\"--ss-clr:var(--ss-blood)\">×1<\u002Fdiv>\n        <div class=\"ss-vote-bars\"><span style=\"--ss-clr:var(--ss-blood)\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ss-vote-col\">\n        <div class=\"ss-av lg\" style=\"--ss-clr:var(--ss-sig)\">SG<\u002Fdiv>\n        <div class=\"who\">SIGRID<\u002Fdiv>\n        <div class=\"ss-vote-tally\" style=\"--ss-clr:var(--ss-blood)\">×1<\u002Fdiv>\n        <div class=\"ss-vote-bars\"><span style=\"--ss-clr:var(--ss-blood)\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ss-vote-col\">\n        <div class=\"ss-av lg injured\" style=\"--ss-clr:var(--ss-razor)\">RZ<\u002Fdiv>\n        <div class=\"who\">RAZOR<\u002Fdiv>\n        <div class=\"ss-vote-tally\" style=\"--ss-clr:var(--ss-blood)\">×2<\u002Fdiv>\n        <div class=\"ss-vote-bars\"><span style=\"--ss-clr:var(--ss-blood)\"><\u002Fspan><span style=\"--ss-clr:var(--ss-blood)\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ss-vote-col\">\n        <div class=\"ss-av lg\" style=\"--ss-clr:var(--ss-codex)\">CX<\u002Fdiv>\n        <div class=\"who\">CODEX<\u002Fdiv>\n        <div class=\"ss-vote-tally\" style=\"--ss-clr:rgba(230,196,137,.3)\">×0<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"ko\" style=\"--ss-clr:var(--ss-razor)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av ko\" style=\"--ss-clr:var(--ss-razor)\">RZ<\u002Fdiv>\n      <span class=\"ss-card-title\">Razor — Eliminated (×2)<\u002Fspan>\n      <span class=\"ss-badge ss-b-vote\">EXIT<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Tossed out of the cargo bay mid-flight at 4,000 feet. <em>\"Honestly didn't think I'd make it back the first time,\"<\u002Fem> he mutters into the slipstream, carving his initials into the wind. Parachute deploys. Probably.\n    <\u002Fdiv>\n    <div class=\"ss-card-meta\">\n      <span>FINISH <span class=\"neg\">5th<\u002Fspan><\u002Fspan>\n      <span>TIMES ELIMINATED <span class=\"neg\">×2<\u002Fspan><\u002Fspan>\n      <span>TRADEMARK <span class=\"neu\">\"Cool either way.\"<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ss-card\" data-type=\"win\" style=\"--ss-clr:var(--ss-vex)\">\n    <div class=\"ss-card-hdr\">\n      <div class=\"ss-av\" style=\"--ss-clr:var(--ss-vex)\">VX<\u002Fdiv>\n      <div class=\"ss-av sm\" style=\"--ss-clr:var(--ss-codex)\">CX<\u002Fdiv>\n      <span class=\"ss-card-title\">First-Class Plus-One — Vex Picks Codex<\u002Fspan>\n      <span class=\"ss-badge ss-b-host\">UNEXPECTED<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-card-body\">\n      Skipping the obvious choice, Vex selects <strong>Codex<\u002Fstrong>. Sigrid combusts. Marcellus stares. Vex smiles like a chess player six moves ahead in a game everyone else thought was checkers. <em>Cut to credits.<\u002Fem>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n<!-- ═══════════════════ END MAIN ═══════════════════ -->\n\n<!-- ═══════════════════ SIDEBAR ═══════════════════ -->\n<div class=\"ss-side\">\n\n  <!-- PHASE PROGRESS -->\n  <div class=\"ss-sbox\">\n    <div class=\"ss-sbox-hdr\">\n      <span class=\"ss-sbox-title\">Challenge Progress<\u002Fspan>\n      <span class=\"ss-sbox-meta\">3 of 5<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ss-progress\">\n      <div class=\"ss-prog-step done\"><span class=\"n\">01<\u002Fspan>GATHER<\u002Fdiv>\n      <div class=\"ss-prog-step done\"><span class=\"n\">02<\u002Fspan>SMASH<\u002Fdiv>\n      <div class=\"ss-prog-step now\"><span class=\"n\">03<\u002Fspan>HUNT<\u002Fdiv>\n      <div class=\"ss-prog-step\"><span class=\"n\">04<\u002Fspan>CAPTURE<\u002Fdiv>\n      <div class=\"ss-prog-step\"> ehavior:'smooth'});\n}));\n\n/* Dust motes */\nconst dust = document.getElementById('dustLayer');\nfor (let i = 0; i < 26; i++) {\n  const m = document.createElement('div');\n  m.className = 'ss-mote';\n  m.style.left = Math.random() * 100 + '%';\n  m.style.top = (40 + Math.random() * 60) + '%';\n  m.style.animationDuration = (8 + Math.random() * 14) + 's';\n  m.style.animationDelay = (-Math.random() * 14) + 's';\n  m.style.opacity = (0.3 + Math.random() * 0.5);\n  m.style.width = m.style.height = (2 + Math.random() * 3) + 'px';\n  dust.appendChild(m);\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
