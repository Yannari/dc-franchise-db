document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Karla';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"9cd2916b-6043-40cb-a15d-68522215b3e4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Karla';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"69946f36-8a35-4d1f-aa0c-c5fca83fa2a3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Karla';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9cd2916b-6043-40cb-a15d-68522215b3e4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Karla';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"69946f36-8a35-4d1f-aa0c-c5fca83fa2a3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ═══════════════════════════════════════════════════════\n   RAPA PHOOEY! — Final Four Field Log\n   Easter Island · Egg Hunt · Reward Challenge\n   Prefix: rp-\n   ═══════════════════════════════════════════════════════ */\n:root{\n  /* environment */\n  --rp-abyss:#070d12;\n  --rp-deep:#0d1820;\n  --rp-stormy:#1a2a36;\n  --rp-ocean:#1e4658;\n  --rp-tide:#2a7a8c;\n  --rp-surf:#4ec0d4;\n  --rp-foam:#a8e0e6;\n  --rp-moai-shadow:#2a2620;\n  --rp-moai:#5a544a;\n  --rp-moai-lit:#8a8276;\n  --rp-tuff:#c8b89a;\n  --rp-bone:#ecdfc8;\n  --rp-paper:#f4ead4;\n  --rp-coral:#e87654;\n  --rp-sunset:#f0a464;\n  --rp-volcanic:#8a2828;\n\n  /* egg + contestant colors (canonical headset hues) */\n  --rp-egg-blue:#4a82d4;   /* Alejandro */\n  --rp-egg-red:#d44a4a;    /* Heather */\n  --rp-egg-purple:#a060d4; /* Cody */\n  --rp-egg-green:#5ab04a;  /* Sierra */\n  --rp-chick:#f4c842;      /* Cody Jr. */\n\n  /* shorthand for contestant accents */\n  --rp-alej:var(--rp-egg-blue);\n  --rp-heat:var(--rp-egg-red);\n  --rp-cody:var(--rp-egg-purple);\n  --rp-sier:var(--rp-egg-green);\n  --rp-cjr:var(--rp-chick);\n}\n*{margin:0;padding:0;box-sizing:border-box;}\nhtml,body{overflow-x:hidden;}\nbody{\n  background:var(--rp-abyss);color:var(--rp-bone);\n  font-family:'Karla',sans-serif;font-size:14px;line-height:1.55;\n  min-height:100vh;letter-spacing:.01em;\n}\n\n/* ═══ OCEAN / SKY BACKDROP ═══ */\n.rp-sea{position:fixed;inset:0;z-index:0;pointer-events:none;\n  background:\n    radial-gradient(ellipse 60% 40% at 50% 10%, rgba(232,118,84,.18) 0%, transparent 55%),\n    radial-gradient(ellipse 100% 60% at 50% 100%, rgba(30,70,88,.6) 0%, transparent 65%),\n    linear-gradient(180deg,#070d12 0%,#0d1820 25%,#1a2a36 55%,#1e4658 88%,#2a7a8c 100%);\n}\n.rp-stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6;\n  background-image:\n    radial-gradient(1px 1px at 14% 12%, var(--rp-foam) 50%, transparent),\n    radial-gradient(1px 1px at 32% 8%, var(--rp-bone) 50%, transparent),\n    radial-gradient(1px 1px at 68% 18%, var(--rp-foam) 50%, transparent),\n    radial-gradient(1.5px 1.5px at 82% 6%, var(--rp-bone) 50%, transparent),\n    radial-gradient(1px 1px at 51% 22%, var(--rp-foam) 50%, transparent),\n    radial-gradient(1px 1px at 90% 30%, var(--rp-foam) 50%, transparent),\n    radial-gradient(1px 1px at 8% 28%, var(--rp-bone) 50%, transparent);\n  background-size:100% 100%;}\n\n/* Moai silhouettes on horizon */\n.rp-horizon{position:fixed;left:0;right:0;bottom:0;height:30vh;z-index:1;pointer-events:none;}\n.rp-moai-sil{position:absolute;bottom:0;background:var(--rp-abyss);\n  filter:drop-shadow(0 0 18px rgba(0,0,0,.5));}\n.rp-moai-sil .head{width:60px;height:78px;background:var(--rp-abyss);\n  border-radius:30px 30px 8px 8px;position:relative;}\n.rp-moai-sil .head::before{content:'';position:absolute;top:34%;left:14%;width:20%;height:24%;\n  background:var(--rp-stormy);border-radius:8px 8px 0 0;box-shadow:130% 0 0 var(--rp-stormy);}\n.rp-moai-sil .head::after{content:'';position:absolute;top:62%;left:30%;width:40%;height:8%;\n  background:var(--rp-stormy);border-radius:2px;}\n.rp-moai-sil .body{width:78px;height:50px;background:var(--rp-abyss);margin-left:-9px;\n  border-radius:12px 12px 0 0;}\n.rp-moai-sil.s1{left:4%;transform:scale(.55);}\n.rp-moai-sil.s2{left:13%;transform:scale(.9);}\n.rp-moai-sil.s3{left:24%;transform:scale(.7);}\n.rp-moai-sil.s4{left:62%;transform:scale(.65);}\n.rp-moai-sil.s5{left:74%;transform:scale(1);}\n.rp-moai-sil.s6{left:88%;transform:scale(.6);}\n.rp-waves{position:fixed;left:0;right:0;bottom:0;height:14vh;z-index:1;pointer-events:none;\n  background:\n    repeating-linear-gradient(90deg,\n      rgba(78,192,212,.0) 0px,\n      rgba(78,192,212,.08) 14px,\n      rgba(78,192,212,.0) 28px),\n    linear-gradient(180deg,transparent 0%,rgba(30,70,88,.4) 60%,rgba(42,122,140,.5) 100%);\n  -webkit-mask:linear-gradient(180deg,transparent 0%,#000 60%);\n          mask:linear-gradient(180deg,transparent 0%,#000 60%);}\n\n/* Sea spray motes */\n.rp-spray{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden;}\n.rp-mote{position:absolute;width:2px;height:2px;border-radius:50%;\n  background:var(--rp-foam);box-shadow:0 0 4px rgba(168,224,230,.7);opacity:0;\n  animation:rp-drift linear infinite;}\n@keyframes rp-drift{\n  0%{transform:translate(0,0);opacity:0;}\n  10%{opacity:.7;}\n  90%{opacity:.4;}\n  100%{transform:translate(-30vw,-40vh);opacity:0;}\n}\n\n/* ═══ TOP CHROME — EXPEDITION HEADER ═══ */\n.rp-chrome{position:fixed;top:0;left:0;right:0;height:42px;z-index:50;\n  background:linear-gradient(90deg,rgba(7,13,18,.97),rgba(30,70,88,.88) 70%,rgba(7,13,18,.97));\n  border-bottom:1px solid var(--rp-tide);\n  display:flex;align-items:center;justify-content:space-between;padding:0 18px;\n  font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.5px;\n  backdrop-filter:blur(10px);}\n.rp-rec{display:flex;align-items:center;gap:8px;color:var(--rp-coral);font-weight:600;}\n.rp-rec-dot{width:8px;height:8px;background:var(--rp-coral);border-radius:50%;\n  box-shadow:0 0 12px var(--rp-coral);animation:rp-pulse 1.4s ease infinite;}\n@keyframes rp-pulse{0%,100%{opacity:1;}50%{opacity:.2;}}\n.rp-coord{flex:1;overflow:hidden;margin:0 24px;position:relative;height:18px;}\n.rp-coord-inner{position:absolute;white-space:nowrap;color:var(--rp-foam);\n  animation:rp-scroll 42s linear infinite;}\n.rp-coord-inner b{color:var(--rp-sunset);}\n@keyframes rp-scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}\n.rp-call{color:var(--rp-surf);font-weight:600;letter-spacing:3px;}\n.rp-wind{color:var(--rp-sunset);}\n\n/* Phase tabs */\n.rp-tabs{position:fixed;top:42px;left:0;right:0;z-index:49;\n  background:rgba(7,13,18,.94);border-bottom:1px solid rgba(78,192,212,.15);\n  display:flex;justify-content:center;gap:2px;padding:0 16px;backdrop-filter:blur(10px);}\n.rp-tab{padding:11px 18px;cursor:pointer;border:none;background:transparent;\n  font-family:'Bungee',sans-serif;font-size:11px;letter-spacing:2.2px;\n  color:rgba(236,223,200,.42);text-transform:uppercase;\n  border-bottom:2px solid transparent;transition:all .2s;}\n.rp-tab:hover{color:var(--rp-bone);}\n.rp-tab.active{color:var(--rp-foam);border-bottom-color:var(--rp-surf);}\n.rp-tab .n{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--rp-ocean);\n  margin-right:6px;letter-spacing:1px;font-weight:600;}\n.rp-tab.active .n{color:var(--rp-coral);}\n\n/* ═══ SHELL ═══ */\n.rp-shell{position:relative;z-index:10;max-width:1260px;margin:96px auto 60px;\n  display:grid;grid-template-columns:1fr 350px;gap:20px;padding:0 20px;}\n.rp-main{min-width:0;}\n.rp-phase{display:none;animation:rp-fade .45s ease;}\n.rp-phase.active{display:block;}\n@keyframes rp-fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}\n\n/* ═══ HERO ═══ */\n.rp-hero{position:relative;padding:42px 32px 36px;margin-bottom:20px;\n  border:1px solid rgba(78,192,212,.22);border-radius:4px;overflow:hidden;\n  background:\n    linear-gradient(135deg,rgba(30,70,88,.55),rgba(7,13,18,.45)),\n    repeating-linear-gradient(45deg,transparent 0,transparent 18px,rgba(168,224,230,.025) 18px,rgba(168,224,230,.025) 19px);\n}\n.rp-hero::before{content:'';position:absolute;inset:0;\n  background:radial-gradient(ellipse at top right,rgba(232,118,84,.12),transparent 60%);\n  pointer-events:none;}\n/* carved corner glyphs */\n.rp-glyph{position:absolute;font-family:'Bungee',sans-serif;font-size:11px;letter-spacing:3px;\n  color:var(--rp-tide);opacity:.7;}\n.rp-glyph.tl{top:14px;left:18px;}\n.rp-glyph.tr{top:14px;right:18px;color:var(--rp-coral);}\n.rp-glyph.bl{bottom:14px;left:18px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:1.5px;}\n.rp-glyph.br{bottom:14px;right:18px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:1.5px;color:var(--rp-foam);}\n\n.rp-hero-meta{display:flex;gap:14px;align-items:center;font-family:'IBM Plex Mono',monospace;\n  font-size:10px;letter-spacing:3.5px;color:var(--rp-surf);margin-bottom:18px;text-transform:uppercase;}\n.rp-hero-meta .dot{width:5px;height:5px;background:var(--rp-coral);border-radius:50%;}\n.rp-hero-meta .pip{color:var(--rp-sunset);}\n\n.rp-hero-title{font-family:'Bungee Inline',sans-serif;font-size:88px;line-height:.92;\n  color:var(--rp-bone);letter-spacing:2px;text-transform:uppercase;\n  text-shadow:5px 5px 0 var(--rp-ocean),9px 9px 0 rgba(7,13,18,.5);}\n.rp-hero-title .coral{color:var(--rp-coral);}\n.rp-hero-title .bang{display:inline-block;color:var(--rp-sunset);transform:rotate(8deg);margin-left:-4px;}\n.rp-hero-sub{font-family:'Bungee',sans-serif;font-size:14px;letter-spacing:6px;\n  color:var(--rp-foam);margin-top:12px;text-transform:uppercase;}\n.rp-hero-tag{margin-top:22px;font-family:'Cutive Mono',monospace;\n  font-size:13px;color:rgba(236,223,200,.78);max-width:600px;line-height:1.7;}\n\n.rp-hero-stats{display:flex;gap:14px;margin-top:24px;flex-wrap:wrap;}\n.rp-hero-stat{padding:10px 16px;border:1px solid rgba(78,192,212,.22);border-radius:3px;\n  background:rgba(7,13,18,.4);min-width:120px;}\n.rp-hero-stat .lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;\n  color:var(--rp-tide);text-transform:uppercase;}\n.rp-hero-stat .val{font-family:'Bungee',sans-serif;font-size:18px;color:var(--rp-foam);\n  letter-spacing:.5px;margin-top:3px;}\n.rp-hero-stat .val.coral{color:var(--rp-coral);}\n\n/* Roster strip */\n.rp-roster-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:26px;}\n.rp-rs{padding:12px 10px 10px;border:1px solid rgba(78,192,212,.18);background:rgba(7,13,18,.55);\n  border-radius:3px;text-align:center;position:relative;\n  border-top:4px solid var(--rp-clr,var(--rp-surf));}\n.rp-rs .av{width:50px;height:50px;border-radius:50%;margin:0 auto 8px;\n  background:var(--rp-clr,var(--rp-surf));display:flex;align-items:center;justify-content:center;\n  font-family:'Bungee',sans-serif;font-size:17px;color:var(--rp-abyss);\n  border:2px solid rgba(7,13,18,.7);box-shadow:0 0 0 1px rgba(255,255,255,.08);}\n.rp-rs .feather{position:absolute;top:-6px;right:-4px;font-family:'Bungee',sans-serif;\n  font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:2px;\n  background:var(--rp-clr,var(--rp-surf));color:var(--rp-abyss);transform:rotate(8deg);}\n.rp-rs .nm{font-family:'Bungee',sans-serif;font-size:13px;letter-spacing:1.5px;\n  color:var(--rp-bone);}\n.rp-rs .arch{font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:1px;\n  color:var(--rp-tide);text-transform:uppercase;margin-top:3px;}\n\n/* ═══ CARDS ═══ */\n.rp-card{position:relative;margin:14px 0;padding:18px 20px 18px 24px;border-radius:4px;\n  border:1px solid rgba(78,192,212,.14);\n  background:linear-gradient(135deg,rgba(30,70,88,.32),rgba(7,13,18,.4));\n  animation:rp-cardin .55s cubic-bezier(.16,1,.3,1) forwards;}\n@keyframes rp-cardin{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:none;}}\n.rp-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;\n  background:var(--rp-clr,var(--rp-surf));}\n.rp-card[data-type=\"host\"]{background:linear-gradient(135deg,rgba(232,118,84,.08),rgba(7,13,18,.4));}\n.rp-card[data-type=\"host\"]::before{background:var(--rp-sunset);}\n.rp-card[data-type=\"hazard\"]::before{background:var(--rp-coral);\n  background-image:repeating-linear-gradient(0deg,var(--rp-coral) 0,var(--rp-coral) 4px,var(--rp-abyss) 4px,var(--rp-abyss) 7px);}\n.rp-card[data-type=\"alliance\"]::before{background:var(--rp-clr,var(--rp-surf));\n  background-image:repeating-linear-gradient(0deg,var(--rp-clr,var(--rp-surf)) 0,var(--rp-clr,var(--rp-surf)) 6px,transparent 6px,transparent 10px);}\n.rp-card[data-type=\"bribe\"]::before{background:var(--rp-chick);}\n.rp-card[data-type=\"egg\"]::before{background:var(--rp-clr,var(--rp-egg-green));}\n.rp-card[data-type=\"vote\"]::before{background:var(--rp-volcanic);}\n.rp-card[data-type=\"win\"]::before{background:var(--rp-chick);}\n.rp-card[data-type=\"twist\"]::before{background:var(--rp-sunset);\n  background-image:repeating-linear-gradient(45deg,var(--rp-sunset) 0,var(--rp-sunset) 5px,var(--rp-coral) 5px,var(--rp-coral) 10px);}\n\n.rp-card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}\n.rp-card-title{font-family:'Bungee',sans-serif;font-size:14px;letter-spacing:1.5px;\n  color:var(--rp-bone);text-transform:uppercase;}\n.rp-card-time{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--rp-tide);\n  letter-spacing:1.2px;}\n.rp-badge{margin-left:auto;padding:3px 9px;border-radius:2px;font-family:'IBM Plex Mono',monospace;\n  font-size:8.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;border:1px solid;}\n.rp-b-host{color:var(--rp-sunset);border-color:rgba(240,164,100,.5);background:rgba(240,164,100,.08);}\n.rp-b-alej{color:var(--rp-egg-blue);border-color:rgba(74,130,212,.5);background:rgba(74,130,212,.08);}\n.rp-b-heat{color:var(--rp-egg-red);border-color:rgba(212,74,74,.5);background:rgba(212,74,74,.08);}\n.rp-b-cody{color:var(--rp-egg-purple);border-color:rgba(160,96,212,.5);background:rgba(160,96,212,.08);}\n.rp-b-sier{color:var(--rp-egg-green);border-color:rgba(90,176,74,.5);background:rgba(90,176,74,.08);}\n.rp-b-hazard{color:var(--rp-coral);border-color:rgba(232,118,84,.5);background:rgba(232,118,84,.08);}\n.rp-b-bribe{color:var(--rp-chick);border-color:rgba(244,200,66,.5);background:rgba(244,200,66,.08);}\n.rp-b-alliance{color:var(--rp-surf);border-color:rgba(78,192,212,.5);background:rgba(78,192,212,.08);}\n.rp-b-vote{color:var(--rp-volcanic);border-color:rgba(138,40,40,.6);background:rgba(138,40,40,.1);\n  color:#e08080;}\n.rp-b-twist{color:var(--rp-sunset);border-color:rgba(240,164,100,.6);background:rgba(240,164,100,.12);}\n\n.rp-card-body{font-size:13.5px;line-height:1.7;color:rgba(236,223,200,.85);}\n.rp-card-body em{color:var(--rp-sunset);font-style:normal;font-weight:600;}\n.rp-card-body strong{color:var(--rp-foam);font-weight:700;}\n.rp-card-body i{color:var(--rp-chick);font-style:italic;}\n.rp-card-meta{margin-top:11px;padding-top:9px;border-top:1px dashed rgba(78,192,212,.15);\n  display:flex;gap:16px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:10px;\n  color:var(--rp-tide);letter-spacing:.3px;}\n.rp-card-meta .pos{color:var(--rp-egg-green);}\n.rp-card-meta .neg{color:var(--rp-coral);}\n.rp-card-meta .neu{color:var(--rp-surf);}\n.rp-card-meta .gold{color:var(--rp-chick);}\n\n/* avatars */\n.rp-av{width:32px;height:32px;border-radius:50%;background:var(--rp-clr,var(--rp-surf));\n  display:inline-flex;align-items:center;justify-content:center;\n  font-family:'Bungee',sans-serif;font-size:13px;color:var(--rp-abyss);\n  border:2px solid rgba(7,13,18,.7);flex-shrink:0;letter-spacing:.4px;\n  box-shadow:0 0 0 1px rgba(255,255,255,.08);}\n.rp-av.sm{width:24px;height:24px;font-size:10px;border-width:1.5px;}\n.rp-av.lg{width:48px;height:48px;font-size:18px;}\n.rp-av.candied{box-shadow:0 0 0 2px var(--rp-chick),0 0 10px rgba(244,200,66,.5);}\n.rp-av.dazed{filter:saturate(.6) brightness(.85);}\n.rp-av.out{filter:grayscale(1) brightness(.5);opacity:.55;}\n\n/* Host quote */\n.rp-quote{display:flex;gap:14px;align-items:flex-start;}\n.rp-quote .mark{font-family:'Bungee Inline',sans-serif;font-size:46px;color:var(--rp-sunset);\n  line-height:.7;margin-top:-2px;}\n.rp-quote .text{font-family:'Cinzel',serif;font-size:14.5px;font-weight:600;\n  color:var(--rp-bone);line-height:1.6;}\n.rp-quote .who{display:block;margin-top:8px;font-family:'IBM Plex Mono',monospace;\n  font-size:9px;color:var(--rp-sunset);letter-spacing:2.5px;font-weight:500;}\n\n/* Confessional */\n.rp-conf{margin:14px 0;padding:16px 18px 14px 22px;background:rgba(7,13,18,.5);\n  border-left:3px solid var(--rp-clr,var(--rp-surf));border-radius:2px;position:relative;}\n.rp-conf::before{content:'◢ CONFESSIONAL CAM';position:absolute;top:-7px;left:14px;background:var(--rp-abyss);\n  padding:0 8px;font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:2px;\n  color:var(--rp-tide);font-weight:600;}\n.rp-conf-hdr{display:flex;align-items:center;gap:10px;margin-bottom:7px;}\n.rp-conf-name{font-family:'Bungee',sans-serif;font-size:12px;letter-spacing:1.5px;\n  color:var(--rp-clr,var(--rp-surf));}\n.rp-conf-body{font-family:'Cutive Mono',monospace;font-size:13px;line-height:1.6;\n  color:rgba(236,223,200,.8);font-style:italic;}\n\n/* ═══ EGG-HUNT GRID — moai heads with eggs ═══ */\n.rp-heads{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;}\n.rp-head{position:relative;padding:14px 10px 12px;border:1px solid rgba(78,192,212,.12);\n  background:linear-gradient(180deg,rgba(90,84,74,.18),rgba(7,13,18,.4));\n  border-radius:3px;text-align:center;}\n.rp-head .icon{width:42px;height:54px;margin:0 auto 6px;background:var(--rp-moai);\n  border-radius:21px 21px 4px 4px;position:relative;\n  box-shadow:inset -4px -2px 0 rgba(0,0,0,.25);}\n.rp-head .icon::before{content:'';position:absolute;top:34%;left:18%;width:18%;height:20%;\n  background:var(--rp-abyss);border-radius:6px 6px 0 0;box-shadow:120% 0 0 var(--rp-abyss);}\n.rp-head .icon::after{content:'';position:absolute;top:60%;left:32%;width:36%;height:8%;\n  background:var(--rp-abyss);border-radius:2px;}\n.rp-head .lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.2px;\n  color:var(--rp-tuff);text-transform:uppercase;margin-bottom:4px;}\n.rp-head .eggs{display:flex;justify-content:center;gap:3px;margin-top:6px;}\n.rp-head .egg{width:11px;height:14px;border-radius:50% 50% 45% 45%;\n  background:var(--rp-egg-c,var(--rp-tuff));box-shadow:inset -2px -3px 0 rgba(0,0,0,.25);\n  border:1px solid rgba(0,0,0,.3);}\n.rp-head .egg.empty{background:transparent;border:1px dashed rgba(236,223,200,.2);\n  box-shadow:none;}\n.rp-head .ghoul{position:absolute;top:6px;right:6px;font-family:'IBM Plex Mono',monospace;\n  font-size:8px;color:var(--rp-coral);letter-spacing:1px;font-weight:600;}\n.rp-head.condor{background:linear-gradient(180deg,rgba(138,40,40,.18),rgba(7,13,18,.5));\n  border-color:rgba(232,118,84,.4);}\n.rp-head.condor .icon{background:var(--rp-volcanic);}\n.rp-head.condor .icon::after{content:'⚠';color:var(--rp-coral);background:transparent;\n  width:auto;height:auto;left:50%;top:30%;transform:translateX(-50%);\n  font-family:sans-serif;font-size:18px;font-weight:700;}\n.rp-head.condor .icon::before{display:none;}\n\n/* ═══ ALTITUDE METER — Pillar climb ═══ */\n.rp-altitude{display:grid;grid-template-columns:60px 1fr;gap:12px;margin:14px 0;\n  padding:14px;background:rgba(7,13,18,.4);border:1px solid rgba(78,192,212,.12);border-radius:3px;}\n.rp-alt-y{position:relative;width:100%;height:200px;display:flex;align-items:flex-end;\n  justify-content:center;}\n.rp-alt-pillar{width:14px;height:100%;background:\n  linear-gradient(180deg,var(--rp-tuff) 0%,var(--rp-moai) 50%,var(--rp-moai-shadow) 100%);\n  border-radius:7px 7px 0 0;box-shadow:inset -4px 0 0 rgba(0,0,0,.3);position:relative;}\n.rp-alt-nest{position:absolute;top:-12px;left:50%;transform:translateX(-50%);\n  width:46px;height:18px;background:var(--rp-clay,#5a3a20);border-radius:23px 23px 6px 6px;\n  border:1px solid rgba(0,0,0,.4);}\n.rp-alt-nest::before{content:'';position:absolute;top:-8px;left:8px;right:8px;height:14px;\n  background:radial-gradient(circle at 30% 50%,var(--rp-egg-red) 4px,transparent 5px),\n             radial-gradient(circle at 70% 50%,var(--rp-egg-red) 4px,transparent 5px),\n             radial-gradient(circle at 50% 30%,var(--rp-egg-blue) 4px,transparent 5px);}\n.rp-alt-track{position:relative;display:flex;flex-direction:column;justify-content:space-between;\n  padding:6px 0;}\n.rp-alt-tick{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;\n  font-size:9px;color:var(--rp-tide);letter-spacing:1px;}\n.rp-alt-tick::before{content:'—';color:var(--rp-tide);}\n.rp-alt-row{display:flex;align-items:center;gap:10px;flex:1;}\n.rp-alt-marker{padding:3px 8px;font-family:'IBM Plex Mono',monospace;font-size:9px;\n  border:1px solid var(--rp-clr,var(--rp-surf));color:var(--rp-clr,var(--rp-surf));\n  background:rgba(7,13,18,.6);letter-spacing:1px;border-radius:2px;}\n\n/* ═══ TRAJECTORY (used for condor swoop) ═══ */\n.rp-traj{position:relative;height:110px;margin:12px 0;background:rgba(7,13,18,.4);\n  border:1px solid rgba(78,192,212,.1);border-radius:3px;overflow:hidden;}\n.rp-traj::before{content:'';position:absolute;inset:0;\n  background-image:linear-gradient(90deg,rgba(78,192,212,.06) 1px,transparent 1px),\n                   linear-gradient(0deg,rgba(78,192,212,.06) 1px,transparent 1px);\n  background-size:22px 22px;}\n.rp-traj-arc{position:absolute;height:2px;background:linear-gradient(90deg,transparent,var(--rp-coral) 30%,var(--rp-sunset));\n  border-radius:1px;transform-origin:left center;box-shadow:0 0 6px rgba(232,118,84,.4);}\n.rp-traj-pin{position:absolute;width:16px;height:16px;border:2px solid var(--rp-clr,var(--rp-coral));\n  border-radius:50%;display:flex;align-items:center;justify-content:center;\n  background:rgba(7,13,18,.7);}\n.rp-traj-pin::after{content:'';width:4px;height:4px;background:var(--rp-clr,var(--rp-coral));border-radius:50%;}\n.rp-traj-lbl{position:absolute;font-family:'IBM Plex Mono',monospace;font-size:9px;\n  color:var(--rp-tuff);letter-spacing:1px;}\n\n/* ═══ SIDEBAR ═══ */\n.rp-side{position:sticky;top:96px;align-self:start;display:flex;flex-direction:column;gap:14px;\n  max-height:calc(100vh - 116px);overflow-y:auto;scrollbar-width:thin;\n  scrollbar-color:rgba(78,192,212,.25) transparent;padding-right:2px;}\n.rp-side::-webkit-scrollbar{width:5px;}\n.rp-side::-webkit-scrollbar-thumb{background:rgba(78,192,212,.25);border-radius:3px;}\n.rp-box{padding:14px;border:1px solid rgba(78,192,212,.18);border-radius:4px;\n  background:linear-gradient(135deg,rgba(30,70,88,.48),rgba(7,13,18,.55));\n  backdrop-filter:blur(4px);}\n.rp-box-hdr{display:flex;align-items:center;justify-content:space-between;\n  margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid rgba(78,192,212,.14);}\n.rp-box-title{font-family:'Bungee',sans-serif;font-size:11px;letter-spacing:2.2px;\n  color:var(--rp-surf);text-transform:uppercase;}\n.rp-box-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;\n  color:var(--rp-tide);}\n\n/* progress */\n.rp-progress{display:flex;gap:0;border-radius:3px;overflow:hidden;border:1px solid rgba(78,192,212,.15);}\n.rp-prog-step{flex:1;padding:9px 5px;text-align:center;font-family:'IBM Plex Mono',monospace;\n  font-size:8.5px;letter-spacing:1px;color:rgba(236,223,200,.4);\n  border-right:1px solid rgba(78,192,212,.1);background:rgba(7,13,18,.4);}\n.rp-prog-step:last-child{border-right:none;}\n.rp-prog-step.done{background:rgba(90,176,74,.12);color:var(--rp-egg-green);}\n.rp-prog-step.now{background:rgba(232,118,84,.18);color:var(--rp-sunset);font-weight:700;\n  box-shadow:inset 0 -2px 0 var(--rp-coral);}\n.rp-prog-step .n{display:block;font-family:'Bungee',sans-serif;font-size:13px;letter-spacing:0;\n  color:inherit;margin-bottom:2px;}\n\n/* MAP — Rapa Nui island shape */\n.rp-map{position:relative;height:230px;border-radius:4px;overflow:hidden;\n  background:\n    radial-gradient(ellipse at 40% 50%, rgba(90,84,74,.5) 0%, rgba(42,38,32,.7) 35%, rgba(7,13,18,.85) 70%),\n    linear-gradient(135deg,#0d1820 0%,#1e4658 100%);\n  border:1px solid rgba(78,192,212,.18);}\n.rp-map::before{content:'';position:absolute;inset:0;\n  background-image:\n    linear-gradient(90deg,rgba(78,192,212,.05) 1px,transparent 1px),\n    linear-gradient(0deg,rgba(78,192,212,.05) 1px,transparent 1px);\n  background-size:24px 24px;}\n.rp-island{position:absolute;top:18%;left:14%;width:72%;height:64%;\n  background:radial-gradient(ellipse at 40% 40%,var(--rp-moai-lit) 0%,var(--rp-moai) 35%,var(--rp-moai-shadow) 100%);\n  border-radius:50% 60% 45% 55%;transform:rotate(-12deg);opacity:.55;\n  box-shadow:inset -6px -8px 18px rgba(0,0,0,.4);}\n.rp-island::before{content:'';position:absolute;top:24%;left:48%;width:18%;height:24%;\n  background:var(--rp-volcanic);border-radius:50% 50% 30% 30%;opacity:.7;}\n.rp-zone{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;\n  font-family:'IBM Plex Mono',monospace;font-size:7.5px;color:var(--rp-bone);letter-spacing:1px;\n  text-transform:uppercase;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.7);z-index:2;}\n.rp-zone.cave{width:52px;height:40px;top:48%;left:30%;\n  background:radial-gradient(circle,rgba(7,13,18,.7),rgba(7,13,18,.2));\n  border:1px dashed rgba(168,224,230,.4);}\n.rp-zone.pillar{width:38px;height:38px;top:24%;left:60%;\n  background:radial-gradient(circle,rgba(138,40,40,.5),rgba(138,40,40,.1));\n  border:1px dashed rgba(232,118,84,.5);color:var(--rp-coral);}\n.rp-zone.plane{width:60px;height:30px;top:64%;left:14%;\n  background:radial-gradient(ellipse,rgba(232,118,84,.35),transparent);\n  border:1px dashed rgba(232,118,84,.4);color:var(--rp-sunset);}\n.rp-zone.beach{width:54px;height:24px;top:78%;right:14%;\n  background:linear-gradient(180deg,transparent,rgba(244,200,66,.2));\n  border-top:1px dashed rgba(244,200,66,.3);color:var(--rp-chick);}\n.rp-dot{position:absolute;width:13px;height:13px;border-radius:50%;\n  background:var(--rp-clr,var(--rp-surf));border:2px solid rgba(7,13,18,.7);\n  box-shadow:0 0 8px var(--rp-clr,var(--rp-surf));transform:translate(-50%,-50%);z-index:4;}\n.rp-dot::after{content:attr(data-tag);position:absolute;top:-15px;left:50%;transform:translateX(-50%);\n  font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;\n  color:var(--rp-clr,var(--rp-surf));letter-spacing:.5px;text-shadow:0 1px 2px rgba(0,0,0,.8);}\n.rp-dot.condor{width:16px;height:16px;background:var(--rp-volcanic);\n  border-color:var(--rp-coral);box-shadow:0 0 12px var(--rp-coral);\n  animation:rp-circle 5s ease-in-out infinite;}\n@keyframes rp-circle{\n  0%{top:24%;left:60%;}\n  25%{top:18%;left:70%;}\n  50%{top:24%;left:60%;}\n  75%{top:30%;left:50%;}\n  100%{top:24%;left:60%;}\n}\n.rp-trail{position:absolute;width:5px;height:5px;border-radius:50%;\n  background:rgba(232,118,84,.35);transform:translate(-50%,-50%);}\n.rp-map-leg{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-top:8px;}\n.rp-map-leg-i{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;\n  font-size:8.5px;color:var(--rp-tide);letter-spacing:.4px;}\n.rp-map-leg-d{width:8px;height:8px;border-radius:50%;flex-shrink:0;}\n\n/* Egg tally */\n.rp-eggboard{display:flex;flex-direction:column;gap:8px;}\n.rp-eggrow{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:8px;\n  padding:6px 0;border-bottom:1px dashed rgba(78,192,212,.08);}\n.rp-eggrow:last-child{border-bottom:none;}\n.rp-eggrow .nm{font-family:'Bungee',sans-serif;font-size:12px;letter-spacing:1.2px;\n  color:var(--rp-bone);}\n.rp-eggrow .sub{font-family:'IBM Plex Mono',monospace;font-size:8.5px;\n  color:var(--rp-tide);letter-spacing:.4px;}\n.rp-eggrow .tally{display:flex;gap:3px;}\n.rp-eggrow .e{width:13px;height:17px;border-radius:50% 50% 45% 45%;\n  background:var(--rp-egg-c,var(--rp-tuff));box-shadow:inset -2px -3px 0 rgba(0,0,0,.25);\n  border:1px solid rgba(0,0,0,.3);}\n.rp-eggrow .e.empty{background:transparent;border:1px dashed rgba(236,223,200,.2);box-shadow:none;}\n\n/* roster */\n.rp-roster-row{display:grid;grid-template-columns:36px 1fr auto;gap:9px;align-items:center;\n  padding:8px 0;border-bottom:1px solid rgba(78,192,212,.06);}\n.rp-roster-row:last-child{border-bottom:none;}\n.rp-roster-name{font-family:'Bungee',sans-serif;font-size:13px;letter-spacing:1.2px;\n  color:var(--rp-bone);line-height:1.1;}\n.rp-roster-arch{font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.8px;\n  color:var(--rp-tide);text-transform:uppercase;margin-top:2px;}\n.rp-bar-row{display:flex;align-items:center;gap:7px;margin:4px 0 0;}\n.rp-bar-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.8px;\n  color:var(--rp-tide);min-width:24px;}\n.rp-bar-track{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}\n.rp-bar-fill{height:100%;border-radius:3px;}\n.rp-bar-fill.hp{background:linear-gradient(90deg,var(--rp-coral),var(--rp-sunset));}\n.rp-bar-fill.bond{background:linear-gradient(90deg,var(--rp-egg-purple),var(--rp-chick));}\n.rp-bar-fill.candy{background:linear-gradient(90deg,var(--rp-chick),var(--rp-sunset));}\n.rp-bar-val{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;min-width:24px;\n  text-align:right;color:var(--rp-bone);}\n.rp-roster-status{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}\n.rp-status-tag{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.8px;\n  padding:2px 6px;border-radius:2px;border:1px solid;text-transform:uppercase;font-weight:600;}\n.rp-st-active{color:var(--rp-egg-green);border-color:rgba(90,176,74,.4);background:rgba(90,176,74,.08);}\n.rp-st-1c{color:var(--rp-chick);border-color:rgba(244,200,66,.4);background:rgba(244,200,66,.08);}\n.rp-st-econ{color:var(--rp-tide);border-color:rgba(42,122,140,.5);background:rgba(42,122,140,.08);}\n.rp-st-out{color:rgba(236,223,200,.4);border-color:rgba(236,223,200,.2);}\n\n/* alliance web */\n.rp-web{position:relative;height:170px;margin-top:4px;}\n.rp-web-node{position:absolute;width:34px;height:34px;border-radius:50%;\n  background:var(--rp-clr,var(--rp-surf));display:flex;align-items:center;justify-content:center;\n  font-family:'Bungee',sans-serif;font-size:13px;color:var(--rp-abyss);\n  border:2px solid rgba(7,13,18,.7);transform:translate(-50%,-50%);z-index:3;\n  box-shadow:0 0 0 1px rgba(255,255,255,.06);}\n.rp-web-line{position:absolute;height:1.5px;transform-origin:left center;z-index:1;}\n.rp-web-line.trust{background:linear-gradient(90deg,rgba(90,176,74,.7),rgba(90,176,74,.3));}\n.rp-web-line.bribe{background:repeating-linear-gradient(90deg,rgba(244,200,66,.7) 0,rgba(244,200,66,.7) 4px,transparent 4px,transparent 8px);}\n.rp-web-line.target{background:repeating-linear-gradient(90deg,rgba(232,118,84,.7) 0,rgba(232,118,84,.7) 3px,transparent 3px,transparent 6px);}\n.rp-web-line.obsess{background:linear-gradient(90deg,rgba(160,96,212,.8),rgba(160,96,212,.3));\n  box-shadow:0 0 6px rgba(160,96,212,.4);}\n.rp-web-line.crush{background:linear-gradient(90deg,rgba(212,74,74,.7),rgba(74,130,212,.5));}\n.rp-web-leg{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;font-size:8.5px;\n  font-family:'IBM Plex Mono',monospace;color:var(--rp-tide);letter-spacing:.4px;}\n.rp-web-leg-i{display:flex;align-items:center;gap:4px;}\n.rp-web-leg-l{width:16px;height:2px;}\n\n/* condor stat block */\n.rp-condor{display:grid;grid-template-columns:60px 1fr;gap:10px;margin-bottom:8px;}\n.rp-condor-mug{width:60px;height:60px;background:\n  radial-gradient(circle at 40% 30%,var(--rp-volcanic) 0%,var(--rp-moai-shadow) 70%);\n  border:2px solid var(--rp-coral);border-radius:2px;position:relative;overflow:hidden;}\n.rp-condor-mug::before{content:'';position:absolute;top:18px;left:50%;transform:translateX(-50%);\n  width:14px;height:5px;background:var(--rp-coral);clip-path:polygon(0 0,100% 50%,0 100%);}\n.rp-condor-mug::after{content:'CONDOR ♀';position:absolute;bottom:0;left:0;right:0;\n  background:rgba(7,13,18,.85);color:var(--rp-coral);font-family:'IBM Plex Mono',monospace;\n  font-size:7px;letter-spacing:1px;text-align:center;padding:2px 0;font-weight:700;}\n.rp-condor-eyes{position:absolute;top:6px;left:50%;transform:translateX(-50%);\n  display:flex;gap:5px;z-index:2;}\n.rp-condor-eyes span{width:5px;height:5px;background:var(--rp-coral);border-radius:50%;\n  box-shadow:0 0 6px var(--rp-coral);animation:rp-pulse .8s infinite;}\n.rp-condor-info .nm{font-family:'Bungee',sans-serif;font-size:15px;color:var(--rp-coral);letter-spacing:1px;}\n.rp-condor-info .stat{font-family:'IBM Plex Mono',monospace;font-size:9px;\n  color:var(--rp-tide);margin-top:2px;letter-spacing:.4px;}\n.rp-condor-detail{display:grid;grid-template-columns:1fr 1fr;gap:5px 10px;margin-top:8px;\n  font-family:'IBM Plex Mono',monospace;font-size:9px;}\n.rp-condor-detail .k{color:var(--rp-tide);}\n.rp-condor-detail .v{color:var(--rp-bone);font-weight:600;}\n\n/* ═══ WINNER / VOTE ═══ */\n.rp-winner{margin:20px 0;padding:32px 22px;text-align:center;border-radius:5px;position:relative;\n  background:linear-gradient(135deg,rgba(212,74,74,.18),rgba(138,40,40,.08));\n  border:2px solid var(--rp-egg-red);overflow:hidden;}\n.rp-winner::before{content:'';position:absolute;inset:-50%;\n  background:conic-gradient(from 0deg,transparent 0deg,rgba(212,74,74,.1) 30deg,transparent 60deg,transparent 180deg,rgba(212,74,74,.1) 210deg,transparent 240deg);\n  animation:rp-rot 9s linear infinite;}\n@keyframes rp-rot{to{transform:rotate(360deg);}}\n.rp-winner > *{position:relative;z-index:1;}\n.rp-winner .tag{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:4px;\n  color:var(--rp-egg-red);margin-bottom:10px;}\n.rp-winner .nm{font-family:'Bungee Inline',sans-serif;font-size:58px;color:var(--rp-bone);\n  letter-spacing:2px;text-shadow:3px 3px 0 var(--rp-ocean);}\n.rp-winner .sub{font-family:'Cinzel',serif;font-style:italic;color:var(--rp-foam);margin-top:8px;\n  font-size:13px;}\n\n.rp-vote-box{margin:18px 0;padding:20px;border:1px solid var(--rp-volcanic);border-radius:4px;\n  background:linear-gradient(135deg,rgba(138,40,40,.15),rgba(7,13,18,.6));}\n.rp-vote-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px;}\n.rp-vote-col{text-align:center;position:relative;}\n.rp-vote-col .who{font-family:'Bungee',sans-serif;font-size:12px;letter-spacing:1.2px;\n  color:var(--rp-bone);margin-top:7px;}\n.rp-vote-tally{margin-top:8px;font-family:'Bungee Inline',sans-serif;font-size:26px;\n  letter-spacing:1px;color:var(--rp-clr,var(--rp-coral));}\n.rp-vote-bars{margin-top:6px;display:flex;gap:3px;justify-content:center;}\n.rp-vote-bars span{display:block;width:7px;height:16px;\n  background:var(--rp-clr,var(--rp-coral));border-radius:1px;\n  box-shadow:0 0 4px var(--rp-clr,var(--rp-coral));}\n.rp-vote-flag{margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:8.5px;\n  color:var(--rp-sunset);letter-spacing:1px;}\n\n/* ═══════════════════════════════════════════════════════\n   ISLAND VIBE EXTENSIONS — sandstone tablets, petroglyphs,\n   flanking moai, palm fronds, carved dividers\n   ═══════════════════════════════════════════════════════ */\n:root{\n  --rp-sand-lit:#ead7a5;\n  --rp-sand:#cdb274;\n  --rp-sand-mid:#a8895a;\n  --rp-sand-dark:#705634;\n  --rp-sand-shadow:#3e2e14;\n  --rp-carved:#1f1607;\n  --rp-jungle:#1a3a1a;\n  --rp-jungle-mid:#2d5a30;\n  --rp-jungle-leaf:#3a7a44;\n  --rp-jungle-light:#5fa84a;\n  --rp-wood:#3a2812;\n  --rp-wood-lit:#5a3e1c;\n}\n\n/* hidden defs */\n.rp-defs{position:absolute;width:0;height:0;overflow:hidden;}\n\n/* SANDSTONE HERO override */\n.rp-hero.rp-tablet{\n  background:\n    radial-gradient(ellipse at 30% -10%, var(--rp-sand-lit) 0%, var(--rp-sand) 38%, var(--rp-sand-mid) 78%, var(--rp-sand-dark) 100%),\n    var(--rp-sand);\n  border:3px solid var(--rp-sand-dark);\n  box-shadow:\n    inset 0 3px 0 rgba(255,255,255,.35),\n    inset 0 -4px 0 rgba(62,46,20,.45),\n    inset 4px 0 0 rgba(62,46,20,.18),\n    inset -4px 0 0 rgba(62,46,20,.18),\n    0 14px 36px rgba(0,0,0,.55);\n  color:var(--rp-carved);\n  padding:42px 96px 38px;\n  position:relative;overflow:visible;\n}\n.rp-hero.rp-tablet::after{\n  /* sandstone speckle noise */\n  content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;\n  background-image:\n    radial-gradient(rgba(62,46,20,.15) 1px,transparent 1.5px),\n    radial-gradient(rgba(255,255,255,.12) 1px,transparent 1.5px);\n  background-size:14px 14px,11px 11px;\n  background-position:0 0,7px 5px;\n  mix-blend-mode:multiply;opacity:.45;\n}\n.rp-hero.rp-tablet > *{position:relative;z-index:2;}\n.rp-hero.rp-tablet > .rp-glyph-col{position:absolute;}\n.rp-hero.rp-tablet .rp-hero-title{\n  color:var(--rp-carved);\n  text-shadow:\n    1px 1px 0 rgba(255,255,255,.35),\n    -1px -1px 0 rgba(0,0,0,.45),\n    4px 4px 0 var(--rp-sand-mid),\n    7px 7px 0 rgba(62,46,20,.5);\n}\n.rp-hero.rp-tablet .rp-hero-title .coral{color:#a82820;}\n.rp-hero.rp-tablet .rp-hero-title .bang{color:var(--rp-jungle-leaf);}\n.rp-hero.rp-tablet .rp-hero-sub{color:var(--rp-sand-shadow);}\n.rp-hero.rp-tablet .rp-hero-meta{color:var(--rp-sand-shadow);}\n.rp-hero.rp-tablet .rp-hero-meta .pip{color:#a82820;}\n.rp-hero.rp-tablet .rp-hero-meta .dot{background:var(--rp-sand-shadow);}\n.rp-hero.rp-tablet .rp-hero-tag{color:rgba(35,25,8,.82);}\n.rp-hero.rp-tablet .rp-hero-stat{\n  background:rgba(255,255,255,.18);border-color:rgba(62,46,20,.4);}\n.rp-hero.rp-tablet .rp-hero-stat .lbl{color:var(--rp-sand-shadow);}\n.rp-hero.rp-tablet .rp-hero-stat .val{color:var(--rp-carved);}\n.rp-hero.rp-tablet .rp-hero-stat .val.coral{color:#a82820;}\n.rp-hero.rp-tablet .rp-glyph.tl,\n.rp-hero.rp-tablet .rp-glyph.tr{color:var(--rp-sand-shadow);opacity:.85;}\n.rp-hero.rp-tablet .rp-glyph.bl,\n.rp-hero.rp-tablet .rp-glyph.br{color:var(--rp-sand-shadow);opacity:.7;}\n.rp-hero.rp-tablet .rp-rs{\n  background:rgba(255,255,255,.2);\n  border-color:rgba(62,46,20,.3);\n  border-top-width:4px;\n}\n.rp-hero.rp-tablet .rp-rs .nm{color:var(--rp-carved);}\n.rp-hero.rp-tablet .rp-rs .arch{color:var(--rp-sand-shadow);}\n\n/* CARVED GLYPH COLUMN — flanking pillar of stacked petroglyphs */\n.rp-glyph-col{\n  position:absolute;top:24px;bottom:24px;width:48px;\n  display:flex;flex-direction:column;align-items:center;justify-content:space-around;\n  padding:14px 0;gap:6px;\n  background:\n    linear-gradient(180deg,rgba(62,46,20,.2),rgba(62,46,20,.32));\n  border:1.5px solid rgba(62,46,20,.4);\n  border-radius:3px;\n  box-shadow:\n    inset 1px 1px 0 rgba(255,255,255,.28),\n    inset -1px -1px 0 rgba(0,0,0,.25);\n  z-index:2;\n}\n.rp-glyph-col.l{left:22px;}\n.rp-glyph-col.r{right:22px;}\n.rp-glyph-col svg{width:26px;height:26px;color:var(--rp-sand-shadow);\n  filter:drop-shadow(0 1px 0 rgba(255,255,255,.3));opacity:.85;}\n\n/* FLANKING MOAI — large stone heads on either side of the shell */\n.rp-flank{position:fixed;top:96px;width:170px;height:calc(100vh - 96px);\n  pointer-events:none;z-index:2;\n  display:flex;align-items:center;justify-content:center;\n  opacity:.55;}\n.rp-flank.l{left:max(0px, calc(50vw - 780px));}\n.rp-flank.r{right:max(0px, calc(50vw - 780px));transform:scaleX(-1);}\n.rp-flank svg{width:100%;height:auto;max-height:80vh;\n  filter:drop-shadow(0 12px 24px rgba(0,0,0,.6));}\n@media(max-width:1400px){.rp-flank{display:none;}}\n\n/* PALM FRONDS — corner accents */\n.rp-palms{position:fixed;inset:0;pointer-events:none;z-index:3;}\n.rp-palm{position:absolute;width:260px;height:240px;opacity:.6;}\n.rp-palm.tl{top:42px;left:-20px;}\n.rp-palm.tr{top:42px;right:-20px;transform:scaleX(-1);}\n.rp-palm.bl{bottom:-20px;left:-20px;transform:scaleY(-1);}\n.rp-palm.br{bottom:-20px;right:-20px;transform:scale(-1,-1);}\n@media(max-width:980px){.rp-palm{width:160px;height:140px;opacity:.4;}}\n\n/* CARVED DIVIDER — petroglyph row between sections */\n.rp-divider{display:flex;align-items:center;gap:12px;margin:22px 4px;}\n.rp-div-line{flex:1;height:1px;background:\n  linear-gradient(90deg,transparent,rgba(168,137,90,.5) 20%,rgba(168,137,90,.5) 80%,transparent);}\n.rp-div-line::before,.rp-div-line::after{content:'';display:block;}\n.rp-divider svg{width:22px;height:22px;color:var(--rp-sand-mid);opacity:.75;\n  filter:drop-shadow(0 1px 0 rgba(0,0,0,.5));}\n.rp-divider svg.center{width:30px;height:30px;color:var(--rp-sunset);opacity:.85;}\n\n/* UPGRADED MOAI HEAD ICON for egg-hunt grid */\n.rp-head{padding:14px 10px 14px;}\n.rp-head .moai{width:54px;height:74px;margin:0 auto 8px;position:relative;}\n.rp-head .moai svg{width:100%;height:100%;\n  filter:drop-shadow(2px 3px 0 rgba(0,0,0,.4));}\n.rp-head .icon{display:none;}\n\n/* SECTION TITLE STAMP — a stamped stone-tablet ribbon for phase titles */\n.rp-stamp{display:flex;align-items:center;gap:14px;margin:24px 4px 16px;\n  padding:12px 18px;\n  background:linear-gradient(180deg,var(--rp-sand-mid),var(--rp-sand-dark));\n  border:1.5px solid var(--rp-sand-shadow);\n  border-radius:3px;color:var(--rp-carved);\n  box-shadow:\n    inset 0 2px 0 rgba(255,255,255,.25),\n    inset 0 -2px 0 rgba(0,0,0,.3),\n    0 4px 14px rgba(0,0,0,.45);\n  position:relative;}\n.rp-stamp::before,.rp-stamp::after{\n  content:'';position:absolute;top:50%;width:14px;height:14px;\n  background:var(--rp-sand-shadow);transform:translateY(-50%) rotate(45deg);\n  border:1px solid rgba(0,0,0,.4);\n}\n.rp-stamp::before{left:-7px;}.rp-stamp::after{right:-7px;}\n.rp-stamp .rp-stamp-g{width:28px;height:28px;color:var(--rp-carved);opacity:.8;flex-shrink:0;}\n.rp-stamp .num{font-family:'Bungee',sans-serif;font-size:13px;color:#a82820;letter-spacing:2px;}\n.rp-stamp .ttl{font-family:'Bungee',sans-serif;font-size:16px;letter-spacing:2.5px;\n  text-transform:uppercase;color:var(--rp-carved);text-shadow:1px 1px 0 rgba(255,255,255,.25);}\n.rp-stamp .sub{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:9.5px;\n  letter-spacing:1.5px;color:var(--rp-sand-shadow);text-transform:uppercase;}\n\n/* responsive */\n@media(max-width:980px){\n  .rp-shell{grid-template-columns:1fr;}\n  .rp-side{position:static;max-height:none;}\n  .rp-hero-title{font-size:58px;}\n  .rp-roster-strip{grid-template-columns:repeat(2,1fr);}\n  .rp-heads{grid-template-columns:repeat(2,1fr);}\n}\n@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important;}}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- ═══ PETROGLYPH / MOAI / PALM SVG DEFS ═══ -->\n<svg class=\"rp-defs\" aria-hidden=\"true\">\n  <defs>\n    <!-- Moai face glyph (squat) -->\n    <symbol id=\"g-moai\" viewBox=\"0 0 24 32\">\n      <rect x=\"3\" y=\"0\" width=\"18\" height=\"24\" rx=\"7\" fill=\"currentColor\"><\u002Frect>\n      <rect x=\"0\" y=\"22\" width=\"24\" height=\"9\" rx=\"1\" fill=\"currentColor\"><\u002Frect>\n      <rect x=\"6\" y=\"10\" width=\"3\" height=\"6\" rx=\"1\" fill=\"rgba(0,0,0,.55)\"><\u002Frect>\n      <rect x=\"15\" y=\"10\" width=\"3\" height=\"6\" rx=\"1\" fill=\"rgba(0,0,0,.55)\"><\u002Frect>\n      <rect x=\"11\" y=\"14\" width=\"2\" height=\"8\" fill=\"rgba(0,0,0,.55)\"><\u002Frect>\n      <rect x=\"9\" y=\"20\" width=\"6\" height=\"2\" rx=\"1\" fill=\"rgba(0,0,0,.55)\"><\u002Frect>\n    <\u002Fsymbol>\n    <!-- Big moai bust (for icons in heads grid) -->\n    <symbol id=\"g-moai-big\" viewBox=\"0 0 60 84\">\n      <!-- platform -->\n      <rect x=\"2\" y=\"68\" width=\"56\" height=\"14\" rx=\"2\" fill=\"#2e2820\"><\u002Frect>\n      <!-- body -->\n      <rect x=\"8\" y=\"52\" width=\"44\" height=\"22\" rx=\"3\" fill=\"#5a5246\"><\u002Frect>\n      <!-- head -->\n      <ellipse cx=\"30\" cy=\"32\" rx=\"20\" ry=\"28\" fill=\"#6b614f\"><\u002Fellipse>\n      <!-- jaw / chin shadow -->\n      <ellipse cx=\"30\" cy=\"52\" rx=\"18\" ry=\"10\" fill=\"#4a4234\"><\u002Fellipse>\n      <!-- brow ridge -->\n      <path d=\"M10 28 Q 30 22 50 28 L 50 32 Q 30 26 10 32 Z\" fill=\"#3a3326\"><\u002Fpath>\n      <!-- eye sockets -->\n      <ellipse cx=\"20\" cy=\"34\" rx=\"5\" ry=\"4\" fill=\"#1a1610\"><\u002Fellipse>\n      <ellipse cx=\"40\" cy=\"34\" rx=\"5\" ry=\"4\" fill=\"#1a1610\"><\u002Fellipse>\n      <!-- nose -->\n      <path d=\"M28 36 L26 50 L34 50 L32 36 Z\" fill=\"#3a3326\"><\u002Fpath>\n      <!-- mouth -->\n      <rect x=\"22\" y=\"56\" width=\"16\" height=\"3\" rx=\"1\" fill=\"#2a2418\"><\u002Frect>\n      <!-- highlight -->\n      <path d=\"M14 12 Q 20 6 30 6 Q 24 10 18 22 Z\" fill=\"rgba(255,255,255,.12)\"><\u002Fpath>\n    <\u002Fsymbol>\n    <!-- Birdman / tangata-manu silhouette -->\n    <symbol id=\"g-bird\" viewBox=\"0 0 28 28\">\n      <circle cx=\"12\" cy=\"6\" r=\"3.5\" fill=\"currentColor\"><\u002Fcircle>\n      <path d=\"M14 5 L20 4 L14 7 Z\" fill=\"currentColor\"><\u002Fpath>\n      <rect x=\"11\" y=\"8\" width=\"3\" height=\"12\" fill=\"currentColor\"><\u002Frect>\n      <path d=\"M11 11 L4 14 L4 16 L11 14 Z\" fill=\"currentColor\"><\u002Fpath>\n      <path d=\"M14 11 L21 14 L21 16 L14 14 Z\" fill=\"currentColor\"><\u002Fpath>\n      <path d=\"M11 20 L8 26 L10 26 L12 22 Z\" fill=\"currentColor\"><\u002Fpath>\n      <path d=\"M14 20 L17 26 L15 26 L13 22 Z\" fill=\"currentColor\"><\u002Fpath>\n    <\u002Fsymbol>\n    <!-- Spiral -->\n    <symbol id=\"g-spiral\" viewBox=\"0 0 24 24\">\n      <path d=\"M12 12 m-1.5 0 a1.5 1.5 0 1 0 3 0 a1.5 1.5 0 1 0 -3 0 M13.5 12 a4 4 0 0 0 -4 -4 a4 4 0 0 0 -4 4 a6 6 0 0 0 6 6 a8 8 0 0 0 8 -8 a10 10 0 0 0 -10 -10\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n    <\u002Fsymbol>\n    <!-- Sun -->\n    <symbol id=\"g-sun\" viewBox=\"0 0 24 24\">\n      <circle cx=\"12\" cy=\"12\" r=\"4.5\" fill=\"currentColor\"><\u002Fcircle>\n      <g stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\">\n        <line x1=\"12\" y1=\"1\" x2=\"12\" y2=\"4\"><\u002Fline>\n        <line x1=\"12\" y1=\"20\" x2=\"12\" y2=\"23\"><\u002Fline>\n        <line x1=\"1\" y1=\"12\" x2=\"4\" y2=\"12\"><\u002Fline>\n        <line x1=\"20\" y1=\"12\" x2=\"23\" y2=\"12\"><\u002Fline>\n        <line x1=\"4\" y1=\"4\" x2=\"6.5\" y2=\"6.5\"><\u002Fline>\n        <line x1=\"17.5\" y1=\"17.5\" x2=\"20\" y2=\"20\"><\u002Fline>\n        <line x1=\"4\" y1=\"20\" x2=\"6.5\" y2=\"17.5\"><\u002Fline>\n        <line x1=\"17.5\" y1=\"6.5\" x2=\"20\" y2=\"4\"><\u002Fline>\n      <\u002Fg>\n    <\u002Fsymbol>\n    <!-- Fish -->\n    <symbol id=\"g-fish\" viewBox=\"0 0 28 16\">\n      <path d=\"M2 8 L8 4 L8 12 Z\" fill=\"currentColor\"><\u002Fpath>\n      <ellipse cx=\"17\" cy=\"8\" rx=\"9\" ry=\"5\" fill=\"currentColor\"><\u002Fellipse>\n      <circle cx=\"21\" cy=\"7\" r=\"1.2\" fill=\"rgba(255,255,255,.65)\"><\u002Fcircle>\n    <\u002Fsymbol>\n    <!-- Egg -->\n    <symbol id=\"g-egg\" viewBox=\"0 0 16 22\">\n      <ellipse cx=\"8\" cy=\"13\" rx=\"6.5\" ry=\"9\" fill=\"currentColor\"><\u002Fellipse>\n      <ellipse cx=\"5\" cy=\"9\" rx=\"1.4\" ry=\"2.4\" fill=\"rgba(255,255,255,.5)\"><\u002Fellipse>\n    <\u002Fsymbol>\n    <!-- Wave -->\n    <symbol id=\"g-wave\" viewBox=\"0 0 28 10\">\n      <path d=\"M1 5 Q 5 1, 8 5 T 15 5 T 22 5 T 27 5\" stroke=\"currentColor\" stroke-width=\"2.2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n    <\u002Fsymbol>\n    <!-- Hand -->\n    <symbol id=\"g-hand\" viewBox=\"0 0 16 22\">\n      <path d=\"M3 20 L3 9 L5 9 L5 4 L7 4 L7 9 L8 9 L8 2 L10 2 L10 9 L11 9 L11 5 L13 5 L13 14 L13 20 Z\" fill=\"currentColor\"><\u002Fpath>\n    <\u002Fsymbol>\n    <!-- Eye -->\n    <symbol id=\"g-eye\" viewBox=\"0 0 28 16\">\n      <path d=\"M2 8 Q 14 -2 26 8 Q 14 18 2 8 Z\" fill=\"currentColor\"><\u002Fpath>\n      <circle cx=\"14\" cy=\"8\" r=\"3\" fill=\"rgba(0,0,0,.6)\"><\u002Fcircle>\n    <\u002Fsymbol>\n    <!-- Diamond/zig glyph -->\n    <symbol id=\"g-diamond\" viewBox=\"0 0 22 22\">\n      <path d=\"M11 1 L21 11 L11 21 L1 11 Z\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fpath>\n      <circle cx=\"11\" cy=\"11\" r=\"2.5\" fill=\"currentColor\"><\u002Fcircle>\n    <\u002Fsymbol>\n\n    <!-- Flanking moai bust (taller, full body) -->\n    <symbol id=\"g-moai-flank\" viewBox=\"0 0 200 600\">\n      <g>\n        <!-- platform -->\n        <rect x=\"14\" y=\"520\" width=\"172\" height=\"78\" rx=\"6\" fill=\"#080c10\"><\u002Frect>\n        <!-- body -->\n        <rect x=\"34\" y=\"380\" width=\"132\" height=\"160\" rx=\"10\" fill=\"#0d1820\"><\u002Frect>\n        <!-- head -->\n        <ellipse cx=\"100\" cy=\"220\" rx=\"78\" ry=\"170\" fill=\"#0d1820\"><\u002Fellipse>\n        <!-- jaw shadow -->\n        <ellipse cx=\"100\" cy=\"360\" rx=\"68\" ry=\"40\" fill=\"#1a2a36\"><\u002Fellipse>\n        <!-- brow -->\n        <path d=\"M30 180 Q 100 150 170 180 L 170 200 Q 100 170 30 200 Z\" fill=\"#1a2a36\"><\u002Fpath>\n        <!-- eyes -->\n        <ellipse cx=\"70\" cy=\"230\" rx=\"14\" ry=\"22\" fill=\"#070d12\"><\u002Fellipse>\n        <ellipse cx=\"130\" cy=\"230\" rx=\"14\" ry=\"22\" fill=\"#070d12\"><\u002Fellipse>\n        <!-- nose -->\n        <path d=\"M95 250 L88 340 L112 340 L105 250 Z\" fill=\"#1a2a36\"><\u002Fpath>\n        <!-- mouth -->\n        <rect x=\"76\" y=\"370\" width=\"48\" height=\"8\" rx=\"2\" fill=\"#1a2a36\"><\u002Frect>\n        <!-- highlight on left -->\n        <path d=\"M28 100 Q 50 70 80 60 Q 60 90 44 180 Z\" fill=\"rgba(168,224,230,.06)\"><\u002Fpath>\n      <\u002Fg>\n    <\u002Fsymbol>\n\n    <!-- Palm frond cluster -->\n    <symbol id=\"g-palm\" viewBox=\"0 0 260 240\">\n      <g fill=\"#1a3a1a\">\n        <!-- frond 1 (long, low) -->\n        <path d=\"M0 0 Q 80 60 150 90 Q 130 92 60 80 Q 20 50 0 0 Z\"><\u002Fpath>\n        <!-- frond 2 -->\n        <path d=\"M0 0 Q 100 100 160 150 Q 120 130 50 120 Q 18 70 0 0 Z\" opacity=\"0.85\"><\u002Fpath>\n        <!-- frond 3 -->\n        <path d=\"M0 0 Q 60 130 90 200 Q 60 150 30 140 Q 10 60 0 0 Z\" opacity=\"0.78\"><\u002Fpath>\n        <!-- frond 4 -->\n        <path d=\"M0 0 Q 18 140 40 230 Q 22 150 14 130 Q 6 60 0 0 Z\" opacity=\"0.72\"><\u002Fpath>\n        <!-- frond 5 short -->\n        <path d=\"M0 0 Q 130 30 200 50 Q 140 50 70 50 Q 20 30 0 0 Z\" opacity=\"0.65\"><\u002Fpath>\n      <\u002Fg>\n      <g fill=\"#2d5a30\">\n        <!-- mid-green highlights -->\n        <path d=\"M0 0 Q 70 50 130 80 Q 100 78 55 72 Q 22 45 0 0 Z\" opacity=\"0.55\"><\u002Fpath>\n        <path d=\"M0 0 Q 50 110 78 180 Q 50 130 24 120 Q 10 55 0 0 Z\" opacity=\"0.45\"><\u002Fpath>\n      <\u002Fg>\n    <\u002Fsymbol>\n  <\u002Fdefs>\n<\u002Fsvg>\n\n<!-- FLANKING MOAI BUSTS (wide viewports only) -->\n<div class=\"rp-flank l\" aria-hidden=\"true\"><svg viewBox=\"0 0 200 600\"><use href=\"#g-moai-flank\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n<div class=\"rp-flank r\" aria-hidden=\"true\"><svg viewBox=\"0 0 200 600\"><use href=\"#g-moai-flank\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n\n<!-- PALM CORNERS -->\n<div class=\"rp-palms\" aria-hidden=\"true\">\n  <svg class=\"rp-palm tl\" viewBox=\"0 0 260 240\"><use href=\"#g-palm\"><\u002Fuse><\u002Fsvg>\n  <svg class=\"rp-palm tr\" viewBox=\"0 0 260 240\"><use href=\"#g-palm\"><\u002Fuse><\u002Fsvg>\n  <svg class=\"rp-palm bl\" viewBox=\"0 0 260 240\"><use href=\"#g-palm\"><\u002Fuse><\u002Fsvg>\n  <svg class=\"rp-palm br\" viewBox=\"0 0 260 240\"><use href=\"#g-palm\"><\u002Fuse><\u002Fsvg>\n<\u002Fdiv>\n\n<!-- BG LAYERS -->\n<div class=\"rp-sea\"><\u002Fdiv>\n<div class=\"rp-stars\"><\u002Fdiv>\n<div class=\"rp-spray\" id=\"spray\"><\u002Fdiv>\n<div class=\"rp-horizon\">\n  <div class=\"rp-moai-sil s1\"><div class=\"head\"><\u002Fdiv><div class=\"body\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"rp-moai-sil s2\"><div class=\"head\"><\u002Fdiv><div class=\"body\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"rp-moai-sil s3\"><div class=\"head\"><\u002Fdiv><div class=\"body\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"rp-moai-sil s4\"><div class=\"head\"><\u002Fdiv><div class=\"body\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"rp-moai-sil s5\"><div class=\"head\"><\u002Fdiv><div class=\"body\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"rp-moai-sil s6\"><div class=\"head\"><\u002Fdiv><div class=\"body\"><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"rp-waves\"><\u002Fdiv>\n\n<!-- CHROME -->\n<div class=\"rp-chrome\">\n  <div class=\"rp-rec\"><span class=\"rp-rec-dot\"><\u002Fspan>REC · FIELD-LOG 022<\u002Fdiv>\n  <div class=\"rp-coord\"><div class=\"rp-coord-inner\">\n    27°07′S 109°22′W &nbsp;//&nbsp; <b>RAPA NUI<\u002Fb> &nbsp;//&nbsp; FINAL FOUR &nbsp;//&nbsp; CONDOR ALERT — WINGSPAN 12FT &nbsp;//&nbsp; SCATTERED CANDY DEBRIS @ SECTOR β &nbsp;//&nbsp; <b>NEW HATCHLING:<\u002Fb> CODY JR. &nbsp;//&nbsp; PLANE STATUS: WEDGED IN MOAI &nbsp;//&nbsp; HOST ETA TO BARF BAG CEREMONY — \n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"rp-wind\">SE 18kt<\u002Fdiv>\n  <div class=\"rp-call\">EP·22<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- TABS -->\n<div class=\"rp-tabs\" id=\"tabs\"
