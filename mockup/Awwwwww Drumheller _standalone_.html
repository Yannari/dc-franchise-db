ian badlands. The challenge: build a dinosaur, then dig up barrels of <em>maple syrup<\u002Fem> — except the interns buried <em>crude oil<\u002Fem> by mistake. Four contestants. One <strong>forged photograph<\u002Fstrong>. One <strong>birthday cake<\u002Fstrong>. One mistake involving sparklers and a puddle.\n    <\u002Fdiv>\n    <div class=\"dh-hero-stats\">\n      <div class=\"dh-hero-stat\"><div class=\"lbl\">Remaining<\u002Fdiv><div class=\"val\">4 / 18<\u002Fdiv><\u002Fdiv>\n      <div class=\"dh-hero-stat\"><div class=\"lbl\">Buried barrels<\u002Fdiv><div class=\"val\">4 (oil)<\u002Fdiv><\u002Fdiv>\n      <div class=\"dh-hero-stat\"><div class=\"lbl\">Boulder cadence<\u002Fdiv><div class=\"val blood\">~ 90s<\u002Fdiv><\u002Fdiv>\n      <div class=\"dh-hero-stat\"><div class=\"lbl\">Today's cake<\u002Fdiv><div class=\"val fuse\">CHOCOLATE<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-roster-strip\">\n      <div class=\"dh-rs\" style=\"--dh-clr:var(--dh-alej)\">\n        <div class=\"pin\">BLUE<\u002Fdiv>\n        <div class=\"av\">AJ<\u002Fdiv>\n        <div class=\"nm\">ALEJANDRO<\u002Fdiv>\n        <div class=\"arch\">The Forger<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-rs\" style=\"--dh-clr:var(--dh-heat)\">\n        <div class=\"pin\">RED<\u002Fdiv>\n        <div class=\"av\">HT<\u002Fdiv>\n        <div class=\"nm\">HEATHER<\u002Fdiv>\n        <div class=\"arch\">Holed Up<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-rs\" style=\"--dh-clr:var(--dh-cody)\">\n        <div class=\"pin\">PURPLE<\u002Fdiv>\n        <div class=\"av\">CD<\u002Fdiv>\n        <div class=\"nm\">CODY<\u002Fdiv>\n        <div class=\"arch\">Birthday Boy · 17<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-rs\" style=\"--dh-clr:var(--dh-sier)\">\n        <div class=\"pin\">GREEN<\u002Fdiv>\n        <div class=\"av glitter\">SR<\u002Fdiv>\n        <div class=\"nm\">SIERRA<\u002Fdiv>\n        <div class=\"arch\">Glitter Glue Detective<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-divider\">\n    <span class=\"dh-div-line\"><\u002Fspan>\n    <svg><use href=\"#dh-petro\"><\u002Fuse><\u002Fsvg>\n    <svg><use href=\"#dh-skull\"><\u002Fuse><\u002Fsvg>\n    <svg class=\"center\"><use href=\"#dh-bone\"><\u002Fuse><\u002Fsvg>\n    <svg><use href=\"#dh-skull\"><\u002Fuse><\u002Fsvg>\n    <svg><use href=\"#dh-spiral\"><\u002Fuse><\u002Fsvg>\n    <span class=\"dh-div-line\"><\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"host\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av lg\" style=\"--dh-clr:var(--dh-fuse)\">CM<\u002Fdiv>\n      <div class=\"dh-stamp-block\">\n        <div class=\"dh-card-title\">Cold Open · Surveillance Bay<\u002Fdiv>\n        <div class=\"dh-card-time\">⏱  0413 · TOTAL DRAMA JUMBO JET · MID-FLIGHT<\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"dh-badge dh-b-scheme\">FORGERY IN PROGRESS<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Alejandro slips into the plane's security center, boots the laptop, and splices innocuous camera footage of <strong>Heather<\u002Fstrong> and <strong>Cody<\u002Fstrong> into a single composite frame: the two of them <em>asleep against each other<\u002Fem> in economy class. He works alone, in the dark, while the rest of the cabin snores.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>SUBJECTS <span class=\"neu\">HT / CD — econ class<\u002Fspan><\u002Fspan>\n      <span>OUTPUT <span class=\"neg\">1 forged still<\u002Fspan><\u002Fspan>\n      <span>TARGET MARK <span class=\"gold\">SIERRA<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"alliance\" style=\"--dh-clr:var(--dh-heat)\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-alej)\">AJ<\u002Fdiv>\n      <div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv>\n      <span class=\"dh-card-title\">First Class · Pupusas &amp; Plausible Deniability<\u002Fspan>\n      <span class=\"dh-badge dh-b-alej\">INTERIOR · LOUNGE<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Alejandro returns with pupusas. Heather wakes complaining the seats are <em>\"uncomfortable to sleep on\"<\u002Fem> and refuses the food. Alejandro thanks her, again, for inviting him to first class. Heather: <strong>\"It was strategy. Sierra would target me. You were the only one left.\"<\u002Fstrong> Alejandro doesn't believe a word of it. Neither does the audience.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>SURFACE <span class=\"neu\">cordial · strategic<\u002Fspan><\u002Fspan>\n      <span>SUBTEXT <span class=\"pink\">denial of feelings (mutual)<\u002Fspan><\u002Fspan>\n      <span>CANDIES OFFERED <span class=\"gold\">0 · refused<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-conf\" style=\"--dh-clr:var(--dh-cody)\">\n    <div class=\"dh-conf-hdr\"><div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-cody)\">CD<\u002Fdiv><span class=\"dh-conf-name\">CODY<\u002Fspan><\u002Fdiv>\n    <div class=\"dh-conf-body\">I woke up with my head <em>in Sierra's lap<\u002Fem>. Apparently I had a nightmare where I was about to marry Gwen and I needed comforting. Apparently. I voted Sierra <strong>off<\u002Fstrong> last week and she's not even mad — she's making me <i>\"something very special.\"<\u002Fi> Today, I am told, is also <strong>the best day of the entire year<\u002Fstrong>. I am almost afraid to ask why.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"hazard\">\n    <div class=\"dh-card-hdr\">\n      <span class=\"dh-card-title\">Touchdown · Drumheller · Cordoned Quarry<\u002Fspan>\n      <span class=\"dh-card-time\">⏱  0731 · ALBERTA BADLANDS<\u002Fspan>\n      <span class=\"dh-badge dh-b-host\">SITE BRIEF<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      <strong>Drumheller, Alberta<\u002Fstrong> — type-locality for Late Cretaceous fossil beds. The plane sets down on a flat between hoodoos. Chris walks the final four to a roped-off pit lined with bone fragments. Today's reward is structured in <em>two parts<\u002Fem>: an arts-and-crafts dinosaur build, then a barrel-and-shovel grub-fest. The interns prepared the site. The interns are not having a good day.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>BEDROCK <span class=\"neu\">Horseshoe Canyon Fm.<\u002Fspan><\u002Fspan>\n      <span>WEATHER <span class=\"gold\">42°F · clear · dust devils 14kt<\u002Fspan><\u002Fspan>\n      <span>HAZARDS <span class=\"neg\">boulders · oil · spiders · snakes<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── 01 FRAME-UP ─── -->\n<div class=\"dh-phase\" id=\"phase-frame\">\n  <div class=\"dh-stamp\">\n    <svg><use href=\"#dh-spiral\"><\u002Fuse><\u002Fsvg>\n    <div class=\"dh-stamp-block\">\n      <span class=\"num\">PHASE 01 · INTERIOR<\u002Fspan>\n      <span class=\"ttl\">The Frame-Up<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sub\">1 forged photo · 1 superfan with a glitter habit · 0 verification<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-photo-frame\">\n    <div class=\"ph-hdr\">\n      <div class=\"ph-ttl\">Exhibit A · Composite Surveillance Still<\u002Fdiv>\n      <div class=\"ph-sub\">SOURCE <b>SECURITY CAM #04<\u002Fb> · ECON CLASS · 02:14 LOCAL<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-photo\">\n      <div class=\"dh-photo-pane\">\n        <div class=\"stamp real\">◉ REAL · 02:14<\u002Fdiv>\n        <div class=\"dh-photo-scene\">\n          <div class=\"figure\">\n            <div class=\"blob sleep\" style=\"--dh-clr:var(--dh-cody)\"><\u002Fdiv>\n            <div class=\"caption\">CD · alone<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dh-photo-foot\">Cody asleep in economy. Heather is in first class, six cabins forward. Footage is unaltered.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-photo-vs\">VS<\u002Fdiv>\n      <div class=\"dh-photo-pane\">\n        <div class=\"stamp fake\">⚠ FORGED · \"02:14\"<\u002Fdiv>\n        <div class=\"dh-photo-scene\">\n          <div class=\"figure\">\n            <div class=\"blob sleep\" style=\"--dh-clr:var(--dh-cody)\"><\u002Fdiv>\n            <div class=\"caption\">CD<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"figure\">\n            <div class=\"blob sleep\" style=\"--dh-clr:var(--dh-heat)\"><\u002Fdiv>\n            <div class=\"caption\">HT<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dh-photo-foot\"><em>\"Heather and Cody sleeping side-by-side.\"<\u002Fem> Composite produced on the plane's laptop. Single source, single seat.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"scheme\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av\" style=\"--dh-clr:var(--dh-alej)\">AJ<\u002Fdiv>\n      <div class=\"dh-av glitter\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv>\n      <span class=\"dh-card-title\">Delivery · Sierra is shown the photo<\u002Fspan>\n      <span class=\"dh-badge dh-b-scheme\">EXTERIOR · TARMAC<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Sierra is en route to assemble Cody's surprise. Alejandro asks for a word. He presents <em>the photo.<\u002Fem> Sierra's face passes through six distinct expressions in roughly four seconds. None of them are <strong>\"this seems digitally inconsistent.\"<\u002Fstrong> Heather is now her sworn enemy.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>VERIFICATION <span class=\"neg\">none<\u002Fspan><\u002Fspan>\n      <span>SIERRA MOOD <span class=\"pink\">incandescent<\u002Fspan><\u002Fspan>\n      <span>HEATHER LOCATION <span class=\"neu\">unaware<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-conf\" style=\"--dh-clr:var(--dh-sier)\">\n    <div class=\"dh-conf-hdr\"><div class=\"dh-av sm glitter\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv><span class=\"dh-conf-name\">SIERRA<\u002Fspan><\u002Fdiv>\n    <div class=\"dh-conf-body\">I have catalogued <strong>every frame of TV Cody has ever been on<\u002Fstrong> and I have <em>never<\u002Fem> seen him with that expression. So either it's real and I have <strong>failed him<\u002Fstrong>, or it's fake and Alejandro is <em>going down<\u002Fem>. Either way: someone is getting bones thrown at them today.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"hazard\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv>\n      <div class=\"dh-av glitter\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv>\n      <span class=\"dh-card-title\">Cargo Bay · Glitter Glue To The Face<\u002Fspan>\n      <span class=\"dh-badge dh-b-hazard\">FIRST CONTACT<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Sierra raids the cargo for <strong>glitter glue, puffy paint, stickers.<\u002Fstrong> Heather quips it looks like <em>\"a grade 3 art project.\"<\u002Fem> Sierra smears a fistful of <i>pink glitter glue<\u002Fi> across Heather's face and asks, betrayed, <strong>\"How could you?\"<\u002Fstrong> Heather, glittering, has no idea why. Cody calls dibs on a blank canvas; Heather steals it, claiming the dibs were not formally registered.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>HEATHER FACE <span class=\"pink\">pink + sparkly<\u002Fspan><\u002Fspan>\n      <span>CANVAS <span class=\"neg\">stolen<\u002Fspan><\u002Fspan>\n      <span>COMPLIANCE <span class=\"neu\">none<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-conf\" style=\"--dh-clr:var(--dh-heat)\">\n    <div class=\"dh-conf-hdr\"><div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv><span class=\"dh-conf-name\">HEATHER<\u002Fspan><\u002Fdiv>\n    <div class=\"dh-conf-body\">Remember his birthday? <em>Twerp is lucky I remember his name.<\u002Fem><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"alliance\" style=\"--dh-clr:var(--dh-heat)\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv>\n      <div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-cody)\">CD<\u002Fdiv>\n      <span class=\"dh-card-title\">The T-Rex Bone Pretext<\u002Fspan>\n      <span class=\"dh-badge dh-b-alliance\">FAILED PITCH<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Heather hands Cody a T-Rex femur, which Cody insists <em>\"looks more like a T-bone steak.\"<\u002Fem> She uses the prop as cover to pitch a flip: <strong>vote out Alejandro.<\u002Fstrong> Cody, doe-eyed: <i>\"You only want him out because you're in love with him.\"<\u002Fi> Heather, briefly purple, denies it. Cody is unmoved.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>STRATEGY <span class=\"neu\">honest, badly delivered<\u002Fspan><\u002Fspan>\n      <span>READ <span class=\"pink\">Cody — &gt; suspicious romance<\u002Fspan><\u002Fspan>\n      <span>RESULT <span class=\"neg\">no commitment<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── 02 DINO BUILD ─── -->\n<div class=\"dh-phase\" id=\"phase-dino\">\n  <div class=\"dh-stamp\">\n    <svg><use href=\"#dh-bone\"><\u002Fuse><\u002Fsvg>\n    <div class=\"dh-stamp-block\">\n      <span class=\"num\">PHASE 02 · CHALLENGE A<\u002Fspan>\n      <span class=\"ttl\">Dinosaur Build · Bone Yard<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sub\">4 exhibits · 1 electric chair vote · 0 paleontological accuracy<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"host\">\n    <div class=\"dh-card-hdr\">\n      <span class=\"dh-card-title\">Challenge Brief · \"Build a Dinosaur\"<\u002Fspan>\n      <span class=\"dh-card-time\">⏱  0822 · QUARRY FLOOR · STAGED BONE PILE<\u002Fspan>\n      <span class=\"dh-badge dh-b-host\">PART 1<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Each contestant builds a dinosaur from the quarry's bone scraps plus <em>anything useful<\u002Fem> they can salvage from the plane. Judging is by <strong>peer vote<\u002Fstrong> via lie-detecting electric chair — you cannot vote for yourself, and if you lie, you fry. Winner gets the best tool for Part 2.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-exhibits\">\n    <div class=\"dh-exhibit\" style=\"--dh-clr:var(--dh-alej)\">\n      <div class=\"dh-exh-tag\">EXHIBIT · A<\u002Fdiv>\n      <div class=\"dh-exh-hdr\">\n        <div class=\"dh-av\" style=\"--dh-clr:var(--dh-alej)\">AJ<\u002Fdiv>\n        <div>\n          <div class=\"dh-exh-name\">ALLOSAURUS<\u002Fdiv>\n          <div class=\"dh-exh-by\">by alejandro · faithfully reconstructed<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-dino\"><svg><use href=\"#dh-allo\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div class=\"dh-exh-cap\">A by-the-book Late Jurassic theropod. Bipedal, three fingers, serrated teeth. Anatomically defensible. Aesthetically: smug.<\u002Fdiv>\n      <div class=\"dh-exh-foot\">\n        <span class=\"k\">ACCURACY<\u002Fspan><span class=\"v\">100 %<\u002Fspan>\n        <span class=\"k\">VOTES<\u002Fspan><span class=\"v\">0<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"dh-exhibit\" style=\"--dh-clr:var(--dh-heat)\">\n      <div class=\"dh-exh-tag\">EXHIBIT · B<\u002Fdiv>\n      <div class=\"dh-exh-hdr\">\n        <div class=\"dh-av\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv>\n        <div>\n          <div class=\"dh-exh-name\">CHRISERATOPS<\u002Fdiv>\n          <div class=\"dh-exh-by\">by heather · for the judge in the room<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-dino\"><svg><use href=\"#dh-chris\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div class=\"dh-exh-cap\">A ceratopsid-shaped chassis topped with <strong>a printed-out photograph of Chris's face.<\u002Fstrong> Strategic flattery rendered in bone and glue. Chris loves it.<\u002Fdiv>\n      <div class=\"dh-exh-foot\">\n        <span class=\"k\">CHRIS BIAS<\u002Fspan><span class=\"v\">+8<\u002Fspan>\n        <span class=\"k\">VOTES<\u002Fspan><span class=\"v\">1<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"dh-exhibit\" style=\"--dh-clr:var(--dh-cody)\">\n      <div class=\"dh-exh-tag\">EXHIBIT · C<\u002Fdiv>\n      <div class=\"dh-exh-hdr\">\n        <div class=\"dh-av\" style=\"--dh-clr:var(--dh-cody)\">CD<\u002Fdiv>\n        <div>\n          <div class=\"dh-exh-name\">CODIOLITE<\u002Fdiv>\n          <div class=\"dh-exh-by\">né \"Codiodon\" · small-dog form factor<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-dino\"><svg><use href=\"#dh-codio\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div class=\"dh-exh-cap\">Started as <strong>the Codiodon.<\u002Fstrong> Cody passed it around to brag about how light it was. Alejandro identified the bones as <em>coprolite<\u002Fem> — fossilized dinosaur dung. Renamed accordingly. Re-handled less.<\u002Fdiv>\n      <div class=\"dh-exh-foot\">\n        <span class=\"k\">MATERIAL<\u002Fspan><span class=\"v\">DUNG<\u002Fspan>\n        <span class=\"k\">VOTES<\u002Fspan><span class=\"v\">0<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"dh-exhibit\" style=\"--dh-clr:var(--dh-sier)\">\n      <div class=\"dh-exh-tag\">EXHIBIT · D · WINNER<\u002Fdiv>\n      <div class=\"dh-exh-hdr\">\n        <div class=\"dh-av glitter\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv>\n        <div>\n          <div class=\"dh-exh-name\">HEARTBONE<\u002Fdiv>\n          <div class=\"dh-exh-by\">by sierra · pink glitter glue · party hat<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-dino\"><svg><use href=\"#dh-heartdino\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div class=\"dh-exh-cap\">Bone fragments arranged in a <em>shattered heart<\u002Fem>, a dinosaur skull below, a <strong>party hat<\u002Fstrong> on top. \"Today is Cody's <em>17th birthday.<\u002Fem>\" Cody had forgotten. Everyone else had no idea.<\u002Fdiv>\n      <div class=\"dh-exh-foot\">\n        <span class=\"k\">PARTY HAT<\u002Fspan><span class=\"v\">YES<\u002Fspan>\n        <span class=\"k\">VOTES<\u002Fspan><span class=\"v win\">2 · WIN<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-chair\">\n    <div class=\"dh-chair-hdr\">\n      <div>\n        <div class=\"dh-chair-ttl\">Lie-Detecting Chair <span class=\"zap\">⚡<\u002Fspan> Vote Log<\u002Fdiv>\n        <div class=\"dh-chair-sub\">Cannot vote self · Lying = shock · Truth = pass<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-chair-sub\" style=\"color:var(--dh-spark);\">PEER · 4 BALLOTS<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-chair-rows\">\n      <div class=\"dh-chair-row\" style=\"--dh-clr:var(--dh-heat)\">\n        <div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv>\n        <div>\n          <div class=\"dh-chair-voter\">VOTER · HEATHER<\u002Fdiv>\n          <div class=\"dh-chair-text\">Tried: <span class=\"lie\">\"Codiolite — best.\"<\u002Fspan> Truth: <b>SIERRA — \"I like glitter glue.\"<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dh-chair-zap shocked\">⚡ ZAPPED 1<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-chair-row\" style=\"--dh-clr:var(--dh-alej)\">\n        <div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-alej)\">AJ<\u002Fdiv>\n        <div>\n          <div class=\"dh-chair-voter\">VOTER · ALEJANDRO<\u002Fdiv>\n          <div class=\"dh-chair-text\">Tried: <span class=\"lie\">\"Codiolite — beautiful work.\"<\u002Fspan> Truth: <b>SIERRA — \"the emotion was genuine.\"<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dh-chair-zap shocked\">⚡ ZAPPED 1<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-chair-row\" style=\"--dh-clr:var(--dh-sier)\">\n        <div class=\"dh-av sm glitter\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv>\n        <div>\n          <div class=\"dh-chair-voter\">VOTER · SIERRA<\u002Fdiv>\n          <div class=\"dh-chair-text\"><b>HEATHER — Chriseratops.<\u002Fb> <span class=\"truth\">\"My mom and I both have a crush on Chris.\"<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dh-chair-zap clean\">✓ CLEAN<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-chair-row\" style=\"--dh-clr:var(--dh-cody)\">\n        <div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-cody)\">CD<\u002Fdiv>\n        <div>\n          <div class=\"dh-chair-voter\">VOTER · CODY<\u002Fdiv>\n          <div class=\"dh-chair-text\"><b>SIERRA — Heartbone.<\u002Fb> <span class=\"truth\">\"She remembered my birthday.\"<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dh-chair-zap clean\">✓ CLEAN<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"win\" style=\"--dh-clr:var(--dh-sier)\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av glitter\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv>\n      <span class=\"dh-card-title\">Part 1 Result · Sierra Takes The Post-Hole Digger<\u002Fspan>\n      <span class=\"dh-badge dh-b-sier\">PART 1 · WIN<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Sierra: 2 votes. Heather: 1. Alejandro and Cody: 0 each. Sierra wins Part 1 and the <strong>post-hole digger<\u002Fstrong> for Part 2. She immediately tests it by chasing Heather across the bone yard with it, grinning.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>TOOL · 1ST <span class=\"gold\">POST-HOLE DIGGER → SIERRA<\u002Fspan><\u002Fspan>\n      <span>TOOL · 2ND <span class=\"neu\">PROSPECTOR KIT → HEATHER<\u002Fspan><\u002Fspan>\n      <span>TOOL · 3RD <span class=\"pink\">BUCKET + KID'S SHOVEL → CODY<\u002Fspan><\u002Fspan>\n      <span>TOOL · 4TH <span class=\"neg\">BARE HANDS → ALEJANDRO<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── 03 BARREL DIG ─── -->\n<div class=\"dh-phase\" id=\"phase-dig\">\n  <div class=\"dh-stamp\">\n    <svg><use href=\"#dh-pick\"><\u002Fuse><\u002Fsvg>\n    <div class=\"dh-stamp-block\">\n      <span class=\"num\">PHASE 03 · CHALLENGE B<\u002Fspan>\n      <span class=\"ttl\">Barrel Dig · The Mistake<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sub\">4 barrels · oil, not syrup · chef · boulder catapult<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"host\">\n    <div class=\"dh-card-hdr\">\n      <span class=\"dh-card-title\">Intern Error · Wrong Barrels Buried<\u002Fspan>\n      <span class=\"dh-card-time\">⏱  0916 · CHEF ON CATAPULT DETAIL<\u002Fspan>\n      <span class=\"dh-badge dh-b-host\">PART 2<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Interns were ordered to bury barrels of <strong>maple syrup, sugar, spiders, and snakes<\u002Fstrong>. They buried <em>crude oil<\u002Fem>. Chris punishes the interns by tipping over the original barrels, releasing the venom. Then he announces the <em>fun twist<\u002Fem>: <strong>random boulders<\u002Fstrong> launched into the valley to disrupt the diggers. First to surface a barrel gets immunity.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>BARRELS <span class=\"neg\">4 · oil<\u002Fspan><\u002Fspan>\n      <span>BOULDER OP <span class=\"neg\">CHEF · catapult<\u002Fspan><\u002Fspan>\n      <span>STAKES <span class=\"gold\">IMMUNITY · final 4<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TOOL INVENTORY -->\n  <div class=\"dh-tools\">\n    <div class=\"dh-tool\" style=\"--dh-clr:var(--dh-sier)\">\n      <div class=\"dh-tool-rank\"><span class=\"pos\">1ST<\u002Fspan> · WINNER<\u002Fdiv>\n      <div class=\"dh-tool-who\">SIERRA<\u002Fdiv>\n      <div class=\"dh-tool-art\"><svg><use href=\"#dh-post\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div class=\"dh-tool-name\">Post-Hole Digger<\u002Fdiv>\n      <div class=\"dh-tool-note\">Also doubles as a weapon<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-tool\" style=\"--dh-clr:var(--dh-heat)\">\n      <div class=\"dh-tool-rank\">2ND<\u002Fdiv>\n      <div class=\"dh-tool-who\">HEATHER<\u002Fdiv>\n      <div class=\"dh-tool-art\"><svg><use href=\"#dh-pick\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div class=\"dh-tool-name\">Prospector Kit<\u002Fdiv>\n      <div class=\"dh-tool-note\">Pickaxe · hammer · pan<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-tool\" style=\"--dh-clr:var(--dh-cody)\">\n      <div class=\"dh-tool-rank\">3RD<\u002Fdiv>\n      <div class=\"dh-tool-who\">CODY<\u002Fdiv>\n      <div class=\"dh-tool-art\"><svg><use href=\"#dh-bucket\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div class=\"dh-tool-name\">Bucket + Kid's Shovel<\u002Fdiv>\n      <div class=\"dh-tool-note\">Sun-faded plastic · 7″<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-tool\" style=\"--dh-clr:var(--dh-alej)\">\n      <div class=\"dh-tool-rank\">4TH<\u002Fdiv>\n      <div class=\"dh-tool-who\">ALEJANDRO<\u002Fdiv>\n      <div class=\"dh-tool-art\"><svg><use href=\"#dh-shovel\" style=\"opacity:.2\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div class=\"dh-tool-name\">— Bare Hands —<\u002Fdiv>\n      <div class=\"dh-tool-note\">Not imaginary, but not 1st<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- QUARRY MAP -->\n  <div class=\"dh-quarry\">\n    <div class=\"dh-quarry-grid-label\" style=\"top:6px;left:10px;\">A1<\u002Fdiv>\n    <div class=\"dh-quarry-grid-label\" style=\"top:6px;right:10px;\">D1<\u002Fdiv>\n    <div class=\"dh-quarry-grid-label\" style=\"bottom:6px;left:10px;\">A4<\u002Fdiv>\n    <div class=\"dh-quarry-grid-label\" style=\"bottom:6px;right:10px;\">D4<\u002Fdiv>\n\n    <!-- buried barrels -->\n    <div class=\"dh-pin barrel\" style=\"top:32%;left:18%;\"><div class=\"marker\"><\u002Fdiv><div class=\"lbl\">BARREL · SR FOUND<\u002Fdiv><\u002Fdiv>\n    <div class=\"dh-pin barrel\" style=\"top:68%;left:42%;\"><div class=\"marker\"><\u002Fdiv><div class=\"lbl\">BARREL · AJ FOUND<\u002Fdiv><\u002Fdiv>\n    <div class=\"dh-pin barrel\" style=\"top:46%;left:66%;\"><div class=\"marker\"><\u002Fdiv><div class=\"lbl\">BARREL · HT (trapped)<\u002Fdiv><\u002Fdiv>\n    <div class=\"dh-pin barrel\" style=\"top:78%;left:82%;\"><div class=\"marker\"><\u002Fdiv><div class=\"lbl\">BARREL · unfound<\u002Fdiv><\u002Fdiv>\n\n    <!-- holes / hazards -->\n    <div class=\"dh-pin hole\" style=\"top:46%;left:66%;\"><div class=\"marker\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"dh-pin boulder\" style=\"top:38%;left:64%;\"><div class=\"marker\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"dh-pin boulder\" style=\"top:50%;left:30%;\"><div class=\"marker\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"dh-pin boulder\" style=\"top:72%;left:74%;\"><div class=\"marker\"><\u002Fdiv><\u002Fdiv>\n\n    <!-- plane wreck (foreshadow) -->\n    <div class=\"dh-pin plane\" style=\"top:14%;left:50%;\"><div class=\"marker\"><\u002Fdiv><div class=\"lbl\">JUMBO JET · STAGED<\u002Fdiv><\u002Fdiv>\n\n    <!-- contestants -->\n    <div class=\"dh-pin\" style=\"top:24%;left:20%;--dh-clr:var(--dh-sier);\">\n      <div class=\"marker\" style=\"background:var(--dh-sier)\"><\u002Fdiv>\n      <div class=\"lbl\" style=\"border-color:var(--dh-sier);color:#a4d488;\">SIERRA<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-pin\" style=\"top:60%;left:44%;--dh-clr:var(--dh-alej);\">\n      <div class=\"marker\" style=\"background:var(--dh-alej)\"><\u002Fdiv>\n      <div class=\"lbl\" style=\"border-color:var(--dh-alej);color:#9ab8e0;\">ALEJANDRO<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-pin\" style=\"top:40%;left:64%;--dh-clr:var(--dh-heat);\">\n      <div class=\"marker\" style=\"background:var(--dh-heat)\"><\u002Fdiv>\n      <div class=\"lbl\" style=\"border-color:var(--dh-heat);color:#f08090;\">HEATHER · STUCK<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-pin\" style=\"top:30%;left:32%;--dh-clr:var(--dh-cody);\">\n      <div class=\"marker\" style=\"background:var(--dh-cody)\"><\u002Fdiv>\n      <div class=\"lbl\" style=\"border-color:var(--dh-cody);color:#c098e8;\">CODY<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"dh-quarry-leg\">\n    <div class=\"dh-leg-i\"><span class=\"dh-leg-d barrel\"><\u002Fspan>buried oil barrel<\u002Fdiv>\n    <div class=\"dh-leg-i\"><span class=\"dh-leg-d hole\"><\u002Fspan>open dig hole<\u002Fdiv>\n    <div class=\"dh-leg-i\"><span class=\"dh-leg-d boulder\"><\u002Fspan>boulder impact<\u002Fdiv>\n    <div class=\"dh-leg-i\"><span class=\"dh-leg-d plane\"><\u002Fspan>jumbo jet (staged)<\u002Fdiv>\n    <div class=\"dh-leg-i\"><span class=\"dh-leg-d sr\"><\u002Fspan>SR · Sierra<\u002Fdiv>\n    <div class=\"dh-leg-i\"><span class=\"dh-leg-d aj\"><\u002Fspan>AJ · Alejandro<\u002Fdiv>\n    <div class=\"dh-leg-i\"><span class=\"dh-leg-d ht\"><\u002Fspan>HT · Heather<\u002Fdiv>\n    <div class=\"dh-leg-i\"><span class=\"dh-leg-d cd\"><\u002Fspan>CD · Cody<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"rescue\" style=\"--dh-clr:var(--dh-cody)\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av\" style=\"--dh-clr:var(--dh-cody)\">CD<\u002Fdiv>\n      <div class=\"dh-av glitter\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv>\n      <span class=\"dh-card-title\">The Boulder &amp; The Photograph<\u002Fspan>\n      <span class=\"dh-badge dh-b-rescue\">SECTOR B2 · BARREL #1<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      A boulder lands near Sierra. Cody yanks her clear. He sees the photo crumpled in her fist and clocks the forgery instantly: <strong>only econ class is in frame<\u002Fstrong>, and <em>\"Sierra never leaves me alone unless I have to pee.\"<\u002Fem> Sierra digs furiously through the realization and her shovel hits <strong>barrel #1<\u002Fstrong>. Cody waives his claim — she takes immunity. They agree: whoever sees Heather first explains the frame-up. Then they swing the vote to <strong>Alejandro<\u002Fstrong>.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>RESCUE <span class=\"pos\">CODY → SIERRA<\u002Fspan><\u002Fspan>\n      <span>FORGERY <span class=\"pos\">DETECTED<\u002Fspan><\u002Fspan>\n      <span>IMMUNITY <span class=\"gold\">SIERRA · 1ST<\u002Fspan><\u002Fspan>\n      <span>NEW PLAN <span class=\"neg\">SWING VOTE → AJ<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"rescue\" style=\"--dh-clr:var(--dh-alej)\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av\" style=\"--dh-clr:var(--dh-alej)\">AJ<\u002Fdiv>\n      <div class=\"dh-av\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv>\n      <span class=\"dh-card-title\">The Hole · Heather Pinned, Alejandro Caves<\u002Fspan>\n      <span class=\"dh-badge dh-b-rescue\">SECTOR C3 · BARREL #3<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Heather hurls her pickaxe in frustration; it hits a barrel. Before she can dig it out, a boulder lands and traps her in her own hole. Alejandro arrives. Chris orders them to <em>sing a song<\u002Fem>. Alejandro plans to walk away. Heather argues that her dying in a hole would be a <strong>\"hollow victory\"<\u002Fstrong> and that they are <em>the greatest adversaries in Total Drama history<\u002Fem> and deserve a proper finish. He digs her out. He holds her, briefly, with his hand on her shoulder. They drag both barrels in tied for second.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>RESULT <span class=\"neu\">TIED 2ND · HT + AJ<\u002Fspan><\u002Fspan>\n      <span>VECTOR <span class=\"pink\">romantic tension · plausible deniability<\u002Fspan><\u002Fspan>\n      <span>HEATHER VOW <span class=\"neg\">\"never vote AJ again\"<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-conf\" style=\"--dh-clr:var(--dh-heat)\">\n    <div class=\"dh-conf-hdr\"><div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv><span class=\"dh-conf-name\">HEATHER<\u002Fspan><\u002Fdiv>\n    <div class=\"dh-conf-body\">Anyone who asks me if I liked having his hand on my shoulder <em>will be wedged in a hole of their own.<\u002Fem> Got it? It is all strategic.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-conf\" style=\"--dh-clr:var(--dh-alej)\">\n    <div class=\"dh-conf-hdr\"><div class=\"dh-av sm\" style=\"--dh-clr:var(--dh-alej)\">AJ<\u002Fdiv><span class=\"dh-conf-name\">ALEJANDRO<\u002Fspan><\u002Fdiv>\n    <div class=\"dh-conf-body\">I did not let my feelings get in the way of the game. <em>I changed my mind.<\u002Fem> Got it? <strong>It's all strategic.<\u002Fstrong><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"alliance\" style=\"--dh-clr:var(--dh-sier)\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av glitter\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv>\n      <div class=\"dh-av\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv>\n      <span class=\"dh-card-title\">Confessional Booth Crash · Sierra Tells Heather<\u002Fspan>\n      <span class=\"dh-badge dh-b-sier\">VOTE SWING<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Sierra barges into Heather's confessional. Heather assumes she is about to be killed. Sierra clarifies: <em>\"We need to talk.\"<\u002Fem> She lays out the forgery. Heather, who was already on Alejandro for getting her into the hole, accepts in approximately one second. <strong>Three votes for Alejandro<\u002Fstrong> are now locked.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>VOTERS LOCKED <span class=\"neg\">SR · CD · HT → AJ<\u002Fspan><\u002Fspan>\n      <span>AJ KNOWLEDGE <span class=\"neu\">unaware<\u002Fspan><\u002Fspan>\n      <span>RISK <span class=\"gold\">tiebreaker · cake<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ─── 04 CEREMONY & BOOM ─── -->\n<div class=\"dh-phase\" id=\"phase-boom\">\n  <div class=\"dh-stamp\">\n    <svg><use href=\"#dh-cake\"><\u002Fuse><\u002Fsvg>\n    <div class=\"dh-stamp-block\">\n      <span class=\"num\">PHASE 04 · TRIBAL · DETONATION<\u002Fspan>\n      <span class=\"ttl\">Marshmallows &amp; A Birthday Cake<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sub\">3 marshmallows · 4 votes · 1 cake · 1 puddle of oil<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-mallow\">\n    <div class=\"dh-mallow-ttl\">Marshmallow Ceremony · Season 1 Throwback<\u002Fdiv>\n    <div class=\"dh-mallow-sub\">\"In honor of the first season.\"<\u002Fdiv>\n    <div class=\"dh-mallow-row\">\n      <div class=\"dh-mallow-c\" style=\"--dh-clr:var(--dh-sier)\">\n        <span class=\"dh-mallow-stamp safe\">SAFE 1<\u002Fspan>\n        <div class=\"dh-av lg glitter\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv>\n        <div class=\"nm\">SIERRA<\u002Fdiv>\n        <div class=\"dh-mm-row\"><div class=\"dh-mm\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"order\">1ST CALLED<\u002Fdiv>\n        <div class=\"votes\">Eaten: <b>yes, since season 1<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-mallow-c\" style=\"--dh-clr:var(--dh-heat)\">\n        <span class=\"dh-mallow-stamp safe\">SAFE 2<\u002Fspan>\n        <div class=\"dh-av lg\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv>\n        <div class=\"nm\">HEATHER<\u002Fdiv>\n        <div class=\"dh-mm-row\"><div class=\"dh-mm\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"order\">2ND CALLED<\u002Fdiv>\n        <div class=\"votes\">Votes against: <b>0<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-mallow-c\" style=\"--dh-clr:var(--dh-cody)\">\n        <span class=\"dh-mallow-stamp f3\">F3<\u002Fspan>\n        <div class=\"dh-av lg\" style=\"--dh-clr:var(--dh-cody)\">CD<\u002Fdiv>\n        <div class=\"nm\">CODY<\u002Fdiv>\n        <div class=\"dh-mm-row\"><\u002Fdiv>\n        <div class=\"order\">— LAST READ —<\u002Fdiv>\n        <div class=\"votes\">Votes against: <b>1 (HT, pre-flip)<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-mallow-c dq\" style=\"--dh-clr:var(--dh-alej)\">\n        <span class=\"dh-mallow-stamp\">REVOKED<\u002Fspan>\n        <div class=\"dh-av lg\" style=\"--dh-clr:var(--dh-alej)\">AJ<\u002Fdiv>\n        <div class=\"nm\">ALEJANDRO<\u002Fdiv>\n        <div class=\"dh-mm-row\"><\u002Fdiv>\n        <div class=\"order\">2 VOTES READ<\u002Fdiv>\n        <div class=\"votes\">Final vote: <b>uncounted (cake)<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"birthday\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av glitter\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv>\n      <span class=\"dh-card-title\">\"Wait — Before You Read The Last Vote —\"<\u002Fspan>\n      <span class=\"dh-card-time\">⏱  1814 · MARSHMALLOW PIT · OIL-SLICK PERIMETER<\u002Fspan>\n      <span class=\"dh-badge dh-b-birthday\">CAKE INCOMING<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Sierra interrupts Chris mid-tally — <em>\"we have all been through so much together\"<\u002Fem> — and produces a <strong>chocolate birthday cake<\u002Fstrong> for Cody, candles already lit. The candles are <em>sparkler-style<\u002Fem>. Sierra is standing in the middle of the spilled barrel-#1 oil. The others scream. Sierra does not hear. The sparks fall.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>CAKE FLAVOR <span class=\"pink\">CODY'S FAVORITE — CHOCOLATE<\u002Fspan><\u002Fspan>\n      <span>CANDLES <span class=\"gold\">SPARKLERS · 4 lit<\u002Fspan><\u002Fspan>\n      <span>FOOTING <span class=\"neg\">OIL SLICK · 2-INCH POOL<\u002Fspan><\u002Fspan>\n      <span>WARNING <span class=\"neg\">ignored<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-boom\">\n    <div class=\"dh-boom-hdr\">\n      <div>\n        <div class=\"dh-boom-ttl\">— KABOOM —<\u002Fdiv>\n        <div class=\"dh-boom-sub\">TOTAL DRAMA JUMBO JET · TERMINAL EVENT<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dh-boom-sub\" style=\"color:var(--dh-fuse)\">EZEKIEL &amp; FAUNA · UNANIMOUSLY EVAC'D<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-boom-body\">\n      Every animal aboard the Jumbo Jet — plus <em>Ezekiel<\u002Fem> — is observed sprinting away from the fuselage in the seconds before detonation. The plane goes up. The marshmallows toast themselves. Sierra emerges covered in soot, hair hissing, asking <strong>\"Am I okay?\"<\u002Fstrong> Her hair quietly disintegrates as she speaks. The cake is ruined. The cake was <i>chocolate<\u002Fi>, which was Cody's favorite.\n    <\u002Fdiv>\n    <div class=\"dh-boom-stats\">\n      <div class=\"dh-boom-st\"><div class=\"k\">Plane<\u002Fdiv><div class=\"v gone\">DESTROYED<\u002Fdiv><\u002Fdiv>\n      <div class=\"dh-boom-st\"><div class=\"k\">Sierra HP<\u002Fdiv><div class=\"v gone\">CHARRED<\u002Fdiv><\u002Fdiv>\n      <div class=\"dh-boom-st\"><div class=\"k\">Chris mood<\u002Fdiv><div class=\"v gone\">FURIOUS<\u002Fdiv><\u002Fdiv>\n      <div class=\"dh-boom-st\"><div class=\"k\">Chris's toothbrush<\u002Fdiv><div class=\"v spark\">SAVED<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"boom\">\n    <div class=\"dh-card-hdr\">\n      <span class=\"dh-card-title\">Sentence · Immunity Revoked, Sierra Out<\u002Fspan>\n      <span class=\"dh-card-time\">⏱  1822 · IMMEDIATELY POST-BLAST<\u002Fspan>\n      <span class=\"dh-badge dh-b-boom\">DISQUALIFICATION<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Chris, on the verge of crying, revokes Sierra's <strong>immunity<\u002Fstrong> and disqualifies her on the spot. The cake doesn't matter. The third marshmallow goes to <strong>Cody<\u002Fstrong> by default. Sierra, still smoking, pleads with Cody to <em>\"win it for both of us.\"<\u002Fem>\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>OUT <span class=\"neg\">SIERRA · DQ · jumbo-jet arson<\u002Fspan><\u002Fspan>\n      <span>FINAL 3 <span class=\"gold\">HEATHER · ALEJANDRO · CODY<\u002Fspan><\u002Fspan>\n      <span>RESIDENCE <span class=\"neu\">homeless · ground transit pending<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-card\" data-type=\"vote\">\n    <div class=\"dh-card-hdr\">\n      <div class=\"dh-av\" style=\"--dh-clr:var(--dh-alej)\">AJ<\u002Fdiv>\n      <div class=\"dh-av\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv>\n      <span class=\"dh-card-title\">Coda · The Passport Pyre<\u002Fspan>\n      <span class=\"dh-card-time\">⏱  1908 · TIKI WRECKAGE · SMOLDERING<\u002Fspan>\n      <span class=\"dh-badge dh-b-vote\">EVIDENCE<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-card-body\">\n      Heather quietly steps away to <em>burn the voted passports<\u002Fem>. Alejandro, watching from behind a fallen tiki statue, pulls them back out of the fire before they finish. The third vote against him was <strong>Heather's.<\u002Fstrong> They were in an alliance. He swears vengeance. Chris, mournful, signs off the show.\n    <\u002Fdiv>\n    <div class=\"dh-card-meta\">\n      <span>EVIDENCE <span class=\"neg\">3rd vote · HT → AJ<\u002Fspan><\u002Fspan>\n      <span>ALLIANCE STATUS <span class=\"neg\">covertly broken<\u002Fspan><\u002Fspan>\n      <span>AJ KNOWLEDGE <span class=\"gold\">FULL · UNDECLARED<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dh-winner\">\n    <div class=\"tag\">— ELIMINATED —<\u002Fdiv>\n    <div class=\"nm\">SIERRA<\u002Fdiv>\n    <div class=\"sub\">\"It is the best day of the entire year.\"<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv><!-- /main -->\n\n\n<!-- ════════════ SIDEBAR ════════════ -->\n<aside class=\"dh-side\">\n\n  <div class=\"dh-box\">\n    <div class=\"dh-box-hdr\">\n      <span class=\"dh-box-title\">Episode Progress<\u002Fspan>\n      <span class=\"dh-box-meta\">5 phases<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-progress\" id=\"prog\">\n er\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv>\n        <div>\n          <div class=\"dh-tally-nm\">SIERRA<\u002Fdiv>\n          <div class=\"dh-tally-marks\"><span class=\"m safe\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dh-tally-count zero\">0<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:8px;padding-top:7px;border-top:1px dashed rgba(213,138,58,.2);\n        font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.5px;\n        color:var(--dh-dust);line-height:1.55;\">\n        <span style=\"color:var(--dh-fuse);\">*<\u002Fspan> Final vote (HT → AJ) <em style=\"color:var(--dh-spark);font-style:normal;\">unread<\u002Fem> due to detonation. Burned passport recovered by AJ post-blast.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ALLIANCE WEB -->\n  <div class=\"dh-box\">\n    <div class=\"dh-box-hdr\">\n      <span class=\"dh-box-title\">Alliance Web<\u002Fspan>\n      <span class=\"dh-box-meta\">PRE-CEREMONY<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-web\" id=\"web\">\n      <!-- positions: AJ(20,30) HT(80,30) CD(80,80) SR(20,80) -->\n      <div class=\"dh-web-node\" style=\"--dh-clr:var(--dh-alej);left:20%;top:24%;\">AJ<\u002Fdiv>\n      <div class=\"dh-web-node\" style=\"--dh-clr:var(--dh-heat);left:80%;top:24%;\">HT<\u002Fdiv>\n      <div class=\"dh-web-node\" style=\"--dh-clr:var(--dh-sier);left:20%;top:78%;\">SR<\u002Fdiv>\n      <div class=\"dh-web-node\" style=\"--dh-clr:var(--dh-cody);left:80%;top:78%;\">CD<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dh-web-leg\">\n      <span class=\"dh-web-leg-i\"><span class=\"dh-web-leg-l\" style=\"background:rgba(154,216,128,.7)\"><\u002Fspan>trust<\u002Fspan>\n      <span class=\"dh-web-leg-i\"><span class=\"dh-web-leg-l\" style=\"background:repeating-linear-gradient(90deg,rgba(196,50,72,.8) 0,rgba(196,50,72,.8) 4px,transparent 4px,transparent 8px)\"><\u002Fspan>frame-up<\u002Fspan>\n      <span class=\"dh-web-leg-i\"><span class=\"dh-web-leg-l\" style=\"background:repeating-linear-gradient(90deg,rgba(168,40,28,.8) 0,rgba(168,40,28,.8) 3px,transparent 3px,transparent 6px)\"><\u002Fspan>target<\u002Fspan>\n      <span class=\"dh-web-leg-i\"><span class=\"dh-web-leg-l\" style=\"background:linear-gradient(90deg,rgba(123,75,168,.8),rgba(240,168,184,.6))\"><\u002Fspan>obsess<\u002Fspan>\n      <span class=\"dh-web-leg-i\"><span class=\"dh-web-leg-l\" style=\"background:linear-gradient(90deg,rgba(196,50,72,.7),rgba(58,93,143,.7))\"><\u002Fspan>thaw<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FINAL 3 -->\n  <div class=\"dh-box\">\n    <div class=\"dh-box-hdr\">\n      <span class=\"dh-box-title\">Final 3 · Next Episode<\u002Fspan>\n      <span class=\"dh-box-meta\">EP·24 PREVIEW<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dh-final3\">\n      <div class=\"seat\" style=\"--dh-clr:var(--dh-heat)\"><div class=\"dh-av\" style=\"--dh-clr:var(--dh-heat)\">HT<\u002Fdiv><div class=\"nm\">HEATHER<\u002Fdiv><\u002Fdiv>\n      <div class=\"seat\" style=\"--dh-clr:var(--dh-alej)\"><div class=\"dh-av\" style=\"--dh-clr:var(--dh-alej)\">AJ<\u002Fdiv><div class=\"nm\">ALEJANDRO<\u002Fdiv><\u002Fdiv>\n      <div class=\"seat\" style=\"--dh-clr:var(--dh-cody)\"><div class=\"dh-av\" style=\"--dh-clr:var(--dh-cody)\">CD<\u002Fdiv><div class=\"nm\">CODY<\u002Fdiv><\u002Fdiv>\n      <div class=\"seat out\" style=\"--dh-clr:var(--dh-sier)\"><div class=\"dh-av out\" style=\"--dh-clr:var(--dh-sier)\">SR<\u002Fdiv><div class=\"nm\">OUT<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:8px;font-family:'Cutive Mono',monospace;font-size:11px;color:var(--dh-dust);line-height:1.55;\">\n      Next ep: <em style=\"color:var(--dh-fuse);font-style:normal;\">\"Hawaiian Style\"<\u002Fem> · open beach · no plane · final three.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Faside>\n<\u002Fdiv><!-- /shell -->\n\n<script>\n/* Tabs */\nconst tabs = document.querySelectorAll('.dh-tab');\nconst phases = document.querySelectorAll('.dh-phase');\nconst progSteps = document.querySelectorAll('.dh-prog-step');\nconst order = ['brief','frame','dino','dig','boom'];\n\nfunction go(p){\n  tabs.forEach(t=>t.classList.toggle('active', t.dataset.phase===p));\n  phases.forEach(ph=>ph.classList.toggle('active', ph.id===('phase-'+p)));\n  const idx = order.indexOf(p);\n  progSteps.forEach((s,i)=>{\n    s.classList.toggle('now', i===idx);\n    s.classList.toggle('done', i<idx);\n  });\n  window.scrollTo({top:0,behavior:'smooth'});\n}\ntabs.forEach(t=>t.addEventListener('click',()=>go(t.dataset.phase)));\nprogSteps.forEach(s=>s.addEventListener('click',()=>go(s.dataset.phase)));\n\n/* Alliance web lines */\nconst web = document.getElementById('web');\nfunction pos(sel){\n  const n = web.querySelector(sel); if(!n) return null;\n  return {x: parseFloat(n.style.left), y: parseFloat(n.style.top)};\n}\nfunction line(a,b,cls){\n  const ap = pos(a), bp = pos(b); if(!ap||!bp) return;\n  // pct → use container size\n  const W = web.clientWidth, H = web.clientHeight;\n  const ax = ap.x/100*W, ay = ap.y/100*H;\n  const bx = bp.x/100*W, by = bp.y/100*H;\n  const dx = bx-ax, dy = by-ay;\n  const len = Math.hypot(dx,dy);\n  const ang = Math.atan2(dy,dx)*180/Math.PI;\n  const el = document.createElement('div');\n  el.className = 'dh-web-line '+cls;\n  el.style.left = ax+'px';\n  el.style.top = ay+'px';\n  el.style.width = len+'px';\n  el.style.transform = `rotate(${ang}deg)`;\n  web.appendChild(el);\n}\nfunction drawWeb(){\n  // clear lines\n  web.querySelectorAll('.dh-web-line').forEach(n=>n.remove());\n  // AJ ↔ HT thaw, AJ → SR frame-up, SR → HT target (then flipped), CD ↔ SR bond, HT → AJ target (secret)\n  line('[style*=\"--dh-clr:var(--dh-cody)\"]','[style*=\"--dh-clr:var(--dh-sier)\"]','bond');\n  line('[style*=\"--dh-clr:var(--dh-alej)\"]','[style*=\"--dh-clr:var(--dh-sier)\"]','frame');\n  line('[style*=\"--dh-clr:var(--dh-sier)\"]','[style*=\"--dh-clr:var(--dh-heat)\"]','target');\n  line('[style*=\"--dh-clr:var(--dh-alej)\"]','[style*=\"--dh-clr:var(--dh-heat)\"]','thaw');\n  line('[style*=\"--dh-clr:var(--dh-heat)\"]','[style*=\"--dh-clr:var(--dh-alej)\"]','frame');\n}\ndrawWeb();\nwindow.addEventListener('resize',drawWeb);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
