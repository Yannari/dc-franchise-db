<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Season Profile</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root { --sc: #a78bfa; --sc-glow: rgba(167,139,250,.3); }

    .sr-hero { position:relative; border-radius:22px; overflow:hidden; margin-bottom:28px; min-height:200px; border:1px solid rgba(255,255,255,.1); }
    .sr-hero-photo { position:absolute; inset:0; background-size:cover; background-position:center top; opacity:0; transition:opacity .8s; }
    .sr-hero-overlay { position:absolute; inset:0; background:linear-gradient(135deg,rgba(10,5,25,.97) 0%,rgba(10,5,25,.65) 100%); }
    .sr-hero-body { position:relative; z-index:1; padding:36px 40px 32px; }
    .sr-hero-snum { font-size:11px; font-weight:800; letter-spacing:.15em; text-transform:uppercase; color:var(--sc); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
    .sr-hero-title { font-family:var(--font-samdan,'Samdan',sans-serif); font-size:clamp(1.6rem,4vw,2.8rem); font-weight:700; color:#fff; margin:0 0 6px; line-height:1.15; text-shadow:0 0 40px var(--sc-glow); }
    .sr-hero-sub { font-size:14px; color:var(--muted); margin:0 0 20px; }
    .sr-hero-pills { display:flex; flex-wrap:wrap; gap:8px; }
    .sr-pill { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.7); }
    .sr-pill.accent { background:rgba(255,255,255,.06); border-color:var(--sc); color:var(--sc); }

    .sr-winner { background:linear-gradient(135deg,rgba(245,158,11,.1) 0%,rgba(255,255,255,.03) 100%); border:1px solid rgba(245,158,11,.3); border-radius:20px; padding:24px 28px; margin-bottom:20px; position:relative; overflow:hidden; }
    .sr-winner::before { content:''; position:absolute; top:-30px; right:-30px; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle,rgba(245,158,11,.15),transparent 70%); pointer-events:none; }
    .sr-winner-lbl { font-size:10px; font-weight:800; letter-spacing:.15em; text-transform:uppercase; color:#f59e0b; margin-bottom:16px; }
    .sr-winner-row { display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
    .sr-winner-av { width:72px; height:72px; border-radius:50%; flex-shrink:0; border:3px solid rgba(245,158,11,.6); box-shadow:0 0 20px rgba(245,158,11,.3); overflow:hidden; background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; font-size:28px; }
    .sr-winner-av img { width:100%; height:100%; object-fit:cover; display:block; }
    .sr-winner-info { flex:1; min-width:180px; }
    .sr-winner-name { font-family:var(--font-samdan,'Samdan',sans-serif); font-size:1.7rem; font-weight:700; color:#f59e0b; margin:0 0 3px; }
    .sr-winner-vote { font-size:13px; color:var(--muted); margin-bottom:8px; }
    .sr-finalists { margin-top:20px; }
    .sr-finalists-lbl { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    .sr-finalist-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .sr-finalist-name { font-size:13px; font-weight:700; width:90px; flex-shrink:0; }
    .sr-finalist-bar-wrap { flex:1; height:8px; background:rgba(255,255,255,.06); border-radius:20px; overflow:hidden; }
    .sr-finalist-bar { height:100%; border-radius:20px; transition:width 1s cubic-bezier(.22,.61,.36,1); }
    .sr-finalist-votes { font-size:12px; font-weight:700; width:28px; text-align:right; }

    .sr-tabs { display:flex; gap:4px; margin-bottom:24px; background:rgba(255,255,255,.04); padding:4px; border-radius:14px; border:1px solid rgba(255,255,255,.08); flex-wrap:wrap; }
    .sr-tab { padding:9px 18px; border-radius:10px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; transition:all .2s; border:none; background:none; }
    .sr-tab.on { background:var(--sc-glow); color:var(--sc); box-shadow:0 0 0 1px var(--sc); }
    .sr-tab:hover:not(.on) { color:#fff; background:rgba(255,255,255,.06); }
    .sr-panel { display:none; }
    .sr-panel.on { display:block; animation:srIn .3s ease; }
    @keyframes srIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .sr-sh { display:flex; align-items:center; gap:10px; margin:0 0 16px; padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,.08); }
    .sr-sh h2 { margin:0; font-size:1rem; font-weight:700; font-family:var(--font-samdan,'Samdan',sans-serif); letter-spacing:.05em; color:#fff; }
    .sr-sh-pill { padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; background:var(--sc-glow); border:1px solid var(--sc); color:var(--sc); }

    .sr-moments { display:flex; flex-direction:column; gap:8px; margin-bottom:28px; }
    .sr-moment { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; border-radius:12px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); font-size:13px; color:rgba(255,255,255,.85); line-height:1.5; opacity:0; transform:translateX(-8px); animation:momentIn .4s ease forwards; }
    @keyframes momentIn { to{opacity:1;transform:none} }
    .sr-moment-num { font-family:var(--font-samdan,'Samdan',sans-serif); font-size:.8rem; font-weight:700; color:var(--sc); flex-shrink:0; width:22px; text-align:center; margin-top:1px; }

    .sr-records { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:10px; margin-bottom:28px; }
    .sr-record { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:13px; padding:14px 16px; border-left:3px solid var(--sc); }
    .sr-record-lbl { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:5px; }
    .sr-record-val { font-family:var(--font-samdan,'Samdan',sans-serif); font-size:1.1rem; font-weight:700; color:var(--sc); }
    .sr-record-sub { font-size:11px; color:var(--muted); margin-top:2px; }

    .sr-placement-row { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); border-radius:14px; margin-bottom:8px; overflow:hidden; transition:border-color .2s; }
    .sr-placement-row:hover { border-color:var(--sc); }
    .sr-placement-header { display:flex; align-items:center; gap:14px; padding:13px 16px; cursor:pointer; }
    .sr-p-num { font-family:var(--font-samdan,'Samdan',sans-serif); font-size:1.1rem; font-weight:700; color:var(--sc); width:36px; text-align:center; flex-shrink:0; }
    .sr-p-av { width:44px; height:44px; border-radius:50%; flex-shrink:0; border:2px solid var(--sc); overflow:hidden; background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; box-shadow:0 0 10px var(--sc-glow); }
    .sr-p-av img { width:100%; height:100%; object-fit:cover; display:block; }
    .sr-p-info { flex:1; min-width:0; }
    .sr-p-name { font-weight:800; font-size:15px; color:#fff; text-decoration:none; display:block; }
    .sr-p-name:hover { color:var(--sc); }
    .sr-p-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .sr-p-phase { padding:3px 9px; border-radius:10px; font-size:11px; font-weight:700; white-space:nowrap; flex-shrink:0; }
    .sr-p-phase.winner { background:rgba(245,158,11,.18); border:1px solid rgba(245,158,11,.4); color:#f59e0b; }
    .sr-p-phase.finalist { background:rgba(167,139,250,.15); border:1px solid rgba(167,139,250,.4); color:#a78bfa; }
    .sr-p-phase.juror { background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.3); color:#34d399; }
    .sr-p-phase.pre-merge { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:var(--muted); }
    .sr-p-expand { font-size:14px; color:var(--muted); flex-shrink:0; transition:transform .2s; }
    .sr-placement-row.open .sr-p-expand { transform:rotate(90deg); }
    .sr-placement-body { display:none; padding:0 16px 16px; border-top:1px solid rgba(255,255,255,.06); padding-top:14px; }
    .sr-placement-row.open .sr-placement-body { display:block; }
    .sr-p-story { font-size:13px; color:rgba(255,255,255,.8); line-height:1.7; margin-bottom:12px; }
    .sr-p-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
    .sr-p-chip { padding:3px 9px; border-radius:10px; font-size:11px; font-weight:600; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:#ccc; }
    .sr-p-chip.imm { background:rgba(96,165,250,.1); border-color:rgba(96,165,250,.3); color:#60a5fa; }
    .sr-p-chip.idol { background:rgba(167,139,250,.1); border-color:rgba(167,139,250,.3); color:#a78bfa; }
    .sr-p-chip.votes { background:rgba(255,92,122,.09); border-color:rgba(255,92,122,.3); color:#ff7a96; }
    .sr-p-chip.ally { background:rgba(52,211,153,.09); border-color:rgba(52,211,153,.3); color:#34d399; }
    .sr-p-chip.rival { background:rgba(251,146,60,.09); border-color:rgba(251,146,60,.3); color:#fb923c; }
    .sr-p-moments { font-size:12px; color:var(--muted); margin-top:6px; }
    .sr-p-moment-item { padding:4px 0; border-bottom:1px solid rgba(255,255,255,.04); }
    .sr-p-moment-item:last-child { border-bottom:none; }


    .sr-timeline { display:flex; flex-direction:column; gap:8px; }
    .sr-ep { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); border-radius:12px; padding:12px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .sr-ep-num { font-family:var(--font-samdan,'Samdan',sans-serif); font-size:.85rem; font-weight:700; color:var(--sc); width:48px; flex-shrink:0; text-align:center; }
    .sr-ep-boot { flex-shrink:0; display:flex; align-items:center; gap:8px; }
    .sr-ep-boot-av { width:34px; height:34px; border-radius:50%; border:2px solid rgba(255,92,122,.5); overflow:hidden; background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; }
    .sr-ep-boot-av img { width:100%; height:100%; object-fit:cover; display:block; }
    .sr-ep-boot-name { font-size:13px; font-weight:700; color:rgba(255,92,122,.9); }
    .sr-ep-votes { display:flex; flex-wrap:wrap; gap:4px; flex:1; }
    .sr-ep-vote { padding:2px 7px; border-radius:6px; font-size:10px; font-weight:600; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); color:var(--muted); }
    .sr-ep-novote { font-size:12px; color:var(--muted); font-style:italic; }

    .sr-narrative { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-left:4px solid var(--sc); border-radius:0 14px 14px 0; padding:20px 24px; font-size:14px; color:rgba(255,255,255,.85); line-height:1.8; margin-bottom:24px; }
    /* Top finishers strip */
    .sr-top-strip { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; margin-bottom:16px; }
    .sr-top-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:14px 10px; text-align:center; text-decoration:none; color:inherit; transition:transform .2s,border-color .2s; display:flex; flex-direction:column; align-items:center; gap:7px; }
    .sr-top-card:hover { transform:translateY(-4px); border-color:var(--sc); }
    .sr-top-num { font-family:var(--font-samdan,'Samdan',sans-serif); font-size:.95rem; font-weight:700; color:var(--sc); }
    .sr-top-av { width:48px; height:48px; border-radius:50%; border:2px solid var(--sc); overflow:hidden; background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; box-shadow:0 0 10px var(--sc-glow); }
    .sr-top-av img { width:100%; height:100%; object-fit:cover; display:block; }
    .sr-top-name { font-size:12px; font-weight:700; color:#fff; }
    .sr-top-phase { font-size:10px; font-weight:600; padding:2px 7px; border-radius:8px; }
    .sr-top-phase.winner { background:rgba(245,158,11,.18); color:#f59e0b; }
    .sr-top-phase.finalist { background:rgba(167,139,250,.15); color:#a78bfa; }
    .sr-top-phase.juror { background:rgba(52,211,153,.1); color:#34d399; }
    .sr-top-phase.pre-merge { background:rgba(255,255,255,.05); color:var(--muted); }

    /* Award highlights */
    .sr-highlights-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; margin-bottom:24px; }
    .sr-hl-card { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-left:3px solid var(--sc); border-radius:12px; padding:14px 16px; transition:border-color .2s; }
    .sr-hl-card:hover { border-color:var(--sc); background:rgba(255,255,255,.05); }
    .sr-hl-label { font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--sc); margin-bottom:9px; }
    .sr-hl-row { display:flex; align-items:flex-start; gap:10px; }
    .sr-hl-av { width:36px; height:36px; border-radius:50%; flex-shrink:0; border:2px solid var(--sc); overflow:hidden; background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; }
    .sr-hl-av img { width:100%; height:100%; object-fit:cover; display:block; }
    .sr-hl-name { font-size:13px; font-weight:800; margin-bottom:3px; }
    .sr-hl-desc { font-size:11px; color:var(--muted); line-height:1.5; }

    /* Nav footer */
    .sr-nav-footer { display:flex; gap:10px; flex-wrap:wrap; margin-top:24px; padding-top:20px; border-top:1px solid rgba(255,255,255,.08); }
    .sr-nav-btn { padding:10px 18px; border-radius:12px; font-size:13px; font-weight:700; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.7); text-decoration:none; transition:all .2s; }
    .sr-nav-btn:hover { background:rgba(255,255,255,.1); color:#fff; }
    .sr-nav-btn.accent { background:var(--sc-glow); border-color:var(--sc); color:var(--sc); }
    .sr-nav-btn.accent:hover { background:var(--sc); color:#000; }

    .sr-reveal { opacity:0; transform:translateY(16px); transition:opacity .45s ease,transform .45s ease; }
    .sr-reveal.visible { opacity:1; transform:none; }
    @media(max-width:700px){ .sr-hero-body{padding:24px 20px} .sr-awards-grid{grid-template-columns:1fr} }
  </style>
</head>

(function(){
  if(window.SITE_CONFIG){
    document.getElementById('totalSeasons').textContent=window.SITE_CONFIG.seasons;

    document.getElementById('currentSeasonNum').textContent=window.SITE_CONFIG.currentSeason;

  const h=document.getElementById('modernHeader');
  if(!h)return;
  window.addEventListener('scroll',()=>h.classList.toggle('scrolled',window.pageYOffset>20),{passive:true});
  const cur=window.location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.nav-link').forEach(l=>{if(l.getAttribute('href')===cur)l.classList.add('active');});
})();

<script>
const SEASON_COLORS=['#60a5fa','#a78bfa','#34d399','#f59e0b','#fb923c','#f472b6','#38bdf8','#fbbf24','#e879f9'];

function slugify(n){return(n||'').toLowerCase().replace(/[^a-z0-9]/g,'-');}
function plink(name,ps){const s=ps||slugify(name);return `<a href="player.html?player=${s}" style="color:var(--sc);font-weight:700">${name}</a>`;}
function phaseClass(p){if(!p)return'pre-merge';const lp=p.toLowerCase();if(lp==='winner')return'winner';if(lp==='finalist')return'finalist';if(lp.includes('juror'))return'juror';return'pre-merge';}


function buildAwardHighlights(awards){
  if(!awards)return'';
  const PICKS=[
    {key:'fanFavorite',    label:'⭐ Fan Favorite'},
    {key:'bestStrategic',  label:'🧠 Best Strategic'},
    {key:'seasonMVP',      label:'👑 Season MVP'},
    {key:'bestPhysical',   label:'💪 Best Physical'},
    {key:'biggestVillain', label:'😈 Biggest Villain'},
    {key:'bestUnderdog',   label:'🔥 Best Underdog'},
    {key:'mostChaotic',    label:'🌀 Most Chaotic'},
    {key:'ironPerson',     label:'🛡️ Iron Person'},
  ];
  return PICKS.map(({key,label})=>{
    const a=awards[key];if(!a)return'';
    const name=a.name||'';if(!name)return'';
    const ps=a.playerSlug||slugify(name);
    const desc=a.description||a.desc||'';
    return`<div class="sr-hl-card">
      <div class="sr-hl-label">${label}</div>
      <div class="sr-hl-row">
        <div class="sr-hl-av">
          <img src="assets/avatars/${ps}.png" onload="this.style.display='block';this.parentElement.querySelector('span').style.display='none'" onerror="this.style.display='none'"/>
          <span>${name.substring(0,2).toUpperCase()}</span>
        </div>
        <div>
          <div class="sr-hl-name">${plink(name,ps)}</div>
          ${desc?`<div class="sr-hl-desc">${desc}</div>`:''}
        </div>
      </div>
    </div>`;
  }).filter(Boolean).join('');
}

function buildRecords(season){
  const st=season.statistics;if(!st)return'';
  const records=[];
  if(st.challengeWins?.mostTotal){const r=st.challengeWins.mostTotal;records.push({label:'Most Ch. Wins',val:r.wins,sub:r.name});}
  if(st.challengeWins?.mostImmunity){const r=st.challengeWins.mostImmunity;records.push({label:'Most Immunity',val:r.wins,sub:r.name});}
  if(st.challengeWins?.longestStreak){const r=st.challengeWins.longestStreak;records.push({label:'Longest Streak',val:r.wins,sub:r.note||r.name});}
  if(st.socialGame?.fewestVotes){const r=Array.isArray(st.socialGame.fewestVotes)?st.socialGame.fewestVotes[0]:st.socialGame.fewestVotes;records.push({label:'Fewest Votes',val:r.votes+' votes',sub:r.name+(r.note?' ('+r.note+')':'')});}
  if(st.socialGame?.mostVotes){const r=st.socialGame.mostVotes;records.push({label:'Most Votes Against',val:r.votes+' votes',sub:r.name});}
  if(st.socialGame?.mostJuryVotes){const r=st.socialGame.mostJuryVotes;records.push({label:'Most Jury Votes',val:r.votes,sub:r.name});}
  if(st.extreme?.closestFinale)records.push({label:'Finale Vote',val:st.extreme.closestFinale,sub:'Final Tribal'});
  if(st.strategic?.longestIdolHold){const r=st.strategic.longestIdolHold;records.push({label:'Longest Idol Hold',val:r.tribals+' tribals',sub:r.name});}
  if(st.extreme?.tieVotes)records.push({label:'Tie Votes',val:st.extreme.tieVotes,sub:'This season'});
  if(st.extreme?.rockDraws)records.push({label:'Rock Draws',val:st.extreme.rockDraws,sub:'Tiebreaker'});
  if(!records.length)return'';
  return`<div class="sr-sh sr-reveal"><h2>Season Records</h2></div>
  <div class="sr-records sr-reveal">${records.map(r=>`<div class="sr-record"><div class="sr-record-lbl">${r.label}</div><div class="sr-record-val">${r.val}</div><div class="sr-record-sub">${r.sub}</div></div>`).join('')}</div>`;
}

(async function(){
  try{
    const sn=parseInt(new URLSearchParams(window.location.search).get('season'),10);
    if(!sn){document.getElementById('season-content').innerHTML='<div class="hero"><h1>⚠️ No Season Specified</h1><p><a href="seasons.html">← Back to Seasons</a></p></div>';return;}

    const resp=await fetch('season'+sn+'-data.json');
    if(!resp.ok)throw new Error('Season '+sn+' data not found');
    const s=await resp.json();

    document.title='S'+sn+' — '+s.title;
    document.getElementById('footer-sub').textContent=s.title+' • '+s.castSize+' players';

    const sc=SEASON_COLORS[(sn-1)%SEASON_COLORS.length];
    document.documentElement.style.setProperty('--sc',sc);
    document.documentElement.style.setProperty('--sc-glow',sc+'44');

    // Hero
    const heroHTML=`<div class="sr-hero">
      <div class="sr-hero-photo" id="sr-hero-photo"></div>
      <div class="sr-hero-overlay"></div>
      <div class="sr-hero-body">
        <div class="sr-hero-snum">${s.emoji||'📺'} &nbsp; Season ${s.seasonNumber} <span style="opacity:.4">•</span> <span style="opacity:.6">${s.status||'Complete'}</span></div>
        <h1 class="sr-hero-title">${s.title}</h1>
        <p class="sr-hero-sub">${s.subtitle||''}</p>
        <div class="sr-hero-pills">
          <span class="sr-pill accent">🏆 ${s.winner.name}</span>
          <span class="sr-pill">👥 ${s.castSize} players</span>
          <span class="sr-pill">📺 ${s.episodeCount} episodes</span>
          ${s.winner.vote?`<span class="sr-pill">🗳️ ${s.winner.vote}</span>`:''}
        </div>
      </div>
    </div>`;

    // Winner
    const w=s.winner;
    const finalists=s.finalists||[];
    const maxVotes=Math.max(...finalists.map(f=>f.votes||f.juryVotes||0),1);
    const barColors=[sc,'#94a3b8','#64748b'];
    const finalistsHTML=finalists.length?`<div class="sr-finalists">
      <div class="sr-finalists-lbl">Final Jury Vote</div>
      ${[...finalists].sort((a,b)=>(a.placement||9)-(b.placement||9)).map((f,i)=>{
        const v=f.votes||f.juryVotes||0;
        return`<div class="sr-finalist-row">
          <div class="sr-finalist-name">${plink(f.name,f.playerSlug)}</div>
          <div class="sr-finalist-bar-wrap"><div class="sr-finalist-bar" data-pct="${Math.round(v/maxVotes*100)}" style="width:0%;background:${barColors[i]||'#64748b'}"></div></div>
          <div class="sr-finalist-votes" style="color:${barColors[i]||'#ccc'}">${v}</div>
        </div>`;
      }).join('')}
    </div>`:'';

    const winnerHTML=`<div class="sr-winner">
      <div class="sr-winner-lbl">👑 Season Winner</div>
      <div class="sr-winner-row">
        <div class="sr-winner-av">
          <img src="assets/avatars/${w.playerSlug}.png"
            style="display:none"
            onload="this.style.display='block';this.nextElementSibling.style.display='none'"
            onerror="this.style.display='none'"/>
          <span>👑</span>
        </div>
        <div class="sr-winner-info">
          <div class="sr-winner-name">${w.name}</div>
          <div class="sr-winner-vote">${w.vote||''}${w.runnerUp?' over '+w.runnerUp:''}</div>
          ${w.keyStats?`<div style="font-size:13px;color:rgba(255,255,255,.75)">${w.keyStats}</div>`:''}
        </div>
      </div>
      ${w.strategy?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;font-weight:700">Strategy</div><div style="font-size:13px;color:rgba(255,255,255,.8);line-height:1.6">${w.strategy}</div></div>`:''}
      ${w.legacy?`<div style="margin-top:10px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;font-weight:700">Legacy</div><div style="font-size:13px;color:rgba(255,255,255,.7);line-height:1.6">${w.legacy}</div></div>`:''}
      ${finalistsHTML}
    </div>`;

    // Placements
    const placementsHTML=(s.placements||[]).map((p,idx)=>{
      const isRich=p.story||p.keyMoments?.length||p.alliances?.length;
      const pnum=p.placement===1?'🥇':p.placement===2?'🥈':p.placement===3?'🥉':'#'+p.placement;
      let chips=[];
      if(p.challengeWins>0)chips.push(`<span class="sr-p-chip imm">⚡ ${p.challengeWins} Ch</span>`);
      if(p.immunityWins>0)chips.push(`<span class="sr-p-chip imm">🛡️ ${p.immunityWins} Imm</span>`);
      if(p.idolsFound>0)chips.push(`<span class="sr-p-chip idol">💎 ${p.idolsFound} Idol${p.idolsFound>1?'s':''}</span>`);
      if(p.votesReceived>0)chips.push(`<span class="sr-p-chip votes">🎯 ${p.votesReceived} VA</span>`);
      (p.alliances||[]).slice(0,3).forEach(a=>chips.push(`<span class="sr-p-chip ally">🤝 ${a}</span>`));
      (p.rivalries||[]).slice(0,2).forEach(r=>chips.push(`<span class="sr-p-chip rival">⚔️ ${r}</span>`));
      const moments=p.keyMoments||[];
      const hasBody=isRich||p.notes;
      const body=hasBody?`<div class="sr-placement-body">
        ${p.story?`<div class="sr-p-story">${p.story}</div>`:''}
        ${p.gameplayStyle?`<div style="font-size:11px;color:var(--sc);font-weight:700;margin-bottom:8px;font-style:italic">"${p.gameplayStyle}"</div>`:''}
        ${chips.length?`<div class="sr-p-chips">${chips.join('')}</div>`:''}
        ${moments.length?`<div class="sr-p-moments"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:6px">Key Moments</div>${moments.slice(0,5).map(m=>`<div class="sr-p-moment-item">→ ${m}</div>`).join('')}</div>`:''}
        ${!p.story&&p.notes?`<div style="font-size:13px;color:rgba(255,255,255,.75)">${p.notes}</div>`:''}
      </div>`:'';
      return`<div class="sr-placement-row" style="animation-delay:${idx*20}ms">
        <div class="sr-placement-header" ${hasBody?'onclick="srToggle(this)"':`onclick="window.location.href='player.html?player=${p.playerSlug}'"`}>
          <div class="sr-p-num">${pnum}</div>
          <div class="sr-p-av">
            <img src="assets/avatars/${p.playerSlug}.png" onload="this.style.display='block';this.parentElement.querySelector('.sr-av-fb').style.display='none'" onerror="this.style.display='none'"/>
            <span class="sr-av-fb">${(p.name||'').substring(0,2).toUpperCase()}</span>
          </div>
          <div class="sr-p-info">
            <a class="sr-p-name" href="player.html?player=${p.playerSlug}" onclick="event.stopPropagation()">${p.name}</a>
            ${p.tribe?`<div class="sr-p-meta">🏕️ ${p.tribe}</div>`:''}
          </div>
          <span class="sr-p-phase ${phaseClass(p.phase)}">${p.phase||'—'}</span>
          ${hasBody?'<span class="sr-p-expand">›</span>':''}
        </div>
        ${body}
      </div>`;
    }).join('');

    // Voting history
    // Voting history — use structured data if available, else build from placements
    let historyHTML = '';
    if (s.votingHistory && s.votingHistory.length) {
      historyHTML = s.votingHistory.map(ep => {
        const el = ep.eliminated; const es = slugify(el||'');
        const vc = {}; (ep.votes||[]).forEach(v => { vc[v.target] = (vc[v.target]||0)+1; });
        const vd = Object.entries(vc).sort((a,b)=>b[1]-a[1])
          .map(([n,c]) => `<span class="sr-ep-vote">${n} ×${c}</span>`).join('');
        return `<div class="sr-ep">
          <div class="sr-ep-num">Ep ${ep.episode}</div>
          ${el ? `<div class="sr-ep-boot">
            <div class="sr-ep-boot-av">
              <img src="assets/avatars/${es}.png" onload="this.style.display='block';this.nextElementSibling.style.display='none'" onerror="this.style.display='none'"/>
              <span>${el.substring(0,2).toUpperCase()}</span>
            </div>
            <div class="sr-ep-boot-name">☠️ ${el}</div>
          </div>` : `<div class="sr-ep-boot"><span class="sr-ep-novote">No elimination</span></div>`}
          <div class="sr-ep-votes">${vd || '<span class="sr-ep-novote">No vote detail</span>'}</div>
        </div>`;
      }).join('');
    } else if (s.placements && s.placements.length) {
      // Build elimination order from placements (reverse order = elimination order)
      const ordered = [...s.placements].sort((a,b) => b.placement - a.placement);
      historyHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:16px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.07)">
        ℹ️ Full episode vote breakdown not available for this season — showing elimination order from placements.
      </div>`;
      historyHTML += ordered.map((p, idx) => {
        const epNum = s.episodeCount - idx;
        const voteMatch = (p.notes || '').match(/^([\d–\-★*]+(?:\s*[→→]\s*[\d–\-]+)?)\s*vote/i);
        const voteStr = voteMatch ? voteMatch[1].trim() : '';
        return `<div class="sr-ep">
          <div class="sr-ep-num">${p.placement === 1 ? 'WIN' : p.placement <= 3 ? 'FTC' : `Ep ~${Math.max(1,epNum)}`}</div>
          <div class="sr-ep-boot">
            <div class="sr-ep-boot-av" style="${p.placement <= 3 ? 'border-color:rgba(245,158,11,.5)' : ''}">
              <img src="assets/avatars/${p.playerSlug}.png" onload="this.style.display='block';this.nextElementSibling.style.display='none'" onerror="this.style.display='none'"/>
              <span>${(p.name||'').substring(0,2).toUpperCase()}</span>
            </div>
            <div class="sr-ep-boot-name" style="${p.placement <= 3 ? 'color:#f59e0b' : ''}">${p.placement===1?'🏆':p.placement<=3?'🥈':'☠️'} ${p.name}</div>
          </div>
          <div class="sr-ep-votes">
            ${voteStr ? `<span class="sr-ep-vote">${voteStr}</span>` : ''}
            <span class="sr-ep-vote" style="color:var(--muted)">${p.phase}</span>
          </div>
        </div>`;
      }).join('');
    }

    const moments=s.legacy?.memorableMoments||s.highlights||[];
    const narrative=s.legacy?.summary||s.seasonNarrative||'';

    document.getElementById('season-content').innerHTML=`
      ${heroHTML}
      <div class="sr-tabs">
        <button class="sr-tab on" onclick="srTab('overview',this)">📊 Overview</button>
        <button class="sr-tab" onclick="srTab('placements',this)">🏆 Placements</button>
        <button class="sr-tab" onclick="srTab('history',this)">📜 Vote History</button>
      </div>

      <div id="sr-panel-overview" class="sr-panel on">
        ${winnerHTML}
        ${narrative?`<div class="sr-sh sr-reveal"><h2>Season Narrative</h2></div><div class="sr-narrative sr-reveal">${narrative}</div>`:''}

        <!-- Top Finishers strip -->
        ${(s.placements||[]).length?`<div class="sr-sh sr-reveal"><h2>Top Finishers</h2><span class="sr-sh-pill">${(s.placements||[]).length} players</span></div>
        <div class="sr-top-strip sr-reveal">
          ${(s.placements||[]).slice(0,8).map((p,i)=>{
            const pnum=p.placement===1?'🥇':p.placement===2?'🥈':p.placement===3?'🥉':'#'+p.placement;
            const pc=phaseClass(p.phase);
            return`<a class="sr-top-card" href="player.html?player=${p.playerSlug}">
              <div class="sr-top-num">${pnum}</div>
              <div class="sr-top-av">
                <img src="assets/avatars/${p.playerSlug}.png" onload="this.style.display='block';this.parentElement.querySelector('span').style.display='none'" onerror="this.style.display='none'"/>
                <span>${(p.name||'').substring(0,2).toUpperCase()}</span>
              </div>
              <div class="sr-top-name">${p.name}</div>
              <div class="sr-top-phase ${pc}">${p.phase||'—'}</div>
            </a>`;
          }).join('')}
        </div>
        <div style="margin-bottom:20px">
          <button class="sr-tab" style="font-size:12px;padding:6px 14px" onclick="srTab('placements',document.querySelectorAll('.sr-tab')[1])">View all ${(s.placements||[]).length} placements →</button>
        </div>`:''}

        <!-- Award highlights -->
        ${s.awards?`<div class="sr-sh sr-reveal"><h2>Season Highlights</h2></div>
        <div class="sr-highlights-grid sr-reveal">
          ${buildAwardHighlights(s.awards)}
        </div>`:''}

        ${moments.length?`<div class="sr-sh sr-reveal"><h2>Memorable Moments</h2><span class="sr-sh-pill">${moments.length}</span></div>
        <div class="sr-moments">${moments.map((m,i)=>`<div class="sr-moment" style="animation-delay:${i*60}ms"><div class="sr-moment-num">${i+1}</div><div>${m}</div></div>`).join('')}</div>`:''}

        ${buildRecords(s)}

        <!-- Nav footer -->
        <div class="sr-nav-footer">
          <a href="seasons.html" class="sr-nav-btn">← All Seasons</a>
          <a href="season-awards_ref.html?season=${sn}" class="sr-nav-btn accent">🏅 Season Awards →</a>
          <a href="devotees.html" class="sr-nav-btn">👥 All Players →</a>
        </div>
      </div>

      <div id="sr-panel-placements" class="sr-panel">
        <div class="sr-sh"><h2>Placements</h2><span class="sr-sh-pill">${(s.placements||[]).length}</span></div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Click a row to expand details ${s.placements?.[0]?.story?'• Full player stories available':''} • Click name to open profile</div>
        ${placementsHTML||'<p style="color:var(--muted)">No placement data.</p>'}
      </div>

      <div id="sr-panel-history" class="sr-panel">
        <div class="sr-sh"><h2>Vote History</h2>${s.votingHistory?`<span class="sr-sh-pill">${s.votingHistory.length} episodes</span>`:''}</div>
        <div class="sr-timeline">${historyHTML}</div>
      </div>
    `;

    // Post-render: cast photo
    const photoEl=document.getElementById('sr-hero-photo');
    const probe=new Image();
    probe.onload=()=>{if(photoEl){photoEl.style.backgroundImage=`url('assets/cast/s${sn}-cast.png')`;setTimeout(()=>{photoEl.style.opacity='.2';},50);}};
    probe.src=`assets/cast/s${sn}-cast.png`;

    // Finalist bars
    setTimeout(()=>{document.querySelectorAll('.sr-finalist-bar[data-pct]').forEach(el=>{el.style.width=el.dataset.pct+'%';});},120);

    // Scroll reveal
    const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});},{threshold:0.08});
    document.querySelectorAll('.sr-reveal').forEach(el=>io.observe(el));

  }catch(err){
    console.error(err);
    document.getElementById('season-content').innerHTML=`<div class="hero"><h1>⚠️ Season Not Found</h1><p>${err.message}</p><p><a href="seasons.html">← Back to Seasons</a></p></div>`;
  }
})();

function srTab(id,btn){
  document.querySelectorAll('.sr-panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.sr-tab').forEach(t=>t.classList.remove('on'));
  const panel=document.getElementById('sr-panel-'+id);
  if(panel)panel.classList.add('on');
  if(btn)btn.classList.add('on');
  setTimeout(()=>{
    const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});},{threshold:0.08});
    document.querySelectorAll('#sr-panel-'+id+' .sr-reveal').forEach(el=>io.observe(el));
  },50);
}

function srToggle(header){
  const row=header.closest('.sr-placement-row');
  if(row)row.classList.toggle('open');
}
</script>
</body>
</html>
