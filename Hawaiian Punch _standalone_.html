"#3a1f0e\"><\u002Fcircle>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- TITLE TEXT -->\n    <div class=\"hp-title-text\">\n      <div class=\"hp-title-kicker\">★ FINALE OF THE SEASON ★<\u002Fdiv>\n      <div class=\"hp-title-main\">HAWAIIAN<br>PUNCH<\u002Fdiv>\n      <div class=\"hp-title-sub\">The Million-Dollar Eruption<\u002Fdiv>\n      <div class=\"hp-title-ep\"><span class=\"dot\"><\u002Fspan> EP 26 · SEASON 3 · BIG ISLAND · NIGHT <span class=\"dot\"><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- vine bottom -->\n    <div class=\"hp-vine-bottom\">\n      <span class=\"hp-vine-leaf\"><\u002Fspan><span class=\"hp-vine-leaf\"><\u002Fspan><span class=\"hp-vine-leaf\"><\u002Fspan>\n      <span class=\"hp-vine-leaf\"><\u002Fspan><span class=\"hp-vine-leaf\"><\u002Fspan><span class=\"hp-vine-leaf\"><\u002Fspan>\n      <span class=\"hp-vine-leaf\"><\u002Fspan><span class=\"hp-vine-leaf\"><\u002Fspan><span class=\"hp-vine-leaf\"><\u002Fspan>\n      <span class=\"hp-vine-leaf\"><\u002Fspan><span class=\"hp-vine-leaf\"><\u002Fspan><span class=\"hp-vine-leaf\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- lava drips -->\n    <div class=\"hp-drip d1\"><\u002Fdiv>\n    <div class=\"hp-drip d2\"><\u002Fdiv>\n    <div class=\"hp-drip d3\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FINALIST CARDS -->\n  <div class=\"hp-section-head\">\n    <div class=\"hp-section-num\">F3<\u002Fdiv>\n    <div class=\"hp-section-title\">The Final Three<\u002Fdiv>\n    <div class=\"hp-section-meta\">3 enter · 1 walks away with $1M<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-finalists\">\n    <div class=\"hp-finalist\" data-fac=\"villain\">\n      <div class=\"hp-finalist-rank\">SEED 01<\u002Fdiv>\n      <div class=\"hp-av xl\" data-fac=\"villain\">AJ<\u002Fdiv>\n      <div class=\"hp-finalist-name\">Alejandro<\u002Fdiv>\n      <div class=\"hp-finalist-archetype\">The Charmer · Manipulator<\u002Fdiv>\n      <div class=\"hp-finalist-meter\">\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Charm<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill v\" style=\"width:95%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Strength<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill v\" style=\"width:82%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Strategy<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill v\" style=\"width:90%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Likeable<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill v\" style=\"width:18%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hp-finalist\" data-fac=\"villain\">\n      <div class=\"hp-finalist-rank\">SEED 02<\u002Fdiv>\n      <div class=\"hp-av xl\" data-fac=\"villain\" style=\"background:linear-gradient(135deg,#1a1a1a,#3a1a2a);\">HE<\u002Fdiv>\n      <div class=\"hp-finalist-name\">Heather<\u002Fdiv>\n      <div class=\"hp-finalist-archetype\">The Schemer · Reformed Villain<\u002Fdiv>\n      <div class=\"hp-finalist-meter\">\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Charm<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill v\" style=\"width:42%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Strength<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill v\" style=\"width:60%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Strategy<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill v\" style=\"width:96%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Likeable<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill v\" style=\"width:30%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hp-finalist\" data-fac=\"hero\">\n      <div class=\"hp-finalist-rank\">SEED 03<\u002Fdiv>\n      <div class=\"hp-av xl\" data-fac=\"hero\">CO<\u002Fdiv>\n      <div class=\"hp-finalist-name\">Cody<\u002Fdiv>\n      <div class=\"hp-finalist-archetype\">The Underdog · Fan Favorite<\u002Fdiv>\n      <div class=\"hp-finalist-meter\">\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Charm<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill h\" style=\"width:55%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Strength<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill h\" style=\"width:32%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Strategy<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill h\" style=\"width:58%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-stat-row\"><span class=\"hp-stat-label\">Likeable<\u002Fspan><div class=\"hp-stat-bar\"><div class=\"hp-stat-fill h\" style=\"width:92%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WHAT'S AT STAKE -->\n  <div class=\"hp-card\" data-fac=\"host\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-card-title\">The Final Challenge<\u002Fspan><span class=\"hp-badge hp-b-volcano\">VOLCANO<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">After a season spanning three continents, eleven flights, and one talking sock-puppet, the road ends here — on the slopes of an <em>active Hawaiian volcano<\u002Fem>. The Final Three must first settle a tie. The winner of that joust faces the front-runner in a sacrificial-dummy race up the mountain. Whoever throws their dummy into the crater first takes home the <strong>million dollars<\u002Fstrong>. Lava, sharks, lawyers, ex-contestants, and at least one feral former champion stand in the way.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-host-line\">\"Three of you walked off that plane. Only one is leaving with a check. Welcome to <strong>Hawaiian Punch<\u002Fstrong>.\" — your host, smiling too wide<\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- ═════════════ PHASE 01 — TIEBREAKER ═════════════ -->\n<div class=\"hp-phase\" id=\"phase-tiebreak\">\n  <div class=\"hp-section-head\">\n    <div class=\"hp-section-num\">01<\u002Fdiv>\n    <div class=\"hp-section-title\">The Tiebreaker<\u002Fdiv>\n    <div class=\"hp-section-meta\">Resolve the deadlock · 1 of 2 advances<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-host-line\">\"Heather sails through to the Final Two. But behind her — a TIE. Cody and Alejandro, you'll fight for the second spot.\"<\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"host\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-card-title\">The Booth of Pain<\u002Fspan><span class=\"hp-badge hp-b-tie\">CHALLENGE PICK<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Heather is asked to pick the tiebreaker by entering a challenge booth and grabbing a ball — each ball is labeled with a different event. The booth is allegedly stocked with ping-pong balls. <em>It is not.<\u002Fem> The host has swapped them for <strong>golf balls.<\u002Fstrong><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"villain\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"villain\" style=\"background:linear-gradient(135deg,#1a1a1a,#3a1a2a);\">HE<\u002Fspan><span class=\"hp-card-title\">Heather enters the booth<\u002Fspan><span class=\"hp-badge hp-b-tie\">PELTED<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Golf balls hammer Heather from every angle. One ball escapes the booth, shatters the glass, and clocks <strong>Tyler<\u002Fstrong> in the forehead — he goes down on impact and stays there. Another ball lodges in Heather's <em>throat<\u002Fem>. She hacks it up. The host forces <strong>Geoff<\u002Fstrong> to retrieve the saliva-coated ball and read the result aloud.<\u002Fdiv>\n    <div style=\"margin-top:10px;display:flex;gap:10px;font-size:11px;align-items:center;\">\n      <span style=\"color:rgba(243,231,201,.5);letter-spacing:1px;text-transform:uppercase;\">Tyler:<\u002Fspan>\n      <span style=\"color:#ff7080;font-weight:700;\">KNOCKED COLD<\u002Fspan>\n      <span style=\"color:rgba(243,231,201,.3);\">|<\u002Fspan>\n      <span style=\"color:rgba(243,231,201,.5);letter-spacing:1px;text-transform:uppercase;\">Challenge drawn:<\u002Fspan>\n      <span style=\"color:var(--hp-gold-hot);font-weight:700;\">TRADITIONAL FIRE DANCE OF DEATH<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-confess\" data-fac=\"villain\">\n    <div class=\"hp-confess-av\"><div class=\"hp-av\" data-fac=\"villain\">AJ<\u002Fdiv><\u002Fdiv>\n    <div class=\"hp-confess-name\">Alejandro <span class=\"hp-confess-tag\">CONFESSIONAL<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-confess-text\">I only let Heather beat me to give her a false sense of confidence. But how will I explain to those at home that I tied with that <em>pathetic<\u002Fem> Cody? Oh, my brother José will be compiling his insults already.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-confess\" data-fac=\"hero\">\n    <div class=\"hp-confess-av\"><div class=\"hp-av\" data-fac=\"hero\">CO<\u002Fdiv><\u002Fdiv>\n    <div class=\"hp-confess-name\">Cody <span class=\"hp-confess-tag\" style=\"background:rgba(26,167,167,.2);border-color:rgba(26,167,167,.4);color:#3ad9d9;\">CONFESSIONAL<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-confess-text\">I made it all the way to the final two-ish! Just one massive thing in the way: Alejandro. Against me. Never thought I'd say it, but… I wish Sierra was back in here with me.<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- ═════════════ PHASE 02 — JOUST ═════════════ -->\n<div class=\"hp-phase\" id=\"phase-joust\">\n  <div class=\"hp-section-head\">\n    <div class=\"hp-section-num\">02<\u002Fdiv>\n    <div class=\"hp-section-title\">Coconut-Bra Joust<\u002Fdiv>\n    <div class=\"hp-section-meta\">Defeat your rival · Save the hostage<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-host-line\">\"Grass skirts. Coconut bras. Jousting sticks. Knock the other one in the drink, save Heather from the pole. <em>Try not to die.<\u002Fem>\"<\u002Fdiv>\n\n  <!-- THE BIG MATCHUP -->\n  <div class=\"hp-matchup\">\n    <div class=\"hp-fighter\">\n      <div class=\"hp-av xl\" data-fac=\"villain\">AJ<\u002Fdiv>\n      <div class=\"hp-fighter-name\">Alejandro<\u002Fdiv>\n      <div class=\"hp-fighter-tag\" style=\"color:#ff8080;\">THE FAVORITE<\u002Fdiv>\n      <div class=\"hp-bar\" style=\"margin-top:8px;\"><div class=\"hp-bar-track\"><div class=\"hp-bar-fill full\" style=\"width:100%\"><\u002Fdiv><\u002Fdiv><span class=\"hp-bar-val\">100%<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hp-vs-big\">VS<\u002Fdiv>\n    <div class=\"hp-fighter\">\n      <div class=\"hp-av xl\" data-fac=\"hero\">CO<\u002Fdiv>\n      <div class=\"hp-fighter-name\">Cody<\u002Fdiv>\n      <div class=\"hp-fighter-tag\" style=\"color:#3ad9d9;\">THE UNDERDOG<\u002Fdiv>\n      <div class=\"hp-bar\" style=\"margin-top:8px;\"><div class=\"hp-bar-track\"><div class=\"hp-bar-fill full\" style=\"width:40%\"><\u002Fdiv><\u002Fdiv><span class=\"hp-bar-val\">40%<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"villain\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"villain\">AJ<\u002Fspan><span class=\"hp-card-title\">Round 1 · Alejandro dominates<\u002Fspan><span class=\"hp-badge hp-b-joust\">+30 DMG<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Alejandro presses forward immediately. Three clean strikes land before Cody can even raise his stick. The plank wobbles. The crowd splits — <strong>Sierra<\u002Fstrong> and <strong>Harold<\u002Fstrong> scream for Cody, <strong>Courtney<\u002Fstrong> cheers for Alejandro.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"hero\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"hero\">CO<\u002Fspan><span class=\"hp-card-title\">Round 2 · Cody rallies<\u002Fspan><span class=\"hp-badge hp-b-joust\">COMEBACK<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Cody plants his feet and starts trading blows. The peanut gallery loses its mind. He's actually doing it — until <strong>Heather<\u002Fstrong>, tied to the burning pole, screams \"<em>SIERRA'S IN DANGER!<\u002Fem>\" Cody whips his head around. <strong>The trap works.<\u002Fstrong><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"villain\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"villain\">AJ<\u002Fspan><span class=\"hp-card-title\">Round 3 · The killing blow<\u002Fspan><span class=\"hp-badge hp-b-ko\">OVERKILL<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Alejandro disarms Cody with a clean lateral sweep — match over. He doesn't need to do anything else. <em>He does anyway.<\u002Fem> A second swing sends Cody arcing off the plank into <strong>shark-infested water.<\u002Fstrong> The crowd's cheers cut off mid-syllable. A fin appears. A fin disappears. So does Cody.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- OUTCOME -->\n  <div class=\"hp-outcome ko\">\n    <div class=\"hp-outcome-tag\">★ JOUST RESULT ★<\u002Fdiv>\n    <div class=\"hp-outcome-title\">CODY ELIMINATED<\u002Fdiv>\n    <div class=\"hp-outcome-sub\">Alejandro advances · Heather untied · Public sentiment: FURIOUS<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"wild\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"wild\">SI<\u002Fspan><span class=\"hp-card-title\">Sierra's Rescue Run<\u002Fspan><span class=\"hp-badge hp-b-twist\">HEROIC<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\"><strong>Sierra<\u002Fstrong>, watching from the peanut gallery in a wheelchair, doesn't hesitate. She rolls full-speed into the surf and starts beating the shark with her bare hands until it spits Cody out — soggy but alive. The crowd erupts. The host looks vaguely disappointed.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-confess\" data-fac=\"hero\">\n    <div class=\"hp-confess-av\"><div class=\"hp-av\" data-fac=\"hero\" style=\"opacity:.6;filter:grayscale(.4);\">CO<\u002Fdiv><\u002Fdiv>\n    <div class=\"hp-confess-name\">Cody · post-shark <span class=\"hp-confess-tag\" style=\"background:rgba(26,167,167,.2);border-color:rgba(26,167,167,.4);color:#3ad9d9;\">CONFESSIONAL<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-confess-text\">Nobody makes shark bait out of me and gets away with it. Anyway — Heather was pretty good to me overall. Hey, I bet I'm the first person to ever say that.<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- ═════════════ PHASE 03 — VOLCANO RACE ═════════════ -->\n<div class=\"hp-phase\" id=\"phase-volcano\">\n  <div class=\"hp-section-head\">\n    <div class=\"hp-section-num\">03<\u002Fdiv>\n    <div class=\"hp-section-title\">The Sacrificial Dummy Race<\u002Fdiv>\n    <div class=\"hp-section-meta\">Build · Climb · Throw · Win the million<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-host-line\">\"Build a wooden-and-pineapple effigy of your opponent. First one to chuck theirs in the lava wins ONE MILLION DOLLARS. <em>Lawyers say no real humans this time. Sad.<\u002Fem>\"<\u002Fdiv>\n\n  <!-- DUMMY BUILDING -->\n  <div class=\"hp-card\" data-fac=\"villain\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"villain\">AJ<\u002Fspan><span class=\"hp-card-title\">Alejandro's build team<\u002Fspan><span class=\"hp-badge hp-b-volcano\">+20s LEAD<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Alejandro picks <strong>Courtney<\u002Fstrong> and <strong>Tyler<\u002Fstrong>. Tyler is still concussed from the golf ball, so <strong>Lindsay<\u002Fstrong> subs in. They finish the dummy first by a healthy margin. <strong>Reward:<\u002Fstrong> a 20-second head start and the <em>wheelbarrow<\u002Fem> Courtney won three episodes ago.<\u002Fdiv>\n    <div style=\"display:flex;gap:6px;margin-top:10px;\">\n      <div class=\"hp-av sm\" data-fac=\"villain\">CT<\u002Fdiv>\n      <div class=\"hp-av sm\" data-fac=\"villain\">LI<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"villain\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"villain\" style=\"background:linear-gradient(135deg,#1a1a1a,#3a1a2a);\">HE<\u002Fspan><span class=\"hp-card-title\">Heather's build team<\u002Fspan><span class=\"hp-badge hp-b-volcano\">VOLUNTEERS<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Heather asks the gallery — silence. Then <strong>Cody<\u002Fstrong> (vengeance) and <strong>Harold<\u002Fstrong> (a Cody fan, by extension) step forward. They finish second. Heather gets <em>nothing<\u002Fem>. The host gives her a <strong>baby carriage<\u002Fstrong> (Cody's reward from earlier). It collapses on contact. Heather hoists the dummy onto her back and starts climbing.<\u002Fdiv>\n    <div style=\"display:flex;gap:6px;margin-top:10px;\">\n      <div class=\"hp-av sm\" data-fac=\"hero\">CO<\u002Fdiv>\n      <div class=\"hp-av sm\" data-fac=\"hero\">HA<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- DIALOGUE EXCHANGE -->\n  <div class=\"hp-dialogue\">\n    <div class=\"hp-dialog-side\">\n      <div style=\"display:flex;gap:8px;align-items:center;\"><div class=\"hp-av sm\" data-fac=\"villain\">AJ<\u002Fdiv><span class=\"hp-dialog-name\">Alejandro<\u002Fspan><\u002Fdiv>\n      <div class=\"hp-dialog-quote\">\"You should slow down, querida. The view from second place is so much prettier.\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hp-vs\">⚔<\u002Fdiv>\n    <div class=\"hp-dialog-side right\">\n      <div style=\"display:flex;gap:8px;align-items:center;flex-direction:row-reverse;\"><div class=\"hp-av sm\" data-fac=\"villain\" style=\"background:linear-gradient(135deg,#1a1a1a,#3a1a2a);\">HE<\u002Fdiv><span class=\"hp-dialog-name\">Heather<\u002Fspan><\u002Fdiv>\n      <div class=\"hp-dialog-quote\">\"<strong>NO WAY, JOSÉ!<\u002Fstrong>\"<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"wild\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-card-title\">★ Secret Weakness Unlocked ★<\u002Fspan><span class=\"hp-badge hp-b-twist\">PSYCH DMG<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">\"José\" is the name of Alejandro's older brother — the bully who's called him <em>\"Al\"<\u002Fem> since childhood. Alejandro freezes mid-sentence. Cody, eavesdropping, immediately starts taunting \"<strong>Al! Al! AL!<\u002Fstrong>\" Alejandro's entire face turns volcanic. Speed increases <em>but<\u002Fem> all charm-based abilities are now disabled for the rest of the episode.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- THE LAVA RIVER -->\n  <div class=\"hp-host-line\">\"AND HERE comes the LAVA RIVER. Stepping stones across, helpers can drop traps on the other team. <em>Try not to fall in.<\u002Fem>\"<\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"hero\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"hero\">CO<\u002Fspan><span class=\"hp-card-title\">Cody distracts Lindsay<\u002Fspan><span class=\"hp-badge hp-b-twist\">SOCIAL ENG.<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Cody shouts that there's a <em>sale on mascara<\u002Fem>. Lindsay sprints into the jungle without looking back. Courtney's exasperated scream echoes through the canyon.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"villain\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"villain\">CT<\u002Fspan><span class=\"hp-card-title\">Courtney goes scorched-earth<\u002Fspan><span class=\"hp-badge hp-b-ko\">GROIN KICK<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\"><strong>Courtney<\u002Fstrong> drops <strong>Harold<\u002Fstrong> with a precision groin-kick that will be replayed in slow-mo every commercial break. She then cuts a rope rigged with a <em>grand piano<\u002Fem>. The host clarifies, in his most chipper tone, that traps do not necessarily land on the contestant they were rigged for.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"hero\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"hero\">CO<\u002Fspan><span class=\"hp-card-title\">Cody's trap backfires<\u002Fspan><span class=\"hp-badge hp-b-twist\">FRIENDLY FIRE<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Cody breaks free from Courtney, sprints to the ropes, and cuts one — aiming for Alejandro. A <em>cage<\u002Fem> drops. <strong>On Heather.<\u002Fstrong> Alejandro takes the lead.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"hero\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"hero\">HA<\u002Fspan><span class=\"hp-av sm\" data-fac=\"hero\">CO<\u002Fspan><span class=\"hp-card-title\">Pep talk from the dirt<\u002Fspan><span class=\"hp-badge hp-b-twist\">REDEMPTION<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Harold, still curled in the fetal position, manages to gasp: \"<em>Heather… you're the good guy this time.<\u002Fem>\" Cody backs him up. For the first time in three seasons, Heather is the <strong>hero<\u002Fstrong>. She kicks the cage apart and starts climbing.<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- ═════════════ PHASE 04 — SUMMIT ═════════════ -->\n<div class=\"hp-phase\" id=\"phase-summit\">\n  <div class=\"hp-section-head\">\n    <div class=\"hp-section-num\">04<\u002Fdiv>\n    <div class=\"hp-section-title\">The Summit Confession<\u002Fdiv>\n    <div class=\"hp-section-meta\">Romance · Betrayal · Knee to the groin<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-host-line\">\"Alejandro reaches the crater first. He's about to throw the dummy in… when Heather <em>arrives, crying.<\u002Fem>\"<\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"villain\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"villain\">AJ<\u002Fspan><span class=\"hp-card-title\">Crater's edge · the offer<\u002Fspan><span class=\"hp-badge hp-b-twist\">CONFESSION<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Alejandro pauses — dummy raised over his head. Heather sobs that she worked so hard, that he's going to win and <em>leave<\u002Fem> her. Alejandro lowers the dummy. \"Are you more worried about losing the million… or losing me?\" Heather denies it. Alejandro responds with a secret of his own: <strong>\"You've stolen my heart.\"<\u002Fstrong><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-confess\" data-fac=\"villain\">\n    <div class=\"hp-confess-av\"><div class=\"hp-av\" data-fac=\"villain\" style=\"background:linear-gradient(135deg,#1a1a1a,#3a1a2a);\">HE<\u002Fdiv><\u002Fdiv>\n    <div class=\"hp-confess-name\">Heather <span class=\"hp-confess-tag\">CONFESSIONAL · MID-CRATER<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-confess-text\">Believe it or not… I am <em>actually<\u002Fem> hoping Alejandro wins the tiebreaker. I might be able to beat him in a vote.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"villain\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"villain\" style=\"background:linear-gradient(135deg,#1a1a1a,#3a1a2a);\">HE<\u002Fspan><span class=\"hp-card-title\">Heather… returns the feeling<\u002Fspan><span class=\"hp-badge hp-b-twist\">MUTUAL?<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">Heather, against every survival instinct she has, admits she <em>likes him too.<\u002Fem> The gallery erupts. <strong>Noah, Gwen, Geoff, Izzy<\u002Fstrong> and <strong>Blaineley<\u002Fstrong> all roll their eyes — they'd called it three episodes ago. Alejandro leans in. The kiss is <em>extremely awkward.<\u002Fem><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-outcome twist\">\n    <div class=\"hp-outcome-tag\">★ MID-KISS BETRAYAL ★<\u002Fdiv>\n    <div class=\"hp-outcome-title\">KNEE. GROIN. ICE.<\u002Fdiv>\n    <div class=\"hp-outcome-sub\">Heather knees Alejandro in the groin · launches him off the volcano on a melting ice cube<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- ═════════════ PHASE 05 — ENDINGS ═════════════ -->\n<div class=\"hp-phase\" id=\"phase-endings\">\n  <div class=\"hp-section-head\">\n    <div class=\"hp-section-num\">05<\u002Fdiv>\n    <div class=\"hp-section-title\">Two Endings · One Disaster<\u002Fdiv>\n    <div class=\"hp-section-meta\">Pick a winner · Nobody keeps the money<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ENDING TABS -->\n  <div style=\"display:flex;gap:8px;margin-bottom:14px;\">\n    <button class=\"hp-btn\" onclick=\"hpEnding('h',this)\" id=\"end-h-btn\" style=\"flex:1;background:linear-gradient(180deg,#1a1a1a,#3a1a2a);border-color:#888;\">HEATHER WINS<\u002Fbutton>\n    <button class=\"hp-btn primary\" onclick=\"hpEnding('a',this)\" id=\"end-a-btn\" style=\"flex:1;\">ALEJANDRO WINS<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- HEATHER ENDING -->\n  <div id=\"ending-h\" style=\"display:none;\">\n    <div class=\"hp-outcome win\">\n      <div class=\"hp-outcome-tag\">★ ENDING A · CANON ★<\u002Fdiv>\n      <div class=\"hp-outcome-title\">HEATHER WINS<\u002Fdiv>\n      <div class=\"hp-outcome-sub\">Smirks · throws dummy · jumps in triumph<\u002Fdiv>\n      <div class=\"hp-money\">\n        <div class=\"hp-money-stack\">$1,000,000<\u002Fdiv>\n        <div class=\"hp-money-sub\">briefly the property of one heather<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hp-card\" data-fac=\"host\">\n      <div class=\"hp-card-hdr\"><span class=\"hp-card-title\">The Pineapple Problem<\u002Fspan><span class=\"hp-badge hp-b-twist\">RULES VIOLATION<\u002Fspan><\u002Fdiv>\n      <div class=\"hp-card-body\">Local Hawaiians arrive. \"<em>Did anyone throw pineapples into the volcano?<\u002Fem>\" The host quietly admits he hid every <strong>\"DO NOT THROW PINEAPPLES INTO THE VOLCANO\"<\u002Fstrong> sign behind members of the peanut gallery during filming. The mountain begins to rumble.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ALEJANDRO ENDING -->\n  <div id=\"ending-a\">\n    <div class=\"hp-outcome win\" style=\"border-color:var(--hp-magma);background:radial-gradient(ellipse at center,rgba(196,24,47,.2),rgba(0,0,0,.5));\">\n      <div class=\"hp-outcome-tag\" style=\"color:#ff8080;\">★ ENDING B · ALTERNATE ★<\u002Fdiv>\n      <div class=\"hp-outcome-title\" style=\"color:#ff8080;\">ALEJANDRO WINS<\u002Fdiv>\n      <div class=\"hp-outcome-sub\">Heather throws her dummy a second too late · Alejandro celebrates atop the crater<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hp-card\" data-fac=\"villain\">\n      <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"villain\">AJ<\u002Fspan><span class=\"hp-card-title\">Brief glory<\u002Fspan><span class=\"hp-badge hp-b-twist\">CUT SHORT<\u002Fspan><\u002Fdiv>\n      <div class=\"hp-card-body\">Alejandro's victory monologue is interrupted by a familiar, feral howl…<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- EZEKIEL INTRUSION — happens in both endings -->\n  <div class=\"hp-host-line\">\"Oh. Oh no. Was that… <em>Ezekiel?<\u002Fem>\"<\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"wild\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-av sm\" data-fac=\"dark\">EZ<\u002Fspan><span class=\"hp-card-title\">FERAL EZEKIEL APPEARS<\u002Fspan><span class=\"hp-badge hp-b-twist\">GREMLIN<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">A pale, gollum-shaped figure scrambles out of a crack in the rock. <strong>Ezekiel.<\u002Fstrong> Last seen falling out of a plane in season two. He latches onto the prize case, wrestles it from the winner's hands, and — in his panic — tumbles backward into the <em>lava.<\u002Fem> Case included.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-outcome ko\">\n    <div class=\"hp-outcome-tag\">★ ERUPTION ★<\u002Fdiv>\n    <div class=\"hp-outcome-title\">VOLCANO BLOWS<\u002Fdiv>\n    <div class=\"hp-outcome-sub\">Money lost · Ezekiel ejected as a projectile · Boat sunk · Static<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-card\" data-fac=\"host\">\n    <div class=\"hp-card-hdr\"><span class=\"hp-card-title\">Final shot<\u002Fspan><span class=\"hp-badge hp-b-end\">FADE TO STATIC<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-card-body\">The contestants swim for open water. Flaming rocks pepper the sea. Heather treads water, mid-sentence — \"<em>So do I still get my money or—<\u002Fem>\" — when a boulder the size of a smart car hurtles in from frame-right. She screams. The screen <strong>cuts to static.<\u002Fstrong><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-host-line\" style=\"border-color:var(--hp-gold);color:var(--hp-gold-hot);\">\"This has been HAWAIIAN PUNCH. Tune in next season — Total Drama: Revenge of the Island. Same drama. New idiots. <em>Bye!<\u002Fem>\"<\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fdiv><!-- /main -->\n\n<!-- ═════════════ SIDEBAR ═════════════ -->\n<aside class=\"hp-sidebar\">\n\n  <div class=\"hp-side-box\">\n    <div class=\"hp-side-title\">Final Three<\u002Fdiv>\n    <div class=\"hp-side-row\"><div class=\"hp-av sm\" data-fac=\"villain\">AJ<\u002Fdiv><span class=\"hp-side-name\">Alejandro<\u002Fspan><span class=\"hp-side-tag\" style=\"background:rgba(196,24,47,.2);color:#ff7080;border:1px solid rgba(196,24,47,.4);\">F2<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-side-row\"><div class=\"hp-av sm\" data-fac=\"villain\" style=\"background:linear-gradient(135deg,#1a1a1a,#3a1a2a);\">HE<\u002Fdiv><span class=\"hp-side-name\">Heather<\u002Fspan><span class=\"hp-side-tag\" style=\"background:rgba(196,24,47,.2);color:#ff7080;border:1px solid rgba(196,24,47,.4);\">F2<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-side-row\"><div class=\"hp-av sm ko\" data-fac=\"hero\">CO<\u002Fdiv><span class=\"hp-side-name\" style=\"opacity:.6;\">Cody<\u002Fspan><span class=\"hp-side-tag\" style=\"background:rgba(26,167,167,.15);color:#3ad9d9;border:1px solid rgba(26,167,167,.3);\">3rd<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-side-box\">\n    <div class=\"hp-side-title\">Peanut Gallery<\u002Fdiv>\n    <div class=\"hp-gallery\">\n      <div class=\"hp-av\" data-fac=\"hero\">SI<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"hero\">HA<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"villain\">CT<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"wild\">LI<\u002Fdiv>\n      <div class=\"hp-av ko\" data-fac=\"hero\">TY<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"hero\">DJ<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"hero\">GW<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"wild\">IZ<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"hero\">GE<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"hero\">BR<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"wild\">NO<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"villain\">DU<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"hero\">LS<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"wild\">BL<\u002Fdiv>\n      <div class=\"hp-av\" data-fac=\"dark\">EZ<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:10px;font-size:9px;color:rgba(243,231,201,.45);letter-spacing:1px;text-transform:uppercase;text-align:center;\">15 contestants · 1 in coma · 1 feral<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-side-box\">\n    <div class=\"hp-side-title\">Hazard Log<\u002Fdiv>\n    <div class=\"hp-side-row\"><span class=\"hp-side-name\">Golf balls (not pong)<\u002Fspan><span class=\"hp-side-stat\">×1 KO<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-side-row\"><span class=\"hp-side-name\">Shark<\u002Fspan><span class=\"hp-side-stat\">×1 BITE<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-side-row\"><span class=\"hp-side-name\">Lava river<\u002Fspan><span class=\"hp-side-stat\">CROSSED<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-side-row\"><span class=\"hp-side-name\">Falling piano<\u002Fspan><span class=\"hp-side-stat\">MISSED<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-side-row\"><span class=\"hp-side-name\">Cage trap<\u002Fspan><span class=\"hp-side-stat\">×1 HIT<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-side-row\"><span class=\"hp-side-name\">Knee · groin<\u002Fspan><span class=\"hp-side-stat\">CRITICAL<\u002Fspan><\u002Fdiv>\n    <div class=\"hp-side-row\"><span class=\"hp-side-name\">Eruption<\u002Fspan><span class=\"hp-side-stat\" style=\"color:var(--hp-lava-hot);\">ONGOING<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-side-box\">\n    <div class=\"hp-side-title\">Prize Status<\u002Fdiv>\n    <div style=\"text-align:center;padding:10px 0;\">\n      <div style=\"font-family:'Bungee Inline',cursive;font-size:32px;color:var(--hp-gold-hot);text-shadow:2px 2px 0 #000;\">$1M<\u002Fdiv>\n      <div style=\"font-size:9px;color:rgba(243,231,201,.5);letter-spacing:2px;text-transform:uppercase;margin-top:4px;\">last seen entering volcano<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-top:8px;\">\n      <div style=\"width:0%;height:100%;background:linear-gradient(90deg,var(--hp-gold),var(--hp-lava));\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:8px;color:rgba(243,231,201,.4);letter-spacing:1px;text-align:center;margin-top:4px;\">RECOVERED: 0% · MOLTEN<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hp-side-box\" style=\"background:linear-gradient(135deg,rgba(196,24,47,.1),rgba(0,0,0,.5));border-color:var(--hp-magma);\">\n    <div class=\"hp-side-title\" style=\"color:#ff8080;\">Next Episode<\u002Fdiv>\n    <div style=\"font-family:'Anton',sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;margin:6px 0;\">Bigger! Badder! Brutal-er!<\u002Fdiv>\n    <div style=\"font-size:10px;color:rgba(243,231,201,.55);line-height:1.5;\">Total Drama returns to the original island. The cast is younger. The traps are <em>worse.<\u002Fem><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Faside>\n\n<\u002Fdiv><!-- /shell -->\n\n<!-- ═════════════ CONTROLS ═════════════ -->\n<div class=\"hp-controls\">\n  <button class=\"hp-btn\" onclick=\"hpPrev()\">◂ PREV<\u002Fbutton>\n  <div class=\"hp-counter\" id=\"phaseCounter\">00 / 05<\u002Fdiv>\n  <button class=\"hp-btn primary\" onclick=\"hpNext()\">NEXT ▸<\u002Fbutton>\n<\u002Fdiv>\n\n<script>\nconst HP_PHASES = ['title','tiebreak','joust','volcano','summit','endings'];\nlet hpIdx = 0;\n\nfunction hpShow(name, tabEl){\n  hpIdx = HP_PHASES.indexOf(name);\n  document.querySelectorAll('.hp-phase').forEach(p=>p.classList.remove('active'));\n  document.getElementById('phase-'+name).classList.add('active');\n  document.querySelectorAll('.hp-tab').forEach(t=>t.classList.remove('active'));\n  if(tabEl) tabEl.classList.add('active');\n  else document.querySelectorAll('.hp-tab')[hpIdx].classList.add('active');\n  document.getElementById('phaseCounter').textContent = String(hpIdx).padStart(2,'0')+' / 05';\n  window.scrollTo({top:0,behavior:'smooth'});\n}\nfunction hpNext(){ hpShow(HP_PHASES[Math.min(HP_PHASES.length-1, hpIdx+1)]); }\nfunction hpPrev(){ hpShow(HP_PHASES[Math.max(0, hpIdx-1)]); }\n\nfunction hpEnding(which, btn){\n  document.getElementById('ending-h').style.display = which==='h' ? 'block' : 'none';\n  document.getElementById('ending-a').style.display = which==='a' ? 'block' : 'none';\n  document.querySelectorAll('#end-h-btn, #end-a-btn').forEach(b=>{\n    b.classList.remove('primary');\n    b.style.background = 'linear-gradient(180deg,#1a1a1a,#3a1a2a)';\n    b.style.borderColor = '#888';\n  });\n  btn.classList.add('primary');\n  btn.style.background = '';\n  btn.style.borderColor = '';\n}\n\n// stars\n(function(){\n  const sw = document.getElementById('stars');\n  for(let i=0;i<60;i++){\n    const s = document.createElement('div');\n    s.className = 'hp-star';\n    s.style.left = Math.random()*100+'%';\n    s.style.top = Math.random()*60+'%';\n    s.style.animationDelay = (Math.random()*3)+'s';\n    s.style.width = s.style.height = (Math.random()*2+1)+'px';\n    sw.appendChild(s);\n  }\n})();\n\n// embers rising\n(function(){\n  const ew = document.getElementById('embers');\n  for(let i=0;i<32;i++){\n    const e = document.createElement('div');\n    e.className = 'hp-ember';\n    e.style.left = Math.random()*100+'%';\n    e.style.animationDuration = (Math.random()*5+5)+'s';\n    e.style.animationDelay = (Math.random()*8)+'s';\n    e.style.width = e.style.height = (Math.random()*3+2)+'px';\n    ew.appendChild(e);\n  }\n})();\n\n// shark fins\n(function(){\n  const fw = document.getElementById('fins');\n  for(let i=0;i<4;i++){\n    const f = document.createElement('div');\n    f.className = 'hp-fin';\n    f.style.animationDuration = (Math.random()*8+14)+'s';\n    f.style.animationDelay = (Math.random()*-10)+'s';\n    f.style.top = (Math.random()*20)+'px';\n    fw.appendChild(f);\n  }\n})();\n\n// ocean waves\n(function(){\n  const ob = document.getElementById('oceanBg');\n  for(let i=0;i<6;i++){\n    const w = document.createElement('div');\n    w.className='hp-wave';\n    w.style.top = (15+i*15)+'px';\n    w.style.animationDelay = (-i*1.3)+'s';\n    w.style.opacity = 1 - i*0.12;\n    ob.appendChild(w);\n  }\n})();\n\n// keyboard nav\ndocument.addEventListener('keydown', e=>{\n  if(e.key==='ArrowRight') hpNext();\n  else if(e.key==='ArrowLeft') hpPrev();\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
