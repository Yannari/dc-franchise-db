          - textbox [ref=e96]: "=== META === Season: Unknown | Episode: 4 | Phase: pre-merge | Players Remaining: 14 === CAST (ALL) === STARTING CAST (18): Bowie Chase Ripper Scary Girl Nichelle Axel Zee Brightly Hicks Emmah Millie Caleb Wayne Raj Julia Priya MK Damien === TRIBES (ACTIVE) === Yellow Tribe (5): Bowie, Ripper, Scary Girl, Nichelle, Axel Red Tribe (6): Zee, Brightly, Hicks, Emmah, Millie, Caleb Blue Tribe (4): Wayne, Priya, MK, Damien === ELIMINATED (PERMANENT) === Julia, Raj, Chase, Brightly === COLD OPEN === Ep.3: Chase was voted out. Scary Girl broke The Diamond — voted Ripper instead of Chase. Why: Ripper hasn't pulled their weight, especially in mental. Their alliance's target still went home. The alliance had only just formed that episode — no time to build trust before the vote fractured it. The relationship with remaining members has taken damage. === CAMP — PRE-CHALLENGE — YELLOW === ADVANTAGES: - The Yellow Hidden Immunity Idol is currently hidden. === CAMP — PRE-CHALLENGE — RED === ADVANTAGES: - Millie has the Red Hidden Immunity Idol (found ep.3). - Zee has the Extra Vote (found ep.3). === CAMP — PRE-CHALLENGE — BLUE === ADVANTAGES: - The Blue Hidden Immunity Idol is currently hidden. CAMP EVENTS: YELLOW CAMP: - Nichelle says something to Bowie that cannot be unsaid. The tribe goes silent. Nobody looks at anyone. - Scary Girl has been watching everyone too carefully. The tribe notices the noticing. - Ripper approaches Nichelle away from the group. The conversation is short. The implications are not. - Bowie has been watching everyone too carefully. The tribe notices the noticing. - Ripper works Axel through a slow conversation that ends with Axel committed to something he barely had to ask for. - Ripper knows. Scary Girl voted for him. Whether he worked it out or someone slipped, he knows. They don't. - [EXPELLED] The Diamond had a conversation this morning. Scary Girl wasn't invited. By the time she realized what was happening, her name was already off the list. Bowie, Ripper and Nichelle made the call together. - [DOUBLE DEALER] \"How many final twos do you have?\" Ripper asked it quietly. Bowie didn't answer. That was the answer. RED CAMP: - Hicks and Caleb clash over who's actually in control. The argument is quiet — but the damage is real. - Brightly knows the jury is watching. They know they need a moment they can point to. - Emmah hides Brightly's stuff as a joke. Brightly finds it, shakes Emmah by the shoulders, and starts laughing. The whole tribe is in. - [Social Intel] Zee has a way of making people talk without asking direct questions. After a long conversation with Millie, he knows something he wasn't supposed to know. - [MAKING AMENDS] Millie and Emmah sit by the fire in silence for a while. Eventually Millie says something honest. It's not a speech — it's a sentence. It's enough. - [SIDE DEAL] Brightly and Caleb made a final two deal. Whether it means anything is a question for later. - [INFO TRADE] A quiet exchange at the water well. Hicks knows something Millie didn't. Now Millie knows too — or thinks she does. BLUE CAMP: - Priya shows Damien a better technique for the obstacle course. Damien picks it up fast. The tribe watches the dynamic shift. - Wayne and Priya talk by the water long after the work is done. It's not about the game. - Damien loses the composure he usually maintains. It comes out on MK. The tribe clocks it. - MK and Damien have a measured disagreement about direction. Calm on the surface. Damaging underneath. - [The Weight] Priya sits alone at the end of the day. The moral compass of the tribe is heavy. She carrys it because nobody else will. RELATIONSHIPS — YELLOW: - Ripper and Scary Girl feel mutual deep-rooted hostility toward one another. - Nichelle and Axel feel a mutual solid bond toward one another. - Scary Girl and Nichelle feel mutual strong dislike toward one another. - Bowie and Ripper feel a mutual solid bond toward one another. - Ripper and Axel feel a mutual solid bond toward one another. - Ripper and Nichelle feel a mutual solid bond toward one another. - Bowie and Scary Girl feel mutual strong dislike toward one another. - Bowie and Nichelle feel a mutual slight bond toward one another. - Scary Girl and Axel feel mutual dislike toward one another. - Bowie and Axel feel a mutual very slight bond toward one another. RELATIONSHIPS — RED: - Hicks and Millie feel a mutual strong bond toward one another. - Emmah and Brightly feel a mutual strong bond toward one another. - Zee and Hicks feel a mutual solid bond toward one another. - Caleb and Brightly feel a mutual solid bond toward one another. - Emmah and Caleb feel a mutual slight bond toward one another. - Zee and Emmah feel a mutual slight bond toward one another. - Hicks and Emmah feel a mutual slight bond toward one another. - Emmah and Millie feel mutual dislike toward one another. - Zee and Millie feel a mutual slight bond toward one another. - Zee and Caleb feel a mutual slight bond toward one another. - Zee and Brightly feel a mutual very slight bond toward one another. - Hicks and Brightly feel a mutual very slight bond toward one another. - Hicks and Caleb have a neutral relationship with each other. - Millie and Brightly have a neutral relationship with each other. - Millie and Caleb have a neutral relationship with each other. RELATIONSHIPS — BLUE: - Wayne and Priya feel a mutual strong bond toward one another. - Priya and MK feel a mutual solid bond toward one another. - Wayne and MK feel mutual dislike toward one another. - Priya and Damien feel a mutual slight bond toward one another. - Wayne and Damien feel a mutual slight bond toward one another. - MK and Damien have a neutral relationship with each other. ALLIANCES: The Dock Pact (formed ep.2): Priya, MK > MK betrayed ep.2 — voted Raj instead of Damien (brand new alliance) — going with The Inner Circle for now, not out of pure loyalty The Diamond (formed ep.3): Bowie, Nichelle, Ripper > Scary Girl betrayed ep.3 — voted Ripper instead of Chase — voted against own ally (brand new alliance) — Ripper hasn't pulled their weight, especially in mental > Scary Girl left ep.3 (expelled — betrayed the alliance) > Ripper left ep.4 (betrayed by alliance member) The Outwit Club (formed ep.4) — FORMED THIS EPISODE: Millie, Zee ALLIANCE CHANGES: - Ripper is out of The Diamond. Someone in that group proved they can't be trusted. === IMMUNITY CHALLENGE === TRIBE IMMUNITY (Tug of War challenge — physical) Two tribes face off in a classic tug of war over a mud pit. Pure strength and teamwork. Losers get dragged through the mud. 1. Yellow — WIN, immune Standings: Axel (standout) > Ripper > Scary Girl > Nichelle (weak link) Sat out: Bowie 2. Blue — safe Standings: Wayne (standout) > Priya > Damien > MK (weak link) 3. Red — LAST, goes to tribal Standings: Caleb (standout) > Zee > Hicks > Millie (weak link) Sat out: Brightly, Emmah RESULT: Red go to tribal council. NOTE: Yellow's win was carried almost entirely by Axel — the rest of the tribe was mid-pack. NOTE: Millie struggled badly — Red's result was heavily affected by that performance. === CAMP — POST-CHALLENGE === YELLOW CAMP: - Axel's challenge streak is getting attention. Ripper notices — and not in a supportive way. The resentment is quiet but growing. - Nichelle pulls the voting data apart in her head. Bowie was supposed to vote one way. He didn't. Nichelle doesn't confront — she adjusts. - Scary Girl thinks the prank on Ripper is hilarious. Ripper does not. The tribe goes very quiet. - Bowie pulls the voting data apart in his head. Nichelle was supposed to vote one way. She didn't. Bowie doesn't confront — he adjusts. - Nichelle and Axel exchange a look across camp that means something. No words needed. No words used. - Ripper says two words and Nichelle is gone. Full tears laughing. The tribe watches, confused. \"You had to be there\" doesn't cover it. - Axel refuses to sit still — fishing, fixing the shelter, hauling water. She is making herself indispensable. - Scary Girl tells someone quietly that she will do whatever it takes to make sure Ripper doesn't make it to the end. - Nichelle competed today — couldn't sit out again. She makes it clear she wants to be out there. - Scary Girl goes off. It isn't the words so much as the tone — the kind that makes people around a fire suddenly find somewhere else to be. - Bowie sees the whole thing. He waits until Scary Girl is out of earshot, then says exactly nothing. The look on his face was enough. - Ripper knows who in The Diamond turned on them. He says nothing. The quiet is loud. - After leaving his old alliance, Ripper was floating. Bowie offered a lifeline: The Diamond. \"We saw what they did to you. That won't happen here.\" RED CAMP: - Hicks has been talking to people about Brightly and Caleb. The pitch is simple: split them up now, or watch them ride to the final two together. - There's a new energy around Brightly that Caleb can't quite name. Emmah lights up whenever they walks over, laughs a half-second too long at their jokes. It hasn't crossed any lines yet — but the line is getting thinner every day. - There's a chill between Caleb and Emmah that wasn't there before. They still talk, but the pauses are longer, the eye contact shorter. Brightly pretends not to notice. - Nobody's including Millie or Zee in their plans. So they made their own. The Outwit Club forms at the bottom — two players with nothing to lose and everything to fight for. - Hicks hears Millie's name come up as a target. He don'tesn't campaign — he just says one thing: \"Not Millie.\" It carries weight. - Emmah approaches Brightly quietly. \"We need to talk.\" They do. For a long time. - Millie and Caleb get into a tense back-and-forth. Neither raises their voice — but the edge is there. - Zee pushes back on Millie in a way that surprises everyone — they're usually so composed. - Zee and Brightly take a walk that lasts too long to be casual. They come back with the same energy. - The loss stings harder with someone watching from the sideline. Brightly didn't compete today, and somebody is going to bring that up. - Red comes back without a win. Eyes move to Emmah. She was on the bench — make of that what you will. - Millie competed today — couldn't sit out again. She makes it clear she wants to be out there. - Brightly say something they can't take back. The camp goes quiet. - Zee don't overreact. He just makes a mental note. Brightly did the work for him today. - There's a chill between Caleb and Emmah that wasn't there before. They still talk, but the pauses are longer, the eye contact shorter. Brightly pretends not to notice. BLUE CAMP: - MK leans back in the confessional and smiles. \"They have no idea. None of them.\" - MK tells the confessional: \"Wayne wins again. Good for him. I'm thrilled.\" She is not thrilled. - Someone lets it slip that Damien's name was mentioned. He tucks that information away and say nothing. - Wayne is checking in with everyone — more than usual. MK gets a longer conversation than expected. - Priya doesn't ask Wayne if they're in — Priya tells Wayne what the plan already is. Wayne finds themselves nodding. - Wayne finds Damien and says, simply: \"We're good. I'm not moving.\" Damien believes him. That's the thing about him. - Priya doesn't ask MK if they're in — Priya tells MK what the plan already is. MK finds themselves nodding. === VOTING PLANS — RED === ALLIANCE PLANS: The Outwit Club (3 members, 3 can vote) TARGET: Brightly REASONING: The Outwit Club agreed on this name — going along with it MEMBERS: Hicks, Millie, Zee SPEARHEADER: Hicks The Brightly Core (3 members, 3 can vote) TARGET: Zee REASONING: following The Brightly Core — it's the right call for now MEMBERS: Brightly, Emmah, Caleb SPEARHEADER: Brightly CONFLICTED: Emmah: Actually voted Millie — dead weight in challenges — Millie has been costing the tribe — they just lost a physical challenge Caleb: Actually voted Millie — weak in physical — hard to justify keeping them when the tribe is losing GOING INTO TRIBAL: Primary Target: Brightly (3 votes) Counter Target: Millie (2 votes) ADVANTAGES IN PLAY: Millie holds Hidden Immunity Idol Zee holds Extra Vote KEY CONFESSIONALS: Hicks [Spearheader]: \"The Outwit Club agreed on this name — going along with it\" Brightly [Spearheader]: \"following The Brightly Core — it's the right call for now\" Emmah [Conflicted]: \"dead weight in challenges — Millie has been costing the tribe — they just lost a physical challenge\" === TRIBAL COUNCIL === Attendees: Zee, Brightly, Hicks, Emmah, Millie, Caleb WORD AT CAMP: #1 TARGET: Brightly — Strategic threat — hard to beat at FTC. (Numbers are pointing here) #2 TARGET: Millie — Threat assessment converged here. (The tribe is watching) #3 WATCH: Zee — Too well-liked. Jury threat. (Floated as a possibility) AT TRIBAL COUNCIL: Chris looks at Brightly. \"You're not the type to sit still out here. Is all that movement a liability right now?\" Brightly: \"Honestly? I'm not nervous. I know where the votes are. The only thing that changes tonight is whether people do what they said.\" -> Brightly gives nothing away. The composure either reassures allies or sets off alarm bells in everyone who didn't plan with them. Chris asks Hicks point blank: \"If tonight's vote goes sideways — and it might — how much of that lands on you?\" Hicks: \"Tonight feels right. I don't want to overthink it.\" -> Careful and unmemorable. But everyone in this tribe knows who's aligned with who. Chris asks Emmah directly: \"Does tonight feel like a game move to you, or does it feel personal?\" Emmah: \"Both. I'm not going to pretend everything is purely strategic out here. Some things stick with you.\" -> The personal admission lands. Motive is no longer ambiguous. Chris addresses the tribe. \"Brightly and Caleb — you've been attached at the hip. How does that dynamic factor into tonight?\" Brightly: \"I won't deny there's a bond there. But I'm here to play. So is Caleb.\" Caleb: \"Let them think it's a liability. I know what it actually is.\" -> The pair holds their ground. But the tribe just had the thought out loud — and it won't leave. \"The votes have been cast.\" === THE VOTES === Zee voted for Brightly — The Outwit Club made the call and they're committed Brightly voted for Zee — following The Brightly Core — it's the right call for now Hicks voted for Brightly — The Outwit Club agreed on this name — going along with it Emmah voted for Millie — dead weight in challenges — Millie has been costing the tribe — they just lost a physical challenge Millie voted for Brightly — loyal to The Outwit Club — not breaking ranks Caleb voted for Millie — weak in physical — hard to justify keeping them when the tribe is losing === WHY THIS VOTE HAPPENED === Brightly was voted out because: - The name had already come up before — the consensus vote became inevitable - Name written down 3 times before - Voted out by: Zee, Hicks, Millie - The Brightly Core tried to protect them — but was outnumbered - Emmah voted Millie to hold The Brightly Core together — it wasn't enough - Caleb voted Millie to hold The Brightly Core together — it wasn't enough Brightly (Mastermind) — the tribe has spoken. VOTED OUT THIS EPISODE: Brightly === CAMP OVERVIEW === ADVANTAGES IN PLAY: - Millie: Hidden Immunity Idol (found ep.3) - Zee: Extra Vote (found ep.3) YELLOW (5): Bowie, Ripper, Scary Girl, Nichelle, Axel RED (5): Zee, Hicks, Emmah, Millie, Caleb BLUE (4): Wayne, Priya, MK, Damien Permanently out: Julia, Raj, Chase, Brightly === WRITER CONTEXT === COLD OPEN HOOK: Merge is close. Everyone can feel it — the way camp gets quieter, the way people stop making long-term plans out loud. NEXT EPISODE QUESTIONS: - The merge is close. Who has the numbers to survive it? - Hicks ran the vote tonight. Can anyone break that grip before it's too late? - Millie survived by a single vote. Do they scramble or play it cool? - There's a hidden idol in play. The wrong vote could blow up in someone's face."
