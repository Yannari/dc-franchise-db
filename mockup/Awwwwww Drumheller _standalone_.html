document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

isplay: swap;\n  src: url(\"16c5bbdd-39dc-4f5b-bf71-5e24cf9a9f45\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Rye';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"704f80af-9fe1-4dda-af72-8a65faebd6b6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ═══════════════════════════════════════════════════════\n   AWWWWWW, DRUMHELLER — Dig Site Field Log\n   Alberta Badlands · Dinosaur Bones · Final Four · Vote\n   Prefix: dh-\n   ═══════════════════════════════════════════════════════ */\n:root{\n  /* sediment + sky */\n  --dh-night:#0e0a06;\n  --dh-coal:#1a120a;\n  --dh-tar:#2a1d10;\n  --dh-rust:#7a3a1a;\n  --dh-terracotta:#b5562c;\n  --dh-ochre:#d68a3a;\n  --dh-sand:#e8c486;\n  --dh-bone:#f1e3c4;\n  --dh-paper:#f7eedc;\n  --dh-dust:#caa676;\n  --dh-shadow:#4a2e18;\n  --dh-mud:#3a2814;\n  --dh-prairie:#5e7f8a;\n  --dh-sky:#a8c0c8;\n  --dh-dusk:#c47b5a;\n  --dh-spark:#ffd34a;\n  --dh-fuse:#ff8a1a;\n  --dh-blood:#a8281c;\n  --dh-cake:#f0a8b8;\n  --dh-cake-deep:#d06880;\n  --dh-oil:#08060a;\n\n  /* contestants */\n  --dh-alej:#3a5d8f;   /* Alejandro — cool blue */\n  --dh-heat:#c43248;   /* Heather — red */\n  --dh-cody:#7b4ba8;   /* Cody — purple */\n  --dh-sier:#5a9e3e;   /* Sierra — green */\n}\n*{margin:0;padding:0;box-sizing:border-box;}\nhtml,body{overflow-x:hidden;}\nbody{\n  background:var(--dh-night);color:var(--dh-bone);\n  font-family:'Karla',sans-serif;font-size:14px;line-height:1.55;\n  min-height:100vh;letter-spacing:.01em;\n}\n\n/* ═══ BADLANDS BACKDROP ═══ */\n.dh-sky{position:fixed;inset:0;z-index:0;pointer-events:none;\n  background:\n    radial-gradient(ellipse 70% 38% at 50% 8%, rgba(196,123,90,.28) 0%, transparent 60%),\n    radial-gradient(ellipse 90% 50% at 50% 100%, rgba(74,46,24,.55) 0%, transparent 70%),\n    linear-gradient(180deg,#0e0a06 0%,#1a120a 25%,#2a1d10 50%,#4a2e18 78%,#7a3a1a 100%);\n}\n.dh-dust-haze{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;\n  background-image:\n    radial-gradient(1px 1px at 12% 14%, rgba(232,196,134,.6) 50%, transparent),\n    radial-gradient(1px 1px at 34% 9%, rgba(232,196,134,.5) 50%, transparent),\n    radial-gradient(1.5px 1.5px at 71% 22%, rgba(232,196,134,.7) 50%, transparent),\n    radial-gradient(1px 1px at 88% 12%, rgba(232,196,134,.5) 50%, transparent),\n    radial-gradient(1px 1px at 54% 28%, rgba(232,196,134,.55) 50%, transparent),\n    radial-gradient(1px 1px at 22% 34%, rgba(232,196,134,.6) 50%, transparent);\n  background-size:100% 100%;}\n\n/* striped horizon (sediment layers + hoodoos) */\n.dh-horizon{position:fixed;left:0;right:0;bottom:0;height:30vh;z-index:1;pointer-events:none;}\n.dh-hoodoo{position:absolute;bottom:0;background:\n  linear-gradient(180deg,\n    var(--dh-bone) 0%,var(--dh-bone) 6%,\n    var(--dh-rust) 6%,var(--dh-rust) 14%,\n    var(--dh-terracotta) 14%,var(--dh-terracotta) 26%,\n    var(--dh-ochre) 26%,var(--dh-ochre) 32%,\n    var(--dh-shadow) 32%,var(--dh-shadow) 48%,\n    var(--dh-coal) 48%,var(--dh-coal) 100%);\n  filter:brightness(.5) drop-shadow(0 0 12px rgba(0,0,0,.5));\n  -webkit-mask:linear-gradient(180deg,#000 0%,#000 92%,transparent 100%);}\n.dh-hoodoo.h1{left:3%;width:80px;height:130px;clip-path:polygon(20% 0,80% 0,90% 18%,72% 24%,86% 56%,100% 100%,0 100%,18% 56%,30% 24%,12% 18%);}\n.dh-hoodoo.h2{left:14%;width:110px;height:170px;clip-path:polygon(30% 0,68% 0,82% 22%,66% 30%,80% 60%,100% 100%,0 100%,22% 60%,36% 30%,18% 22%);}\n.dh-hoodoo.h3{left:30%;width:70px;height:140px;clip-path:polygon(24% 0,74% 0,88% 22%,72% 28%,86% 58%,100% 100%,0 100%,16% 58%,28% 28%,12% 22%);}\n.dh-hoodoo.h4{left:54%;width:96px;height:160px;clip-path:polygon(28% 0,72% 0,84% 20%,68% 28%,82% 56%,100% 100%,0 100%,20% 56%,32% 28%,16% 20%);}\n.dh-hoodoo.h5{left:70%;width:64px;height:120px;clip-path:polygon(22% 0,76% 0,86% 18%,72% 26%,84% 56%,100% 100%,0 100%,18% 56%,30% 26%,12% 18%);}\n.dh-hoodoo.h6{left:84%;width:120px;height:180px;clip-path:polygon(32% 0,66% 0,80% 22%,64% 30%,78% 60%,100% 100%,0 100%,24% 60%,38% 30%,20% 22%);}\n.dh-flats{position:fixed;left:0;right:0;bottom:0;height:14vh;z-index:1;pointer-events:none;\n  background:\n    repeating-linear-gradient(180deg,\n      var(--dh-mud) 0px,var(--dh-mud) 6px,\n      var(--dh-rust) 6px,var(--dh-rust) 9px,\n      var(--dh-terracotta) 9px,var(--dh-terracotta) 14px,\n      var(--dh-shadow) 14px,var(--dh-shadow) 22px),\n    linear-gradient(180deg,transparent,var(--dh-coal));\n  filter:brightness(.65);\n  -webkit-mask:linear-gradient(180deg,transparent 0%,#000 50%);}\n\n/* ═══ TOP CHROME ═══ */\n.dh-chrome{position:fixed;top:0;left:0;right:0;height:42px;z-index:50;\n  background:linear-gradient(90deg,rgba(14,10,6,.97),rgba(74,46,24,.85) 70%,rgba(14,10,6,.97));\n  border-bottom:2px solid var(--dh-terracotta);\n  display:flex;align-items:center;justify-content:space-between;padding:0 18px;\n  font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.5px;\n  backdrop-filter:blur(10px);}\n.dh-rec{display:flex;align-items:center;gap:8px;color:var(--dh-fuse);font-weight:600;}\n.dh-rec-dot{width:8px;height:8px;background:var(--dh-fuse);border-radius:50%;\n  box-shadow:0 0 12px var(--dh-fuse);animation:dh-pulse 1.4s ease infinite;}\n@keyframes dh-pulse{0%,100%{opacity:1;}50%{opacity:.2;}}\n.dh-coord{flex:1;overflow:hidden;margin:0 24px;position:relative;height:18px;}\n.dh-coord-inner{position:absolute;white-space:nowrap;color:var(--dh-sand);\n  animation:dh-scroll 46s linear infinite;}\n.dh-coord-inner b{color:var(--dh-spark);}\n.dh-coord-inner em{color:var(--dh-blood);font-style:normal;}\n@keyframes dh-scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}\n.dh-call{color:var(--dh-ochre);font-weight:600;letter-spacing:3px;}\n.dh-wind{color:var(--dh-spark);}\n\n/* TABS */\n.dh-tabs{position:fixed;top:42px;left:0;right:0;z-index:49;\n  background:rgba(14,10,6,.96);border-bottom:1px solid rgba(213,138,58,.2);\n  display:flex;justify-content:center;gap:2px;padding:0 16px;backdrop-filter:blur(10px);}\n.dh-tab{padding:11px 18px;cursor:pointer;border:none;background:transparent;\n  font-family:'Big Shoulders Display',sans-serif;font-size:14px;letter-spacing:3px;font-weight:800;\n  color:rgba(241,227,196,.42);text-transform:uppercase;\n  border-bottom:2px solid transparent;transition:all .2s;}\n.dh-tab:hover{color:var(--dh-bone);}\n.dh-tab.active{color:var(--dh-bone);border-bottom-color:var(--dh-ochre);}\n.dh-tab .n{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dh-shadow);\n  margin-right:8px;letter-spacing:1px;font-weight:600;}\n.dh-tab.active .n{color:var(--dh-fuse);}\n\n/* SHELL */\n.dh-shell{position:relative;z-index:10;max-width:1280px;margin:96px auto 60px;\n  display:grid;grid-template-columns:1fr 360px;gap:22px;padding:0 22px;}\n.dh-main{min-width:0;}\n.dh-phase{display:none;animation:dh-fade .45s ease;}\n.dh-phase.active{display:block;}\n@keyframes dh-fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}\n\n/* ═══ HERO ═══ */\n.dh-hero{position:relative;padding:50px 100px 40px;margin-bottom:22px;border-radius:5px;overflow:hidden;\n  background:\n    radial-gradient(ellipse at 30% -10%, var(--dh-sand) 0%, var(--dh-ochre) 36%, var(--dh-terracotta) 72%, var(--dh-rust) 100%),\n    var(--dh-ochre);\n  border:3px solid var(--dh-shadow);\n  box-shadow:\n    inset 0 4px 0 rgba(255,255,255,.28),\n    inset 0 -5px 0 rgba(58,40,20,.45),\n    inset 5px 0 0 rgba(58,40,20,.18),\n    inset -5px 0 0 rgba(58,40,20,.18),\n    0 16px 40px rgba(0,0,0,.6);\n}\n/* sediment striping */\n.dh-hero::before{content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;\n  background:\n    repeating-linear-gradient(180deg,\n      transparent 0,transparent 38px,\n      rgba(58,40,20,.18) 38px,rgba(58,40,20,.18) 40px,\n      transparent 40px,transparent 86px,\n      rgba(122,58,26,.14) 86px,rgba(122,58,26,.14) 90px,\n      transparent 90px,transparent 140px,\n      rgba(232,196,134,.18) 140px,rgba(232,196,134,.18) 143px);\n  mix-blend-mode:multiply;opacity:.55;}\n.dh-hero::after{content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;\n  background-image:\n    radial-gradient(rgba(58,40,20,.18) 1px,transparent 1.5px),\n    radial-gradient(rgba(255,255,255,.13) 1px,transparent 1.5px);\n  background-size:14px 14px,11px 11px;\n  background-position:0 0,7px 5px;mix-blend-mode:multiply;opacity:.5;}\n.dh-hero > *{position:relative;z-index:2;}\n\n/* bone columns flanking */\n.dh-bone-col{position:absolute;top:24px;bottom:24px;width:54px;z-index:2;\n  display:flex;flex-direction:column;align-items:center;justify-content:space-around;\n  padding:14px 0;gap:8px;\n  background:linear-gradient(180deg,rgba(58,40,20,.22),rgba(58,40,20,.36));\n  border:2px solid rgba(58,40,20,.5);border-radius:3px;\n  box-shadow:inset 1px 1px 0 rgba(255,255,255,.3),inset -1px -1px 0 rgba(0,0,0,.3);}\n.dh-bone-col.l{left:22px;}\n.dh-bone-col.r{right:22px;}\n.dh-bone-col svg{width:30px;height:30px;color:var(--dh-shadow);\n  filter:drop-shadow(0 1px 0 rgba(255,255,255,.3));opacity:.85;}\n\n.dh-stamp-meta{display:flex;gap:14px;align-items:center;font-family:'IBM Plex Mono',monospace;\n  font-size:10px;letter-spacing:3.5px;color:var(--dh-shadow);margin-bottom:18px;text-transform:uppercase;}\n.dh-stamp-meta .dot{width:5px;height:5px;background:var(--dh-shadow);border-radius:50%;}\n.dh-stamp-meta .pip{color:var(--dh-blood);font-weight:700;}\n\n.dh-hero-title{font-family:'Rye',serif;font-size:80px;line-height:.96;\n  color:var(--dh-coal);letter-spacing:1px;text-transform:uppercase;\n  text-shadow:\n    1px 1px 0 rgba(255,255,255,.32),\n    -1px -1px 0 rgba(0,0,0,.4),\n    4px 4px 0 var(--dh-rust),\n    8px 8px 0 rgba(58,40,20,.5);}\n.dh-hero-title .pre{font-family:'Big Shoulders Display',sans-serif;font-weight:900;\n  font-size:64px;display:block;letter-spacing:8px;color:var(--dh-blood);\n  text-shadow:3px 3px 0 rgba(0,0,0,.3);margin-bottom:6px;}\n.dh-hero-title .comma{color:var(--dh-blood);}\n.dh-hero-sub{font-family:'Big Shoulders Display',sans-serif;font-weight:700;\n  font-size:15px;letter-spacing:8px;color:var(--dh-shadow);margin-top:14px;text-transform:uppercase;}\n.dh-hero-tag{margin-top:22px;font-family:'Cutive Mono',monospace;\n  font-size:13.5px;color:rgba(28,18,10,.85);max-width:620px;line-height:1.7;}\n.dh-hero-tag em{color:var(--dh-blood);font-style:normal;font-weight:700;}\n.dh-hero-tag strong{color:var(--dh-coal);font-weight:800;}\n\n.dh-hero-stats{display:flex;gap:14px;margin-top:26px;flex-wrap:wrap;}\n.dh-hero-stat{padding:11px 16px;border:1.5px solid rgba(58,40,20,.4);border-radius:3px;\n  background:rgba(255,255,255,.22);min-width:130px;}\n.dh-hero-stat .lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;\n  color:var(--dh-shadow);text-transform:uppercase;}\n.dh-hero-stat .val{font-family:'Big Shoulders Display',sans-serif;font-weight:800;\n  font-size:22px;color:var(--dh-coal);letter-spacing:.5px;margin-top:3px;}\n.dh-hero-stat .val.blood{color:var(--dh-blood);}\n.dh-hero-stat .val.fuse{color:var(--dh-fuse);}\n\n/* roster strip */\n.dh-roster-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:26px;}\n.dh-rs{padding:14px 10px 12px;border:1.5px solid rgba(58,40,20,.4);background:rgba(255,255,255,.22);\n  border-radius:3px;text-align:center;position:relative;\n  border-top:5px solid var(--dh-clr,var(--dh-ochre));}\n.dh-rs .av{width:52px;height:52px;border-radius:50%;margin:0 auto 8px;\n  background:var(--dh-clr,var(--dh-ochre));display:flex;align-items:center;justify-content:center;\n  font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:18px;color:var(--dh-bone);\n  border:3px solid rgba(28,18,10,.6);box-shadow:0 0 0 1px rgba(255,255,255,.18);}\n.dh-rs .pin{position:absolute;top:-7px;right:-5px;font-family:'Big Shoulders Display',sans-serif;\n  font-weight:800;font-size:9px;letter-spacing:1px;padding:3px 6px;border-radius:2px;\n  background:var(--dh-clr,var(--dh-ochre));color:var(--dh-bone);transform:rotate(8deg);\n  border:1.5px solid rgba(28,18,10,.55);}\n.dh-rs .nm{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:15px;\n  letter-spacing:2px;color:var(--dh-coal);}\n.dh-rs .arch{font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:1px;\n  color:var(--dh-shadow);text-transform:uppercase;margin-top:3px;}\n\n/* ═══ CARDS ═══ */\n.dh-card{position:relative;margin:14px 0;padding:18px 20px 18px 26px;border-radius:4px;\n  border:1px solid rgba(213,138,58,.18);\n  background:linear-gradient(135deg,rgba(74,46,24,.32),rgba(14,10,6,.55));\n  animation:dh-cardin .55s cubic-bezier(.16,1,.3,1) forwards;}\n@keyframes dh-cardin{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:none;}}\n.dh-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;\n  background:var(--dh-clr,var(--dh-ochre));}\n.dh-card[data-type=\"host\"]::before{background:var(--dh-fuse);}\n.dh-card[data-type=\"hazard\"]::before{background:var(--dh-blood);\n  background-image:repeating-linear-gradient(0deg,var(--dh-blood) 0,var(--dh-blood) 4px,var(--dh-coal) 4px,var(--dh-coal) 7px);}\n.dh-card[data-type=\"alliance\"]::before{background:var(--dh-clr,var(--dh-ochre));\n  background-image:repeating-linear-gradient(0deg,var(--dh-clr,var(--dh-ochre)) 0,var(--dh-clr,var(--dh-ochre)) 6px,transparent 6px,transparent 10px);}\n.dh-card[data-type=\"scheme\"]::before{background:var(--dh-clr,var(--dh-alej));\n  background-image:repeating-linear-gradient(45deg,var(--dh-clr,var(--dh-alej)) 0,var(--dh-clr,var(--dh-alej)) 5px,var(--dh-coal) 5px,var(--dh-coal) 9px);}\n.dh-card[data-type=\"vote\"]::before{background:var(--dh-blood);}\n.dh-card[data-type=\"win\"]::before{background:var(--dh-spark);}\n.dh-card[data-type=\"birthday\"]::before{background:var(--dh-cake-deep);\n  background-image:repeating-linear-gradient(0deg,var(--dh-cake) 0,var(--dh-cake) 5px,var(--dh-cake-deep) 5px,var(--dh-cake-deep) 9px);}\n.dh-card[data-type=\"rescue\"]::before{background:var(--dh-clr,var(--dh-sand));}\n.dh-card[data-type=\"boom\"]::before{background:var(--dh-fuse);\n  background-image:repeating-linear-gradient(45deg,var(--dh-fuse) 0,var(--dh-fuse) 5px,var(--dh-blood) 5px,var(--dh-blood) 10px);}\n\n.dh-card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap;}\n.dh-card-title{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:17px;\n  letter-spacing:1.2px;color:var(--dh-bone);text-transform:uppercase;}\n.dh-card-time{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--dh-dust);\n  letter-spacing:1.2px;}\n.dh-badge{margin-left:auto;padding:3px 9px;border-radius:2px;font-family:'IBM Plex Mono',monospace;\n  font-size:8.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;border:1px solid;}\n.dh-b-host{color:var(--dh-fuse);border-color:rgba(255,138,26,.5);background:rgba(255,138,26,.1);}\n.dh-b-alej{color:#9ab8e0;border-color:rgba(58,93,143,.6);background:rgba(58,93,143,.18);}\n.dh-b-heat{color:#f08090;border-color:rgba(196,50,72,.5);background:rgba(196,50,72,.12);}\n.dh-b-cody{color:#c098e8;border-color:rgba(123,75,168,.5);background:rgba(123,75,168,.12);}\n.dh-b-sier{color:#a4d488;border-color:rgba(90,158,62,.5);background:rgba(90,158,62,.12);}\n.dh-b-hazard{color:#f08070;border-color:rgba(168,40,28,.6);background:rgba(168,40,28,.14);}\n.dh-b-alliance{color:var(--dh-ochre);border-color:rgba(213,138,58,.5);background:rgba(213,138,58,.1);}\n.dh-b-scheme{color:#9ab8e0;border-color:rgba(58,93,143,.55);background:rgba(58,93,143,.16);}\n.dh-b-vote{color:#f08080;border-color:rgba(168,40,28,.6);background:rgba(168,40,28,.14);}\n.dh-b-birthday{color:#f5b8c8;border-color:rgba(208,104,128,.55);background:rgba(208,104,128,.14);}\n.dh-b-rescue{color:#f0c98a;border-color:rgba(232,196,134,.5);background:rgba(232,196,134,.1);}\n.dh-b-boom{color:var(--dh-spark);border-color:rgba(255,211,74,.55);background:rgba(255,138,26,.15);}\n\n.dh-card-body{font-size:13.8px;line-height:1.7;color:rgba(241,227,196,.86);}\n.dh-card-body em{color:var(--dh-fuse);font-style:normal;font-weight:600;}\n.dh-card-body strong{color:var(--dh-sand);font-weight:700;}\n.dh-card-body i{color:var(--dh-cake);font-style:italic;}\n.dh-card-meta{margin-top:11px;padding-top:9px;border-top:1px dashed rgba(213,138,58,.18);\n  display:flex;gap:18px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:10px;\n  color:var(--dh-dust);letter-spacing:.3px;}\n.dh-card-meta .pos{color:#9ad880;}\n.dh-card-meta .neg{color:#f08070;}\n.dh-card-meta .neu{color:var(--dh-ochre);}\n.dh-card-meta .gold{color:var(--dh-spark);}\n.dh-card-meta .pink{color:var(--dh-cake);}\n\n/* avatars */\n.dh-av{width:34px;height:34px;border-radius:50%;background:var(--dh-clr,var(--dh-ochre));\n  display:inline-flex;align-items:center;justify-content:center;\n  font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:14px;color:var(--dh-bone);\n  border:2px solid rgba(14,10,6,.7);flex-shrink:0;letter-spacing:.4px;\n  box-shadow:0 0 0 1px rgba(255,255,255,.08);}\n.dh-av.sm{width:26px;height:26px;font-size:11px;border-width:1.5px;}\n.dh-av.lg{width:50px;height:50px;font-size:19px;}\n.dh-av.charred{filter:saturate(.3) brightness(.5);box-shadow:0 0 0 2px var(--dh-oil),0 0 12px var(--dh-fuse);}\n.dh-av.glitter{box-shadow:0 0 0 2px var(--dh-cake),0 0 10px rgba(240,168,184,.6);}\n.dh-av.out{filter:grayscale(1) brightness(.5);opacity:.55;}\n\n/* quote */\n.dh-quote{display:flex;gap:14px;align-items:flex-start;}\n.dh-quote .mark{font-family:'Rye',serif;font-size:54px;color:var(--dh-fuse);line-height:.7;margin-top:-2px;}\n.dh-quote .text{font-family:'Cinzel',serif;font-size:14.5px;font-weight:600;\n  color:var(--dh-bone);line-height:1.65;}\n.dh-quote .who{display:block;margin-top:8px;font-family:'IBM Plex Mono',monospace;\n  font-size:9px;color:var(--dh-fuse);letter-spacing:2.5px;font-weight:500;}\n\n/* confessional */\n.dh-conf{margin:14px 0;padding:16px 18px 14px 22px;background:rgba(14,10,6,.55);\n  border-left:3px solid var(--dh-clr,var(--dh-ochre));border-radius:2px;position:relative;}\n.dh-conf::before{content:'◢ CONFESSIONAL CAM';position:absolute;top:-7px;left:14px;background:var(--dh-night);\n  padding:0 8px;font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:2px;\n  color:var(--dh-dust);font-weight:600;}\n.dh-conf-hdr{display:flex;align-items:center;gap:10px;margin-bottom:7px;}\n.dh-conf-name{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:14px;letter-spacing:2px;\n  color:var(--dh-clr,var(--dh-ochre));}\n.dh-conf-body{font-family:'Cutive Mono',monospace;font-size:13px;line-height:1.65;\n  color:rgba(241,227,196,.82);font-style:italic;}\n.dh-conf-body em{color:var(--dh-fuse);font-style:normal;font-weight:600;}\n.dh-conf-body strong{color:var(--dh-sand);font-weight:700;}\n\n/* ═══ DINO BUILD GRID — four contestant exhibits ═══ */\n.dh-exhibits{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:14px 0;}\n.dh-exhibit{position:relative;padding:14px 12px 12px;border:1.5px solid rgba(213,138,58,.22);\n  background:\n    linear-gradient(135deg,rgba(74,46,24,.45),rgba(14,10,6,.55)),\n    repeating-linear-gradient(135deg,transparent 0,transparent 6px,rgba(232,196,134,.025) 6px,rgba(232,196,134,.025) 7px);\n  border-radius:3px;border-top:5px solid var(--dh-clr,var(--dh-ochre));}\n.dh-exh-tag{position:absolute;top:-9px;right:10px;background:var(--dh-night);\n  font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:1.5px;\n  color:var(--dh-dust);padding:1px 7px;border:1px solid rgba(213,138,58,.3);}\n.dh-exh-hdr{display:flex;align-items:center;gap:9px;margin-bottom:9px;}\n.dh-exh-name{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:18px;\n  letter-spacing:1.5px;color:var(--dh-clr,var(--dh-ochre));}\n.dh-exh-by{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dh-dust);\n  letter-spacing:.8px;margin-top:2px;}\n/* dinosaur silhouettes */\n.dh-dino{position:relative;height:88px;margin:6px 0 10px;background:rgba(14,10,6,.45);\n  border:1px solid rgba(213,138,58,.12);border-radius:3px;overflow:hidden;\n  display:flex;align-items:center;justify-content:center;padding:8px;}\n.dh-dino::before{content:'';position:absolute;inset:0;\n  background-image:\n    linear-gradient(90deg,rgba(213,138,58,.07) 1px,transparent 1px),\n    linear-gradient(0deg,rgba(213,138,58,.07) 1px,transparent 1px);\n  background-size:14px 14px;}\n.dh-dino svg{position:relative;z-index:1;height:100%;width:auto;color:var(--dh-bone);\n  filter:drop-shadow(0 2px 2px rgba(0,0,0,.6));}\n.dh-exh-cap{font-family:'Cutive Mono',monospace;font-size:11.5px;color:rgba(241,227,196,.78);\n  line-height:1.55;padding:0 2px;}\n.dh-exh-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;\n  padding-top:8px;border-top:1px dashed rgba(213,138,58,.18);\n  font-family:'IBM Plex Mono',monospace;font-size:10px;}\n.dh-exh-foot .k{color:var(--dh-dust);letter-spacing:.8px;}\n.dh-exh-foot .v{color:var(--dh-bone);font-weight:700;}\n.dh-exh-foot .v.win{color:var(--dh-spark);}\n.dh-exh-foot .v.tie{color:var(--dh-ochre);}\n\n/* ═══ ELECTRIC CHAIR VOTE PANEL ═══ */\n.dh-chair{margin:14px 0;padding:18px;background:\n  linear-gradient(135deg,rgba(168,40,28,.18),rgba(14,10,6,.6));\n  border:1.5px solid var(--dh-blood);border-radius:4px;}\n.dh-chair-hdr{display:flex;justify-content:space-between;align-items:flex-end;\n  margin-bottom:14px;padding-bottom:9px;border-bottom:1px dashed rgba(168,40,28,.4);}\n.dh-chair-ttl{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:18px;\n  letter-spacing:2px;color:var(--dh-bone);text-transform:uppercase;}\n.dh-chair-ttl .zap{color:var(--dh-spark);}\n.dh-chair-sub{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:1.5px;\n  color:var(--dh-dust);text-transform:uppercase;}\n.dh-chair-rows{display:flex;flex-direction:column;gap:10px;}\n.dh-chair-row{display:grid;grid-template-columns:40px 1fr auto;gap:12px;align-items:center;\n  padding:8px 10px;background:rgba(14,10,6,.55);border-radius:3px;\n  border-left:3px solid var(--dh-clr,var(--dh-ochre));}\n.dh-chair-voter{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dh-dust);\n  letter-spacing:.8px;}\n.dh-chair-text{font-size:12.5px;color:var(--dh-bone);line-height:1.5;}\n.dh-chair-text b{color:var(--dh-clr,var(--dh-ochre));font-weight:700;}\n.dh-chair-text .lie{color:var(--dh-blood);text-decoration:line-through;}\n.dh-chair-text .truth{color:#9ad880;font-weight:600;}\n.dh-chair-zap{display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;\n  font-size:9px;letter-spacing:1px;padding:3px 7px;border:1px solid;border-radius:2px;}\n.dh-chair-zap.shocked{color:var(--dh-spark);border-color:rgba(255,211,74,.6);\n  background:rgba(255,211,74,.1);}\n.dh-chair-zap.clean{color:#9ad880;border-color:rgba(154,216,128,.5);\n  background:rgba(154,216,128,.08);}\n\n/* ═══ BARREL DIG / QUARRY MAP ═══ */\n.dh-quarry{position:relative;height:280px;margin:14px 0;border-radius:4px;overflow:hidden;\n  background:\n    radial-gradient(ellipse 60% 50% at 50% 30%, rgba(232,196,134,.25),transparent 60%),\n    linear-gradient(180deg,\n      var(--dh-sand) 0%,var(--dh-sand) 8%,\n      var(--dh-ochre) 8%,var(--dh-ochre) 18%,\n      var(--dh-terracotta) 18%,var(--dh-terracotta) 32%,\n      var(--dh-rust) 32%,var(--dh-rust) 52%,\n      var(--dh-shadow) 52%,var(--dh-shadow) 78%,\n      var(--dh-coal) 78%,var(--dh-coal) 100%);\n  border:1.5px solid rgba(58,40,20,.55);\n  box-shadow:inset 0 8px 20px rgba(0,0,0,.4);}\n.dh-quarry::before{content:'';position:absolute;inset:0;pointer-events:none;\n  background-image:\n    linear-gradient(90deg,rgba(58,40,20,.18) 1px,transparent 1px),\n    linear-gradient(0deg,rgba(58,40,20,.18) 1px,transparent 1px);\n  background-size:28px 28px;opacity:.5;}\n.dh-quarry-grid-label{position:absolute;font-family:'IBM Plex Mono',monospace;font-size:8px;\n  letter-spacing:1px;color:rgba(28,18,10,.55);font-weight:700;}\n.dh-pin{position:absolute;transform:translate(-50%,-50%);z-index:3;}\n.dh-pin .marker{width:18px;height:18px;background:var(--dh-clr,var(--dh-blood));\n  border-radius:50% 50% 50% 0;transform:rotate(-45deg);\n  border:2px solid var(--dh-night);\n  box-shadow:0 3px 6px rgba(0,0,0,.5);\n  display:flex;align-items:center;justify-content:center;}\n.dh-pin .marker::after{content:'';width:5px;height:5px;background:var(--dh-bone);border-radius:50%;\n  transform:rotate(45deg);}\n.dh-pin .lbl{position:absolute;top:18px;left:50%;transform:translateX(-50%);white-space:nowrap;\n  font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.6px;\n  color:var(--dh-bone);background:rgba(14,10,6,.85);padding:2px 6px;border-radius:2px;\n  border:1px solid var(--dh-clr,var(--dh-blood));margin-top:4px;}\n.dh-pin.barrel .marker{border-radius:3px;width:20px;height:24px;transform:none;\n  background:repeating-linear-gradient(0deg,var(--dh-oil) 0,var(--dh-oil) 3px,var(--dh-shadow) 3px,var(--dh-shadow) 6px);}\n.dh-pin.barrel .marker::after{display:none;}\n.dh-pin.hole .marker{background:radial-gradient(circle,var(--dh-night) 30%,var(--dh-shadow));\n  border-radius:50%;border-color:var(--dh-blood);transform:none;width:24px;height:24px;}\n.dh-pin.hole .marker::after{display:none;}\n.dh-pin.boulder .marker{background:radial-gradient(circle at 30% 30%,var(--dh-dust),var(--dh-shadow));\n  border-radius:50%;border-color:var(--dh-coal);transform:none;width:22px;height:22px;}\n.dh-pin.boulder .marker::after{display:none;}\n.dh-pin.plane .marker{width:36px;height:14px;background:var(--dh-blood);transform:rotate(12deg);\n  border-radius:6px;border-color:var(--dh-coal);}\n.dh-pin.plane .marker::before{content:'';position:absolute;top:50%;left:0;right:0;\n  height:2px;background:var(--dh-bone);transform:translateY(-50%);}\n.dh-pin.plane .marker::after{display:none;}\n\n.dh-quarry-leg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 12px;margin-top:8px;}\n.dh-leg-i{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;\n  font-size:9px;color:var(--dh-dust);letter-spacing:.4px;}\n.dh-leg-d{width:10px;height:10px;flex-shrink:0;border:1px solid rgba(14,10,6,.6);}\n.dh-leg-d.barrel{background:repeating-linear-gradient(0deg,var(--dh-oil) 0,var(--dh-oil) 2px,var(--dh-shadow) 2px,var(--dh-shadow) 4px);border-radius:1px;}\n.dh-leg-d.hole{background:var(--dh-night);border-radius:50%;border-color:var(--dh-blood);}\n.dh-leg-d.boulder{background:radial-gradient(circle at 30% 30%,var(--dh-dust),var(--dh-shadow));border-radius:50%;}\n.dh-leg-d.plane{background:var(--dh-blood);}\n.dh-leg-d.aj{background:var(--dh-alej);border-radius:50%;}\n.dh-leg-d.ht{background:var(--dh-heat);border-radius:50%;}\n.dh-leg-d.cd{background:var(--dh-cody);border-radius:50%;}\n.dh-leg-d.sr{background:var(--dh-sier);border-radius:50%;}\n\n/* digging tool inventory */\n.dh-tools{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;}\n.dh-tool{padding:12px 10px;border:1.5px solid rgba(213,138,58,.22);background:rgba(14,10,6,.55);\n  border-radius:3px;text-align:center;border-top:4px solid var(--dh-clr,var(--dh-ochre));}\n.dh-tool-rank{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;\n  color:var(--dh-dust);}\n.dh-tool-rank .pos{color:var(--dh-spark);font-weight:700;}\n.dh-tool-who{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:14px;\n  letter-spacing:1.5px;color:var(--dh-clr,var(--dh-ochre));margin-top:4px;text-transform:uppercase;}\n.dh-tool-art{height:54px;display:flex;align-items:center;justify-content:center;margin:8px 0;}\n.dh-tool-art svg{height:100%;width:auto;color:var(--dh-bone);\n  filter:drop-shadow(1px 2px 0 rgba(0,0,0,.5));}\n.dh-tool-name{font-family:'Cutive Mono',monospace;font-size:11.5px;color:var(--dh-bone);}\n.dh-tool-note{font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:var(--dh-dust);\n  margin-top:3px;letter-spacing:.4px;}\n\n/* ═══ FRAME-UP / PHOTO ═══ */\n.dh-photo-frame{margin:14px 0;padding:14px;background:\n  linear-gradient(135deg,rgba(58,93,143,.16),rgba(14,10,6,.6));\n  border:1.5px solid var(--dh-alej);border-radius:4px;}\n.dh-photo-frame .ph-hdr{display:flex;justify-content:space-between;align-items:flex-end;\n  margin-bottom:10px;padding-bottom:8px;border-bottom:1px dashed rgba(58,93,143,.4);}\n.dh-photo-frame .ph-ttl{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:16px;\n  letter-spacing:2px;color:var(--dh-bone);text-transform:uppercase;}\n.dh-photo-frame .ph-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;\n  color:var(--dh-alej);letter-spacing:1.5px;}\n.dh-photo-frame .ph-sub b{color:#f08070;}\n.dh-photo{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;}\n.dh-photo-pane{position:relative;padding:14px 12px;background:\n    repeating-linear-gradient(0deg,rgba(232,196,134,.04) 0,rgba(232,196,134,.04) 2px,transparent 2px,transparent 4px),\n    linear-gradient(135deg,#2a3340,#0e0e14);\n  border:2px solid rgba(232,196,134,.3);border-radius:2px;min-height:130px;}\n.dh-photo-pane .stamp{position:absolute;top:6px;right:8px;font-family:'IBM Plex Mono',monospace;\n  font-size:8px;color:var(--dh-fuse);letter-spacing:1px;}\n.dh-photo-pane .stamp.real{color:#9ad880;}\n.dh-photo-pane .stamp.fake{color:var(--dh-blood);\n  text-shadow:0 0 4px var(--dh-blood);}\n.dh-photo-scene{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px 0 8px;\n  font-family:'Cutive Mono',monospace;font-size:10.5px;color:var(--dh-sand);}\n.dh-photo-scene .figure{display:flex;flex-direction:column;align-items:center;gap:3px;}\n.dh-photo-scene .blob{width:36px;height:18px;border-radius:18px 18px 4px 4px;\n  background:var(--dh-clr,var(--dh-bone));}\n.dh-photo-scene .blob.sleep::after{content:'z';font-family:'Cinzel',serif;font-size:11px;\n  color:var(--dh-sky);position:relative;top:-3px;left:14px;}\n.dh-photo-scene .caption{font-family:'IBM Plex Mono',monospace;font-size:8px;\n  color:var(--dh-dust);letter-spacing:.5px;}\n.dh-photo-vs{font-family:'Rye',serif;font-size:24px;color:var(--dh-fuse);\n  text-shadow:2px 2px 0 var(--dh-coal);}\n.dh-photo-foot{margin-top:10px;font-family:'Cutive Mono',monospace;font-size:11.5px;\n  color:rgba(241,227,196,.78);line-height:1.6;text-align:center;}\n.dh-photo-foot em{color:var(--dh-blood);font-style:normal;font-weight:700;}\n\n/* ═══ MARSHMALLOW CEREMONY ═══ */\n.dh-mallow{margin:14px 0;padding:22px 20px;background:\n  linear-gradient(135deg,rgba(168,40,28,.15),rgba(14,10,6,.6));\n  border:1.5px solid var(--dh-blood);border-radius:4px;text-align:center;}\n.dh-mallow-ttl{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:20px;\n  letter-spacing:3px;color:var(--dh-bone);text-transform:uppercase;}\n.dh-mallow-sub{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--dh-dust);\n  letter-spacing:2px;margin-top:5px;text-transform:uppercase;}\n.dh-mallow-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:22px;}\n.dh-mallow-c{padding:14px 8px 12px;background:rgba(14,10,6,.55);border:1.5px solid rgba(213,138,58,.18);\n  border-radius:3px;position:relative;border-top:4px solid var(--dh-clr,var(--dh-ochre));}\n.dh-mallow-c .av{margin:0 auto 8px;}\n.dh-mallow-c .nm{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:14px;\n  letter-spacing:1.5px;color:var(--dh-bone);}\n.dh-mm{width:24px;height:22px;border-radius:14px 14px 10px 10px;\n  background:radial-gradient(circle at 40% 30%,#fffaeb 0%,var(--dh-bone) 50%,var(--dh-dust) 100%);\n  box-shadow:inset -2px -3px 0 rgba(0,0,0,.18);\n  margin:8px auto 4px;border:1px solid rgba(0,0,0,.2);}\n.dh-mm-row{display:flex;justify-content:center;gap:4px;min-height:30px;}\n.dh-mallow-c .order{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;\n  color:var(--dh-clr,var(--dh-ochre));margin-top:5px;font-weight:600;}\n.dh-mallow-c .votes{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.5px;\n  color:var(--dh-dust);margin-top:6px;padding-top:6px;border-top:1px dashed rgba(213,138,58,.18);}\n.dh-mallow-c .votes b{color:var(--dh-blood);}\n.dh-mallow-c.dq{border-color:var(--dh-blood);border-top-color:var(--dh-blood);background:\n  linear-gradient(180deg,rgba(168,40,28,.2),rgba(14,10,6,.55));}\n.dh-mallow-c.dq .nm{color:var(--dh-blood);}\n.dh-mallow-stamp{position:absolute;top:8px;right:6px;transform:rotate(-12deg);\n  font-family:'Rye',serif;font-size:13px;color:var(--dh-blood);\n  border:2px solid var(--dh-blood);padding:1px 6px;letter-spacing:1px;\n  background:rgba(14,10,6,.6);}\n.dh-mallow-stamp.safe{color:#9ad880;border-color:#9ad880;}\n.dh-mallow-stamp.f3{color:var(--dh-spark);border-color:var(--dh-spark);}\n\n/* ═══ PLANE BOOM PANEL ═══ */\n.dh-boom{margin:14px 0;padding:24px 22px;position:relative;border-radius:5px;overflow:hidden;\n  background:\n    radial-gradient(ellipse at 50% 50%,rgba(255,138,26,.35) 0%,rgba(168,40,28,.2) 35%,rgba(14,10,6,.85) 75%),\n    linear-gradient(135deg,#1a120a,#0e0a06);\n  border:2px solid var(--dh-fuse);\n  box-shadow:0 0 38px rgba(255,138,26,.25),inset 0 0 50px rgba(168,40,28,.3);}\n.dh-boom::before{content:'';position:absolute;inset:0;pointer-events:none;\n  background:\n    radial-gradient(circle at 30% 70%,rgba(255,211,74,.18),transparent 30%),\n    radial-gradient(circle at 70% 30%,rgba(255,138,26,.2),transparent 35%);}\n.dh-boom > *{position:relative;z-index:1;}\n.dh-boom-hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;}\n.dh-boom-ttl{font-family:'Rye',serif;font-size:34px;color:var(--dh-fuse);letter-spacing:2px;\n  text-shadow:3px 3px 0 var(--dh-coal),0 0 12px rgba(255,138,26,.5);}\n.dh-boom-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dh-spark);\n  letter-spacing:2.5px;text-align:right;}\n.dh-boom-body{font-family:'Cutive Mono',monospace;font-size:13px;color:var(--dh-bone);\n  line-height:1.7;}\n.dh-boom-body em{color:var(--dh-fuse);font-style:normal;font-weight:700;}\n.dh-boom-body strong{color:var(--dh-spark);font-weight:800;}\n.dh-boom-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px;}\n.dh-boom-st{padding:10px;border:1px solid rgba(255,138,26,.3);background:rgba(14,10,6,.5);\n  border-radius:2px;}\n.dh-boom-st .k{font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:1.2px;\n  color:var(--dh-fuse);text-transform:uppercase;}\n.dh-boom-st .v{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:18px;\n  color:var(--dh-bone);margin-top:3px;letter-spacing:.6px;}\n.dh-boom-st .v.gone{color:var(--dh-blood);}\n.dh-boom-st .v.spark{color:var(--dh-spark);}\n\n/* ═══ STAMP HEADER ═══ */\n.dh-stamp{display:flex;align-items:center;gap:14px;margin:8px 0 20px;padding:14px 18px;\n  background:linear-gradient(135deg,rgba(213,138,58,.14),rgba(14,10,6,.55));\n  border:1.5px solid rgba(213,138,58,.3);border-radius:4px;\n  border-left:6px solid var(--dh-ochre);}\n.dh-stamp svg{width:40px;height:40px;color:var(--dh-ochre);\n  filter:drop-shadow(0 2px 2px rgba(0,0,0,.5));flex-shrink:0;}\n.dh-stamp .num{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;\n  color:var(--dh-fuse);letter-spacing:3px;}\n.dh-stamp .ttl{font-family:'Rye',serif;font-size:22px;color:var(--dh-bone);\n  letter-spacing:1px;text-shadow:2px 2px 0 var(--dh-rust);}\n.dh-stamp .sub{font-family:'Cutive Mono',monospace;font-size:11.5px;\n  color:var(--dh-dust);margin-left:auto;text-align:right;}\n.dh-stamp-block{display:flex;flex-direction:column;}\n\n/* ═══ DIVIDER ═══ */\n.dh-divider{display:flex;align-items:center;gap:14px;margin:24px 4px;}\n.dh-div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(213,138,58,.45) 20%,rgba(213,138,58,.45) 80%,transparent);}\n.dh-divider svg{width:26px;height:26px;color:var(--dh-dust);opacity:.8;\n  filter:drop-shadow(0 1px 0 rgba(0,0,0,.5));}\n.dh-divider svg.center{width:34px;height:34px;color:var(--dh-fuse);opacity:.95;}\n\n/* ═══ SIDEBAR ═══ */\n.dh-side{position:sticky;top:100px;align-self:start;display:flex;flex-direction:column;gap:14px;\n  max-height:calc(100vh - 120px);overflow-y:auto;scrollbar-width:thin;\n  scrollbar-color:rgba(213,138,58,.3) transparent;padding-right:2px;}\n.dh-side::-webkit-scrollbar{width:5px;}\n.dh-side::-webkit-scrollbar-thumb{background:rgba(213,138,58,.3);border-radius:3px;}\n.dh-box{padding:14px;border:1px solid rgba(213,138,58,.22);border-radius:4px;\n  background:linear-gradient(135deg,rgba(74,46,24,.45),rgba(14,10,6,.6));backdrop-filter:blur(4px);}\n.dh-box-hdr{display:flex;align-items:center;justify-content:space-between;\n  margin-bottom:11px;padding-bottom:8px;border-bottom:1px solid rgba(213,138,58,.18);}\n.dh-box-title{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:14px;\n  letter-spacing:2.5px;color:var(--dh-ochre);text-transform:uppercase;}\n.dh-box-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;\n  color:var(--dh-dust);}\n\n/* progress */\n.dh-progress{display:flex;gap:0;border-radius:3px;overflow:hidden;border:1px solid rgba(213,138,58,.2);}\n.dh-prog-step{flex:1;padding:9px 4px;text-align:center;font-family:'IBM Plex Mono',monospace;\n  font-size:8.5px;letter-spacing:1px;color:rgba(241,227,196,.4);\n  border-right:1px solid rgba(213,138,58,.12);background:rgba(14,10,6,.5);}\n.dh-prog-step:last-child{border-right:none;}\n.dh-prog-step.done{background:rgba(154,216,128,.12);color:#9ad880;}\n.dh-prog-step.now{background:rgba(255,138,26,.18);color:var(--dh-fuse);font-weight:700;\n  box-shadow:inset 0 -2px 0 var(--dh-fuse);}\n.dh-prog-step .n{display:block;font-family:'Big Shoulders Display',sans-serif;font-weight:900;\n  font-size:14px;letter-spacing:0;color:inherit;margin-bottom:2px;}\n\n/* roster sidebar */\n.dh-roster-row{display:grid;grid-template-columns:36px 1fr auto;gap:9px;align-items:center;\n  padding:8px 0;border-bottom:1px solid rgba(213,138,58,.1);}\n.dh-roster-row:last-child{border-bottom:none;}\n.dh-roster-name{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:14px;\n  letter-spacing:1.5px;color:var(--dh-bone);line-height:1.1;}\n.dh-roster-arch{font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.8px;\n  color:var(--dh-dust);text-transform:uppercase;margin-top:2px;}\n.dh-bar-row{display:flex;align-items:center;gap:7px;margin:4px 0 0;}\n.dh-bar-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.8px;\n  color:var(--dh-dust);min-width:30px;}\n.dh-bar-track{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}\n.dh-bar-fill{height:100%;border-radius:3px;}\n.dh-bar-fill.hp{background:linear-gradient(90deg,var(--dh-blood),var(--dh-fuse));}\n.dh-bar-fill.bond{background:linear-gradient(90deg,var(--dh-cody),var(--dh-cake));}\n.dh-bar-fill.trust{background:linear-gradient(90deg,var(--dh-sier),var(--dh-spark));}\n.dh-bar-val{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;min-width:28px;\n  text-align:right;color:var(--dh-bone);}\n.dh-roster-status{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}\n.dh-status-tag{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.8px;\n  padding:2px 6px;border-radius:2px;border:1px solid;text-transform:uppercase;font-weight:600;}\n.dh-st-active{color:#9ad880;border-color:rgba(154,216,128,.4);background:rgba(154,216,128,.08);}\n.dh-st-imm{color:var(--dh-spark);border-color:rgba(255,211,74,.5);background:rgba(255,211,74,.08);}\n.dh-st-dq{color:var(--dh-blood);border-color:rgba(168,40,28,.6);background:rgba(168,40,28,.14);}\n.dh-st-1c{color:var(--dh-cake);border-color:rgba(240,168,184,.4);background:rgba(240,168,184,.08);}\n\n/* alliance web */\n.dh-web{position:relative;height:180px;margin-top:4px;}\n.dh-web-node{position:absolute;width:36px;height:36px;border-radius:50%;\n  background:var(--dh-clr,var(--dh-ochre));display:flex;align-items:center;justify-content:center;\n  font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:13px;color:var(--dh-bone);\n  border:2px solid rgba(14,10,6,.7);transform:translate(-50%,-50%);z-index:3;\n  box-shadow:0 0 0 1px rgba(255,255,255,.06);}\n.dh-web-line{position:absolute;height:2px;transform-origin:left center;z-index:1;}\n.dh-web-line.trust{background:linear-gradient(90deg,rgba(154,216,128,.7),rgba(154,216,128,.3));}\n.dh-web-line.frame{background:repeating-linear-gradient(90deg,rgba(196,50,72,.8) 0,rgba(196,50,72,.8) 4px,transparent 4px,transparent 8px);}\n.dh-web-line.target{background:repeating-linear-gradient(90deg,rgba(168,40,28,.8) 0,rgba(168,40,28,.8) 3px,transparent 3px,transparent 6px);}\n.dh-web-line.bond{background:linear-gradient(90deg,rgba(123,75,168,.8),rgba(240,168,184,.6));\n  box-shadow:0 0 6px rgba(240,168,184,.3);}\n.dh-web-line.thaw{background:linear-gradient(90deg,rgba(196,50,72,.7),rgba(58,93,143,.7));}\n.dh-web-leg{display:flex;flex-wrap:wrap;gap:6px 9px;margin-top:7px;font-size:8.5px;\n  font-family:'IBM Plex Mono',monospace;color:var(--dh-dust);letter-spacing:.4px;}\n.dh-web-leg-i{display:flex;align-items:center;gap:5px;}\n.dh-web-leg-l{width:18px;height:2px;}\n\n/* PLANE HEALTH */\n.dh-plane-box .plane-body{display:flex;align-items:center;gap:10px;margin:6px 0 10px;}\n.dh-plane-body svg{width:90px;height:auto;color:var(--dh-bone);\n  filter:drop-shadow(0 2px 2px rgba(0,0,0,.5));}\n.dh-plane-status{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dh-dust);\n  letter-spacing:.8px;line-height:1.5;}\n.dh-plane-status .doomed{color:var(--dh-blood);font-weight:700;}\n.dh-plane-hp{margin-top:4px;}\n.dh-hpbar{height:8px;background:rgba(14,10,6,.55);border:1px solid rgba(213,138,58,.2);\n  border-radius:2px;overflow:hidden;position:relative;}\n.dh-hpbar-fill{height:100%;background:linear-gradient(90deg,#9ad880 0%,var(--dh-spark) 50%,var(--dh-blood) 90%);\n  transition:width .6s;}\n.dh-hp-row{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;\n  font-size:8.5px;color:var(--dh-dust);letter-spacing:.5px;margin-top:4px;}\n\n/* CAKE COUNTDOWN */\n.dh-cake-box{position:relative;}\n.dh-cake-art{display:flex;justify-content:center;margin:6px 0 10px;}\n.dh-cake-art svg{width:96px;height:auto;\n  filter:drop-shadow(0 2px 2px rgba(0,0,0,.5));}\n.dh-cake-sparks{display:flex;justify-content:center;gap:3px;margin-top:-4px;height:24px;\n  align-items:flex-start;}\n.dh-spark-dot{width:3px;height:3px;background:var(--dh-spark);border-radius:50%;\n  box-shadow:0 0 6px var(--dh-spark),0 0 12px var(--dh-fuse);\n  animation:dh-spark .6s ease-in-out infinite alternate;}\n.dh-spark-dot:nth-child(2){animation-delay:.15s;}\n.dh-spark-dot:nth-child(3){animation-delay:.3s;}\n.dh-spark-dot:nth-child(4){animation-delay:.05s;}\n.dh-spark-dot:nth-child(5){animation-delay:.25s;}\n@keyframes dh-spark{from{transform:translateY(0);opacity:1;}to{transform:translateY(-8px);opacity:.4;}}\n.dh-cake-row{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;\n  font-family:'IBM Plex Mono',monospace;font-size:9.5px;padding:4px 0;\n  border-bottom:1px dashed rgba(213,138,58,.18);}\n.dh-cake-row:last-child{border-bottom:none;}\n.dh-cake-row .k{color:var(--dh-dust);letter-spacing:.5px;}\n.dh-cake-row .v{color:var(--dh-bone);font-weight:700;}\n.dh-cake-row .v.bad{color:var(--dh-blood);}\n.dh-cake-row .v.spark{color:var(--dh-spark);}\n.dh-cake-row .v.pink{color:var(--dh-cake);}\n\n/* VOTE TALLY box */\n.dh-tally-row{display:grid;grid-template-columns:32px 1fr auto;gap:9px;align-items:center;\n  padding:6px 0;border-bottom:1px dashed rgba(213,138,58,.12);}\n.dh-tally-row:last-child{border-bottom:none;}\n.dh-tally-nm{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:13px;\n  letter-spacing:1.5px;color:var(--dh-bone);}\n.dh-tally-marks{display:flex;gap:3px;flex-wrap:wrap;align-items:center;}\n.dh-tally-marks .m{display:block;width:4px;height:18px;background:var(--dh-blood);\n  border-radius:1px;box-shadow:0 0 3px var(--dh-blood);}\n.dh-tally-marks .m.safe{background:#9ad880;box-shadow:0 0 3px #9ad880;}\n.dh-tally-marks .m.spark{background:var(--dh-spark);box-shadow:0 0 3px var(--dh-spark);}\n.dh-tally-count{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:17px;\n  color:var(--dh-blood);min-width:18px;text-align:right;}\n.dh-tally-count.zero{color:var(--dh-dust);}\n\n/* finals strip */\n.dh-final3{display:flex;gap:8px;margin-top:8px;}\n.dh-final3 .seat{flex:1;padding:8px 4px;background:rgba(14,10,6,.5);border:1px solid rgba(255,211,74,.35);\n  border-radius:3px;text-align:center;border-top:3px solid var(--dh-clr,var(--dh-spark));}\n.dh-final3 .av{margin:0 auto 4px;}\n.dh-final3 .nm{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:11px;\n  color:var(--dh-bone);letter-spacing:1px;}\n.dh-final3 .seat.out{opacity:.4;border-top-color:var(--dh-shadow);}\n\n/* WINNER big */\n.dh-winner{margin:20px 0;padding:32px 22px;text-align:center;border-radius:5px;position:relative;\n  background:linear-gradient(135deg,rgba(90,158,62,.18),rgba(14,10,6,.55));\n  border:2px solid var(--dh-sier);overflow:hidden;}\n.dh-winner::before{content:'';position:absolute;inset:-50%;\n  background:conic-gradient(from 0deg,transparent 0deg,rgba(90,158,62,.12) 30deg,transparent 60deg,transparent 180deg,rgba(255,211,74,.12) 210deg,transparent 240deg);\n  animation:dh-rot 10s linear infinite;}\n@keyframes
