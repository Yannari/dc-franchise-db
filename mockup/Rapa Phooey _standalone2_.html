n      <span class=\"rp-card-title\">The Candy Cart · Trust, Sold by the Ounce<\u002Fspan>\n      <span class=\"rp-badge rp-b-bribe\">LEVERAGE<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Alejandro produces an entire <strong>cart of candy<\u002Fstrong> — his African-challenge reward — and offers it to Cody in exchange for <em>\"a favor.\"<\u002Fem> Alejandro himself does not eat sweets <i>(\"they will ruin my body\")<\u002Fi>. Cody, who has not slept in seven nights because of Sierra, accepts the trade approximately four seconds before it is offered.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>CANDY <span class=\"gold\">+1 cart<\u002Fspan><\u002Fspan>\n      <span>LOYALTY <span class=\"pos\">CODY → AJ +2<\u002Fspan><\u002Fspan>\n      <span>VOTE OPTION <span class=\"neu\">deferred<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-conf\" style=\"--rp-clr:var(--rp-heat)\">\n    <div class=\"rp-conf-hdr\"><div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-heat)\">HT<\u002Fdiv><span class=\"rp-conf-name\">HEATHER<\u002Fspan><\u002Fdiv>\n    <div class=\"rp-conf-body\">'Marry somebody you don't have to trick into it, move out of Crazytown, leave Heather alone' is what I <em>would<\u002Fem> have said. But with Alejandro undoing all my hard work on Cody, <strong>Mrs. Crazytown<\u002Fstrong> is my only option. So… do not judge me.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"alliance\" style=\"--rp-clr:var(--rp-heat)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-heat)\">HT<\u002Fdiv>\n      <div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-sier)\">SR<\u002Fdiv>\n      <span class=\"rp-card-title\">Heather Pitches Sierra — \"Girls Stick Together\"<\u002Fspan>\n      <span class=\"rp-badge rp-b-alliance\">RECRUITING<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      In economy, Heather warns Sierra that Alejandro is <em>trying to destroy her marriage to Cody.<\u002Fem> Sierra laughs — she does not believe Heather actually wants Alejandro voted out — but accepts the framing anyway. Pitch lands soft. Alliance is technically open.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>READ <span class=\"neu\">SIERRA — skeptical, hopeful<\u002Fspan><\u002Fspan>\n      <span>TARGET <span class=\"neg\">→ ALEJANDRO<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-conf\" style=\"--rp-clr:var(--rp-sier)\">\n    <div class=\"rp-conf-hdr\"><div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-sier)\">SR<\u002Fdiv><span class=\"rp-conf-name\">SIERRA<\u002Fspan><\u002Fdiv>\n    <div class=\"rp-conf-body\">Heather always stays in this game way longer than you'd expect, and I've studied this show long enough to know — <em>alliances never last<\u002Fem>. So I'm open to all offers. But I'll never make the mistake of staying loyal to anyone long term, <strong>except my sugar-frosted Cody-O<\u002Fstrong>.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"hazard\">\n    <div class=\"rp-card-hdr\">\n      <span class=\"rp-card-title\">Landing — Plane vs. Moai Head<\u002Fspan>\n      <span class=\"rp-card-time\">⏱  0631 · APPROACH RAPA NUI<\u002Fspan>\n      <span class=\"rp-badge rp-b-hazard\">PROPERTY DAMAGE<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Pilot and co-pilot fight over the yoke. Jet shears into the <strong>nose of an Easter Island moai.<\u002Fstrong> Alejandro disembarks, gestures gravely at the rubble: <em>\"Another piece of world heritage — destroyed.\"<\u002Fem> Heather notes, dryly, that the moai is not the only chiseled rock getting destroyed today. She corrects \"chiseled\" to <i>\"grizzled.\"<\u002Fi> Alejandro takes the original as a compliment.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>UNESCO STATUS <span class=\"neg\">downgraded<\u002Fspan><\u002Fspan>\n      <span>SUBTEXT <span class=\"gold\">flirt, retracted<\u002Fspan><\u002Fspan>\n      <span>CODY <span class=\"neu\">covered in taffy<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<!-- ─── EGG HUNT ─── -->\n<div class=\"rp-phase\" id=\"phase-hunt\">\n  <div class=\"rp-stamp\">\n    <svg class=\"rp-stamp-g\"><use href=\"#g-egg\"><\u002Fuse><\u002Fsvg>\n    <span class=\"num\">PHASE 01<\u002Fspan>\n    <span class=\"ttl\">Egg Hunt · The Cave<\u002Fspan>\n    <span class=\"sub\">12 eggs · 8 carved heads · 1 condor<\u002Fspan>\n    <svg class=\"rp-stamp-g\"><use href=\"#g-moai\"><\u002Fuse><\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"rp-card\" data-type=\"host\">\n    <div class=\"rp-card-hdr\">\n      <span class=\"rp-card-title\">Challenge Brief · Three Eggs, One Color<\u002Fspan>\n      <span class=\"rp-badge rp-b-host\">CHALLENGE 01<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-quote\">\n      <span class=\"mark\">\"<\u002Fspan>\n      <div class=\"text\">Match the egg to your headset feather. Three eggs each. Then through the cave, up the pillar, into the nest. <em>Try not to die. Or do — ratings are ratings.<\u002Fem>\n      <span class=\"who\">— HOST · BRIEFING<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"egg\">\n    <div class=\"rp-card-hdr\">\n      <span class=\"rp-card-title\">The Carved Heads — Eight Eliminated, One Egg Each<\u002Fspan>\n      <span class=\"rp-badge rp-b-host\">ARENA<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      The rocks holding the eggs are carved to <em>resemble the heads of previously eliminated contestants.<\u002Fem> Memorial as scavenger hunt. Below: known egg locations and current status.\n    <\u002Fdiv>\n    <div class=\"rp-heads\">\n      <div class=\"rp-head\">\n        <div class=\"moai\"><svg viewBox=\"0 0 60 84\"><use href=\"#g-moai-big\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">LINDSAY<\u002Fdiv>\n        <div class=\"eggs\"><span class=\"e egg empty\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ghoul\">ø<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-head\">\n        <div class=\"moai\"><svg viewBox=\"0 0 60 84\"><use href=\"#g-moai-big\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">EZEKIEL<\u002Fdiv>\n        <div class=\"eggs\"><span class=\"egg\" style=\"--rp-egg-c:var(--rp-egg-blue)\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ghoul\" style=\"color:var(--rp-egg-blue)\">AJ<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-head\">\n        <div class=\"moai\"><svg viewBox=\"0 0 60 84\"><use href=\"#g-moai-big\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">COURTNEY<\u002Fdiv>\n        <div class=\"eggs\"><span class=\"egg\" style=\"--rp-egg-c:var(--rp-egg-red)\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ghoul\" style=\"color:var(--rp-egg-red)\">HT<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-head\">\n        <div class=\"moai\"><svg viewBox=\"0 0 60 84\"><use href=\"#g-moai-big\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">DUNCAN<\u002Fdiv>\n        <div class=\"eggs\"><span class=\"egg\" style=\"--rp-egg-c:var(--rp-egg-purple)\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ghoul\" style=\"color:var(--rp-egg-purple)\">CD<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-head\">\n        <div class=\"moai\"><svg viewBox=\"0 0 60 84\"><use href=\"#g-moai-big\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">LESHAWNA<\u002Fdiv>\n        <div class=\"eggs\"><span class=\"egg\" style=\"--rp-egg-c:var(--rp-egg-red)\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ghoul\" style=\"color:var(--rp-egg-red)\">HT<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-head\">\n        <div class=\"moai\"><svg viewBox=\"0 0 60 84\"><use href=\"#g-moai-big\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">UNKNOWN<\u002Fdiv>\n        <div class=\"eggs\"><span class=\"egg\" style=\"--rp-egg-c:var(--rp-egg-green)\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ghoul\" style=\"color:var(--rp-egg-green)\">SR×n<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-head condor\">\n        <div class=\"moai\"><svg viewBox=\"0 0 60 84\"><use href=\"#g-moai-big\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\" style=\"color:var(--rp-coral)\">CONDOR NEST<\u002Fdiv>\n        <div class=\"eggs\"><span class=\"egg\" style=\"--rp-egg-c:#5a3a20\"><\u002Fspan><span class=\"egg\" style=\"--rp-egg-c:#5a3a20\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ghoul\">!!<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-head\">\n        <div class=\"moai\"><svg viewBox=\"0 0 60 84\"><use href=\"#g-moai-big\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">CHEF (RUBBLE)<\u002Fdiv>\n        <div class=\"eggs\"><span class=\"e egg empty\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ghoul\">BLOCKER<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"egg\" style=\"--rp-clr:var(--rp-egg-blue)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-alej)\">AJ<\u002Fdiv>\n      <span class=\"rp-card-title\">Alejandro · Lindsay Head, Empty<\u002Fspan>\n      <span class=\"rp-card-time\">⏱  +00:18<\u002Fspan>\n      <span class=\"rp-badge rp-b-alej\">BLUE TEAM<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Alejandro climbs onto Lindsay's carved head. Finds nothing. Moments later — across the field — <strong>Sierra<\u002Fstrong> locates a blue egg inside <em>Ezekiel<\u002Fem>'s head and <i>spikes it into the dirt on purpose<\u002Fi> for the crime of ruining her marriage. Alejandro picks splinters out of his teeth.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>EGGS <span class=\"neg\">0/3<\u002Fspan><\u002Fspan>\n      <span>GRUDGE TRACK <span class=\"neu\">SIERRA → AJ +3<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"egg\" style=\"--rp-clr:var(--rp-egg-red)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-heat)\">HT<\u002Fdiv>\n      <span class=\"rp-card-title\">Heather · \"Useful For Something\" — Courtney's Head<\u002Fspan>\n      <span class=\"rp-badge rp-b-heat\">RED TEAM<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Heather digs into <strong>Courtney<\u002Fstrong>'s head and pulls out a red egg. Murmurs, in passing: <em>\"She is useful for something.\"<\u002Fem> Catalogs the second egg from Leshawna's rock minutes later, drops it, complains operatically. <strong>Sierra<\u002Fstrong> appears from nowhere and <i>weaves her a basket out of grass.<\u002Fi> Heather, who did not know what to do with this, accepts.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>EGGS <span class=\"pos\">2/3<\u002Fspan><\u002Fspan>\n      <span>BASKET <span class=\"gold\">DONATED · SIERRA<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"egg\" style=\"--rp-clr:var(--rp-egg-purple)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av candied\" style=\"--rp-clr:var(--rp-cody)\">CD<\u002Fdiv>\n      <span class=\"rp-card-title\">Cody · The \"Gwen-Stealer\" Kick<\u002Fspan>\n      <span class=\"rp-badge rp-b-cody\">PURPLE TEAM<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Cody kicks <strong>Duncan<\u002Fstrong>'s carved head. Calls him a <em>\"Gwen-stealer.\"<\u002Fem> A purple egg dislodges from the nose. Cody is using a basket made of candy wrappers. Sierra silently adds another purple egg to it, in the way one feeds a partner who can't be trusted to feed himself.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>EGGS <span class=\"pos\">2/3 (1 self · 1 gift)<\u002Fspan><\u002Fspan>\n      <span>BASKET <span class=\"gold\">CANDY WRAPPER<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"egg\" style=\"--rp-clr:var(--rp-egg-green)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-sier)\">SR<\u002Fdiv>\n      <span class=\"rp-card-title\">Sierra · Six Eggs, One Family<\u002Fspan>\n      <span class=\"rp-badge rp-b-sier\">GREEN TEAM<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Sierra weaves her own grass basket. Finds her three eggs in roughly the time it takes most people to introduce themselves. Then keeps going. Then keeps helping. By the count, Sierra has located <strong>her three, Cody's second, plus a basket for Heather.<\u002Fstrong> She pinches Cody's cheek. <em>\"We're parents to six little chicks. Finally, we're a family.\"<\u002Fem>\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>EGGS <span class=\"pos\">3/3 + assists<\u002Fspan><\u002Fspan>\n      <span>RELATIONSHIP STATUS <span class=\"neu\">FAMILY (unilateral)<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-conf\" style=\"--rp-clr:var(--rp-cody)\">\n    <div class=\"rp-conf-hdr\"><div class=\"rp-av sm candied\" style=\"--rp-clr:var(--rp-cody)\">CD<\u002Fdiv><span class=\"rp-conf-name\">CODY<\u002Fspan><\u002Fdiv>\n    <div class=\"rp-conf-body\">Sierra totally saved my bacon in the Serengeti. I owe her to at least be nice. And if she insists on handing me a million dollars — heh, <em>who am I to stop her?<\u002Fem><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"bribe\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-alej)\">AJ<\u002Fdiv>\n      <div class=\"rp-av candied sm\" style=\"--rp-clr:var(--rp-cody)\">CD<\u002Fdiv>\n      <span class=\"rp-card-title\">Alejandro Asks To Share The Candy Basket<\u002Fspan>\n      <span class=\"rp-badge rp-b-bribe\">DOUBLE-DOWN<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Alejandro spots Cody's candy-wrapper basket and politely asks for room. Sierra <em>detects the threat to her egg-family<\u002Fem>. Alejandro counters by producing more candy. Cody, who has eaten his weight in taffy, makes a sound that is technically a yes.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>LOYALTY <span class=\"neu\">CODY ⇄ stretched<\u002Fspan><\u002Fspan>\n      <span>FAMILY UNIT <span class=\"neg\">destabilizing<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"hazard\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av dazed sm\" style=\"--rp-clr:var(--rp-alej)\">AJ<\u002Fdiv>\n      <div class=\"rp-av candied sm\" style=\"--rp-clr:var(--rp-cody)\">CD<\u002Fdiv>\n      <span class=\"rp-card-title\">Cave · Boulder · Wrong Eggs<\u002Fspan>\n      <span class=\"rp-card-time\">⏱  +14:02 · UNDERGROUND<\u002Fspan>\n      <span class=\"rp-badge rp-b-hazard\">INDIANA JONES<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Boys see a boulder. <strong>Cody<\u002Fstrong> flees to a corner. <strong>Alejandro<\u002Fstrong>, holding the eggs, gets squashed flat — eggs included. They lose one each. They turn around. They <em>also<\u002Fem> realize they are holding <strong>condor eggs<\u002Fstrong>. Behind them: a father bird who would like a word.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>LOSS <span class=\"neg\">−1 egg each<\u002Fspan><\u002Fspan>\n      <span>NEW PROBLEM <span class=\"neg\">PARENTAGE QUESTION<\u002Fspan><\u002Fspan>\n      <span>EXIT <span class=\"neu\">backtrack · pursued<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"alliance\" style=\"--rp-clr:var(--rp-heat)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-heat)\">HT<\u002Fdiv>\n      <div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-sier)\">SR<\u002Fdiv>\n      <span class=\"rp-card-title\">Cave Pact · Vote Alejandro Out — Worst Case Tie<\u002Fspan>\n      <span class=\"rp-badge rp-b-alliance\">SEALED · 2-WAY<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Walking through the cave together, Heather and Sierra agree: at the next elimination, both vote <strong>Alejandro<\u002Fstrong>. Worst case is a tie; best case is Alejandro on a plane home. <em>Sierra has, briefly, an alliance.<\u002Fem>\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>TARGET <span class=\"neg\">→ ALEJANDRO<\u002Fspan><\u002Fspan>\n      <span>FLOOR <span class=\"neu\">TIE<\u002Fspan><\u002Fspan>\n      <span>CEILING <span class=\"pos\">AJ OUT<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"egg\" style=\"--rp-clr:var(--rp-chick)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-cjr)\">CJ<\u002Fdiv>\n      <span class=\"rp-card-title\">Cody Jr. Hatches — Imprints On The Wrong Mother<\u002Fspan>\n      <span class=\"rp-card-time\">⏱  +17:50<\u002Fspan>\n      <span class=\"rp-badge rp-b-bribe\">HATCH<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      One of Sierra's green eggs cracks open. Out steps a bird chick with <strong>a striking resemblance to Cody.<\u002Fstrong> Named <em>Cody Jr.<\u002Fem> on contact. Cody Jr. takes one look at <strong>Heather<\u002Fstrong>, calls her <i>\"Auntie,\"<\u002Fi> and nests permanently on her head. Heather is opposed to this development on every available axis.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>BOND <span class=\"pos\">CJ → HEATHER (involuntary)<\u002Fspan><\u002Fspan>\n      <span>SIERRA <span class=\"neu\">tolerates · for now<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"hazard\">\n    <div class=\"rp-card-hdr\">\n      <span class=\"rp-card-title\">Exit Order · The Blocker Saves Everyone<\u002Fspan>\n      <span class=\"rp-card-time\">⏱  +21:33<\u002Fspan>\n      <span class=\"rp-badge rp-b-hazard\">PURSUIT<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Contestants emerge from the cave in order: <strong>Alejandro<\u002Fstrong>, <strong>Cody<\u002Fstrong>, <strong>Sierra<\u002Fstrong>, <strong>Heather<\u002Fstrong>. The father condor is bearing down — and is stopped, at the last possible second, by <em>a giant carved Chef rock<\u002Fem> blocking the cave mouth. The rock has been carved with such a sour facial expression that even the bird hesitates.\n    <\u002Fdiv>\n    <div class=\"rp-traj\">\n      <div class=\"rp-traj-arc\" style=\"left:4%;top:30%;width:60%;transform:rotate(8deg);\"><\u002Fdiv>\n      <div class=\"rp-traj-pin\" style=\"left:4%;top:30%;background:rgba(232,118,84,.4);border-color:var(--rp-coral);\"><\u002Fdiv>\n      <div class=\"rp-traj-pin\" style=\"left:62%;top:38%;border-color:var(--rp-volcanic);background:var(--rp-volcanic);\"><\u002Fdiv>\n      <div class=\"rp-traj-lbl\" style=\"left:4%;top:8%;\">FATHER CONDOR · INBOUND<\u002Fdiv>\n      <div class=\"rp-traj-lbl\" style=\"right:6%;bottom:8%;color:var(--rp-volcanic);\">→ CHEF ROCK · IMPACT BLOCKER<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>EXIT POSITION <span class=\"neu\">AJ · CD · SR · HT<\u002Fspan><\u002Fspan>\n      <span>ADVANTAGE <span class=\"gold\">ALEJANDRO (catcher's mask)<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<!-- ─── PILLAR ─── -->\n<div class=\"rp-phase\" id=\"phase-pillar\">\n  <div class=\"rp-stamp\">\n    <svg class=\"rp-stamp-g\"><use href=\"#g-bird\"><\u002Fuse><\u002Fsvg>\n    <span class=\"num\">PHASE 02<\u002Fspan>\n    <span class=\"ttl\">Pillar Climb · The Nest<\u002Fspan>\n    <span class=\"sub\">30m vertical · mother condor · ½-team distracted<\u002Fspan>\n    <svg class=\"rp-stamp-g\"><use href=\"#g-spiral\"><\u002Fuse><\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"rp-card\" data-type=\"host\">\n    <div class=\"rp-card-hdr\">\n      <span class=\"rp-card-title\">Pillar Climb · The Nest Above<\u002Fspan>\n      <span class=\"rp-badge rp-b-host\">CHALLENGE 02<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-quote\">\n      <span class=\"mark\">\"<\u002Fspan>\n      <div class=\"text\">Climb the pillar. Return three eggs to the nest. Mother condor is up there. <em>She is two Alejandros wide.<\u002Fem> First out gets a catcher's mask. Everyone else gets — well — Tuesday.\n      <span class=\"who\">— HOST · BRIEFING 02<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-altitude\">\n    <div class=\"rp-alt-y\">\n      <div class=\"rp-alt-pillar\">\n        <div class=\"rp-alt-nest\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rp-alt-track\">\n      <div class=\"rp-alt-tick\">NEST · 30 m<\u002Fdiv>\n      <div class=\"rp-alt-row\">\n        <span class=\"rp-alt-marker\" style=\"--rp-clr:var(--rp-egg-red)\">HT — 3/3 IN<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"rp-alt-row\">\n        <span class=\"rp-alt-marker\" style=\"--rp-clr:var(--rp-egg-blue)\">AJ — 2/3 IN, 1 SMASHED<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"rp-alt-row\">\n        <span class=\"rp-alt-marker\" style=\"--rp-clr:var(--rp-egg-green)\">SR — 1/3 IN · DISTRACTED<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"rp-alt-row\">\n        <span class=\"rp-alt-marker\" style=\"--rp-clr:var(--rp-egg-purple)\">CD — 0/3 IN · INTACT<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"rp-alt-tick\">GROUND · 0 m<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"egg\" style=\"--rp-clr:var(--rp-egg-blue)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-alej)\">AJ<\u002Fdiv>\n      <span class=\"rp-card-title\">Alejandro · Mask + Two-of-Three<\u002Fspan>\n      <span class=\"rp-badge rp-b-alej\">FIRST UP<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Catcher's mask issued. Singing intensifies (<em>\"Condor… condor…\"<\u002Fem>). Alejandro lands <strong>two of three<\u002Fstrong> eggs in the nest. The third cracks on the ground beside him. <em>Smiles anyway.<\u002Fem> Smiles always.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>NEST DEPOSIT <span class=\"pos\">2 / 3<\u002Fspan><\u002Fspan>\n      <span>EYE PROTECTION <span class=\"gold\">ISSUED<\u002Fspan><\u002Fspan>\n      <span>TALON DAMAGE <span class=\"neu\">cosmetic<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"egg\" style=\"--rp-clr:var(--rp-egg-purple)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av candied\" style=\"--rp-clr:var(--rp-cody)\">CD<\u002Fdiv>\n      <span class=\"rp-card-title\">Cody · Zero In · Basket Saves Him<\u002Fspan>\n      <span class=\"rp-badge rp-b-cody\">RUNNER-UP<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Cody climbs. Cody fumbles. <em>Zero<\u002Fem> eggs make it into the nest — but the <strong>candy-wrapper basket<\u002Fstrong> Sierra-supplied protects all three eggs from breaking. He gets a second attempt after the girls go.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>NEST <span class=\"neg\">0 / 3<\u002Fspan><\u002Fspan>\n      <span>EGGS INTACT <span class=\"pos\">3 / 3<\u002Fspan><\u002Fspan>\n      <span>QUEUE <span class=\"neu\">RE-ATTEMPT PENDING<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"egg\" style=\"--rp-clr:var(--rp-egg-green)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-sier)\">SR<\u002Fdiv>\n      <div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-cjr)\">CJ<\u002Fdiv>\n      <span class=\"rp-card-title\">Sierra · One Egg, Then Cody Jr. Goes Walkabout<\u002Fspan>\n      <span class=\"rp-badge rp-b-sier\">DISTRACTED<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Sierra lands her first egg cleanly. Pauses to watch <strong>Cody Jr.<\u002Fstrong> climb determinedly toward <em>\"Auntie Heather\"<\u002Fem>. Maternal pride. Cataclysmic strategic error. Sierra never returns to the climb.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>NEST <span class=\"neu\">1 / 3<\u002Fspan><\u002Fspan>\n      <span>DISTRACTION VECTOR <span class=\"neg\">CODY JR. → HT<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"egg\" style=\"--rp-clr:var(--rp-egg-red)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-heat)\">HT<\u002Fdiv>\n      <span class=\"rp-card-title\">Heather · Clean Sweep · 3/3 In The Nest<\u002Fspan>\n      <span class=\"rp-card-time\">⏱  +08:14 ABOVE GROUND<\u002Fspan>\n      <span class=\"rp-badge rp-b-heat\">WIN<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Mother condor flies off — chasing <em>Cody Jr.<\u002Fem> Heather, suddenly unmolested, drops all three red eggs into the nest. Cody Jr. immediately flies back. The mother condor returns furious, lifts <strong>Heather<\u002Fstrong> off the pillar, and flings her toward the ground in a wide, embarrassing arc.\n    <\u002Fdiv>\n    <div class=\"rp-traj\">\n      <div class=\"rp-traj-arc\" style=\"left:4%;top:14%;width:70%;transform:rotate(20deg);\"><\u002Fdiv>\n      <div class=\"rp-traj-pin\" style=\"left:4%;top:14%;border-color:var(--rp-egg-red);\"><\u002Fdiv>\n      <div class=\"rp-traj-pin\" style=\"left:74%;top:64%;border-color:var(--rp-coral);\"><\u002Fdiv>\n      <div class=\"rp-traj-lbl\" style=\"left:4%;top:60%;color:var(--rp-egg-red);\">HT @ NEST · 30M<\u002Fdiv>\n      <div class=\"rp-traj-lbl\" style=\"right:6%;top:24%;color:var(--rp-coral);\">→ FLUNG · GROUND IMPACT<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>NEST <span class=\"pos\">3 / 3 ✓<\u002Fspan><\u002Fspan>\n      <span>FLIGHT TIME <span class=\"neg\">~2.1s<\u002Fspan><\u002Fspan>\n      <span>COLLATERAL <span class=\"neg\">moai dominoes — all heads down<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-divider\">\n    <span class=\"rp-div-line\"><\u002Fspan>\n    <svg><use href=\"#g-fish\"><\u002Fuse><\u002Fsvg>\n    <svg><use href=\"#g-wave\"><\u002Fuse><\u002Fsvg>\n    <svg class=\"center\"><use href=\"#g-sun\"><\u002Fuse><\u002Fsvg>\n    <svg><use href=\"#g-wave\"><\u002Fuse><\u002Fsvg>\n    <svg><use href=\"#g-fish\"><\u002Fuse><\u002Fsvg>\n    <span class=\"rp-div-line\"><\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"rp-winner\">\n    <div class=\"tag\">EGG HUNT · CHALLENGE WIN<\u002Fdiv>\n    <div class=\"nm\">HEATHER<\u002Fdiv>\n    <div class=\"sub\">Three eggs delivered · Cody Jr. unharmed · pillar survived (barely)<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-conf\" style=\"--rp-clr:var(--rp-heat)\">\n    <div class=\"rp-conf-hdr\"><div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-heat)\">HT<\u002Fdiv><span class=\"rp-conf-name\">HEATHER<\u002Fspan><\u002Fdiv>\n    <div class=\"rp-conf-body\">One Alejandro is quite enough. Although, with two — <em>maybe one would be nice and not try to defeat me all the time.<\u002Fem><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<!-- ─── BARF BAG / VOTE ─── -->\n<div class=\"rp-phase\" id=\"phase-vote\">\n  <div class=\"rp-stamp\">\n    <svg class=\"rp-stamp-g\"><use href=\"#g-hand\"><\u002Fuse><\u002Fsvg>\n    <span class=\"num\">PHASE 03<\u002Fspan>\n    <span class=\"ttl\">Barf Bag Ceremony<\u002Fspan>\n    <span class=\"sub\">3 voters · 4 ballots · 1 twist<\u002Fspan>\n    <svg class=\"rp-stamp-g\"><use href=\"#g-diamond\"><\u002Fuse><\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"rp-card\" data-type=\"host\">\n    <div class=\"rp-card-hdr\">\n      <span class=\"rp-card-title\">Barf-Bag Ceremony · Three of Four Vote<\u002Fspan>\n      <span class=\"rp-badge rp-b-host\">CEREMONY OPEN<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-quote\">\n      <span class=\"mark\">\"<\u002Fspan>\n      <div class=\"text\">Drop your barf bags. Whoever's holding no bag holds a plane ticket. <em>Whoever's holding too many bags — well — Drumheller awaits.<\u002Fem>\n      <span class=\"who\">— HOST · BARF BAG<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-vote-box\">\n    <div class=\"rp-card-hdr\" style=\"margin-bottom:0;\">\n      <span class=\"rp-card-title\" style=\"color:var(--rp-coral)\">Vote Tally · 4 Ballots Cast<\u002Fspan>\n      <span class=\"rp-badge rp-b-vote\">PLURALITY<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-vote-grid\">\n      <div class=\"rp-vote-col\" style=\"--rp-clr:var(--rp-alej)\">\n        <div class=\"rp-av lg\" style=\"--rp-clr:var(--rp-alej)\">AJ<\u002Fdiv>\n        <div class=\"who\">ALEJANDRO<\u002Fdiv>\n        <div class=\"rp-vote-tally\">×1<\u002Fdiv>\n        <div class=\"rp-vote-bars\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"rp-vote-flag\">CAST BY · SIERRA<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-vote-col\" style=\"--rp-clr:var(--rp-heat)\">\n        <div class=\"rp-av lg\" style=\"--rp-clr:var(--rp-heat)\">HT<\u002Fdiv>\n        <div class=\"who\">HEATHER<\u002Fdiv>\n        <div class=\"rp-vote-tally\" style=\"color:var(--rp-tide)\">×0<\u002Fdiv>\n        <div class=\"rp-vote-flag\" style=\"color:var(--rp-chick)\">★ CHALLENGE WIN<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-vote-col\" style=\"--rp-clr:var(--rp-cody)\">\n        <div class=\"rp-av lg candied\" style=\"--rp-clr:var(--rp-cody)\">CD<\u002Fdiv>\n        <div class=\"who\">CODY<\u002Fdiv>\n        <div class=\"rp-vote-tally\" style=\"color:var(--rp-tide)\">×0<\u002Fdiv>\n        <div class=\"rp-vote-flag\">SUGAR ABSTAIN<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rp-vote-col\" style=\"--rp-clr:var(--rp-sier)\">\n        <div class=\"rp-av lg\" style=\"--rp-clr:var(--rp-sier)\">SR<\u002Fdiv>\n        <div class=\"who\">SIERRA<\u002Fdiv>\n        <div class=\"rp-vote-tally\">×3<\u002Fdiv>\n        <div class=\"rp-vote-bars\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n        <div class=\"rp-vote-flag\" style=\"color:var(--rp-coral)\">AJ · HT · CD<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"vote\" style=\"--rp-clr:var(--rp-sier)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av out\" style=\"--rp-clr:var(--rp-sier)\">SR<\u002Fdiv>\n      <span class=\"rp-card-title\">Sierra — Three Votes · Eliminated… ?<\u002Fspan>\n      <span class=\"rp-badge rp-b-vote\">EXIT<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Alejandro takes one bag (Sierra's only ally voting on principle). <strong>Sierra<\u002Fstrong> takes three — and the look that comes with them. She begins her farewell. She has rehearsed it. She has, in fact, <em>filmed<\u002Fem> it. Twice.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>FINISH POSITION <span class=\"neg\">4th<\u002Fspan><\u002Fspan>\n      <span>FAREWELL <span class=\"neu\">pre-recorded<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-conf\" style=\"--rp-clr:var(--rp-heat)\">\n    <div class=\"rp-conf-hdr\"><div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-heat)\">HT<\u002Fdiv><span class=\"rp-conf-name\">HEATHER<\u002Fspan><\u002Fdiv>\n    <div class=\"rp-conf-body\">Sure, Sierra and I are both girls. But all we have in common is that we both wear bras and mascara — <em>some of us better than others.<\u002Fem> Ultimately, Cody is a much better ally. Reason number one — <strong>he's sane.<\u002Fstrong><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-conf\" style=\"--rp-clr:var(--rp-cody)\">\n    <div class=\"rp-conf-hdr\"><div class=\"rp-av sm candied\" style=\"--rp-clr:var(--rp-cody)\">CD<\u002Fdiv><span class=\"rp-conf-name\">CODY<\u002Fspan><\u002Fdiv>\n    <div class=\"rp-conf-body\">It was nice of Sierra to help me. I owe her my life. But I just caught her basket-weaving a <em>bird's nest out of my spare underpants.<\u002Fem> <strong>It has to end.<\u002Fstrong><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"twist\">\n    <div class=\"rp-card-hdr\">\n      <span class=\"rp-card-title\">★ TWIST · It Was A Reward Challenge All Along<\u002Fspan>\n      <span class=\"rp-badge rp-b-twist\">REVEAL<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      As Sierra walks her farewell, the host stops her: <em>\"It was a reward challenge.\"<\u002Fem> <strong>Sierra is safe.<\u002Fstrong> All three votes are cosmetic. <em>Heather's face is its own three-act tragedy.<\u002Fem> The challenge winner now selects a <strong>first-class plus-one<\u002Fstrong>.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>EFFECT <span class=\"pos\">NO ELIMINATION<\u002Fspan><\u002Fspan>\n      <span>HEATHER'S WIN <span class=\"gold\">→ FIRST-CLASS PICK<\u002Fspan><\u002Fspan>\n      <span>SIERRA <span class=\"pos\">SAFE · economy<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<!-- ─── FIRST CLASS ─── -->\n<div class=\"rp-phase\" id=\"phase-first\">\n  <div class=\"rp-stamp\">\n    <svg class=\"rp-stamp-g\"><use href=\"#g-sun\"><\u002Fuse><\u002Fsvg>\n    <span class=\"num\">PHASE 04<\u002Fspan>\n    <span class=\"ttl\">First Class · The Plus-One<\u002Fspan>\n    <span class=\"sub\">Winner's pick · cabin partition closed<\u002Fspan>\n    <svg class=\"rp-stamp-g\"><use href=\"#g-wave\"><\u002Fuse><\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"rp-card\" data-type=\"host\">\n    <div class=\"rp-card-hdr\">\n      <span class=\"rp-card-title\">First-Class Pick · Heather's Choice<\u002Fspan>\n      <span class=\"rp-badge rp-b-host\">DECISION<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-quote\">\n      <span class=\"mark\">\"<\u002Fspan>\n      <div class=\"text\">Pick your plus-one for first class. Pick the obvious. Pick the loyal one. <em>Pick anyone but the man whose face you keep checking.<\u002Fem>\n      <span class=\"who\">— HOST · CHOICE<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"alliance\" style=\"--rp-clr:var(--rp-alej)\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-heat)\">HT<\u002Fdiv>\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-alej)\">AJ<\u002Fdiv>\n      <span class=\"rp-card-title\">Heather Picks Alejandro · Leaves Cody for Sierra<\u002Fspan>\n      <span class=\"rp-badge rp-b-twist\">UNEXPECTED<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Heather chooses <strong>Alejandro<\u002Fstrong>. Her stated reason: <em>\"so Sierra and Cody can be together for the night.\"<\u002Fem> Stated. Alejandro thanks her. Heather <strong>blushes<\u002Fstrong>. The cabin door closes on the only person who would have noticed.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>FIRST CLASS <span class=\"gold\">HEATHER + ALEJANDRO<\u002Fspan><\u002Fspan>\n      <span>ECONOMY <span class=\"neu\">SIERRA + CODY<\u002Fspan><\u002Fspan>\n      <span>SUBTEXT <span class=\"neg\">SCREAMING<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-conf\" style=\"--rp-clr:var(--rp-alej)\">\n    <div class=\"rp-conf-hdr\"><div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-alej)\">AJ<\u002Fdiv><span class=\"rp-conf-name\">ALEJANDRO<\u002Fspan><\u002Fdiv>\n    <div class=\"rp-conf-body\">Reward, plus-one, <em>a blush.<\u002Fem> Done, done, and — <strong>oh, so close<\u002Fstrong> — I can taste it.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"bribe\">\n    <div class=\"rp-card-hdr\">\n      <div class=\"rp-av\" style=\"--rp-clr:var(--rp-sier)\">SR<\u002Fdiv>\n      <div class=\"rp-av candied\" style=\"--rp-clr:var(--rp-cody)\">CD<\u002Fdiv>\n      <div class=\"rp-av sm\" style=\"--rp-clr:var(--rp-cjr)\">CJ<\u002Fdiv>\n      <span class=\"rp-card-title\">Economy Class · Sierra + Cody + Hatchling<\u002Fspan>\n      <span class=\"rp-badge rp-b-bribe\">FAMILY<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Sierra hugs Cody so hard a candy wrapper falls out of his hair. Cody Jr. perches on the seat-back, eyeing the in-flight magazine. <em>The plane levels off.<\u002Fem> Final three is still a long way away — but for one night, this corner of economy is a working nuclear family.\n    <\u002Fdiv>\n    <div class=\"rp-card-meta\">\n      <span>SLEEP QUALITY <span class=\"neg\">CODY · 0 hrs projected<\u002Fspan><\u002Fspan>\n      <span>HATCHLING <span class=\"gold\">ABOARD<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-card\" data-type=\"host\">\n    <div class=\"rp-card-hdr\">\n      <span class=\"rp-card-title\">Next Episode · \"Awwwwww, Drumheller\"<\u002Fspan>\n      <span class=\"rp-badge rp-b-host\">PREVIEW<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-card-body\">\n      Final Four → Final Three. Heather has invited Alejandro to first class — and is now stuck with him until landing. <em>Drumheller is, apparently, a place. Bring boots.<\u002Fem>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n<!-- ════════════ END MAIN ════════════ -->\n\n\n<!-- ════════════ SIDEBAR ════════════ -->\n<div class=\"rp-side\">\n\n  <div class=\"rp-box\">\n    <div class=\"rp-box-hdr\">\n      <span class=\"rp-box-title\">Challenge Phases<\u002Fspan>\n      <span class=\"rp-box-meta\">2 of 4<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"rp-progress\">\n      <div class=\"rp-prog-step done\"><span class=\"n\">01<\u002Fspan>CAVE<\u002Fdiv>\n      <div class=\"rp-prog-step now\"><span class=\"n\">02<\u002Fspan>PILLAR<\u002Fdiv>\n      <div class=\"rp-prog-step\"><span class=\"n\">03<\u002Fspan>VOTE<\u002Fdiv>\n      <div class=\"rp-prog-step\"><span class=\"n\">04<\u002Fspan>FIRST CLASS<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rp-box\">\n    <div class=\"rp-box-hdr\">\n      <span class=\"rp-box-title\">Rapa Nui · Live<\u002Fspan>\n
